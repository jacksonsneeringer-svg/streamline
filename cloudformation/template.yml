                '&copy; ' + str(time.gmtime().tm_year) + ' LANE FOUR. All rights reserved.')
              + div(F + 'font-size:12px;padding-top:6px;', '<a href="' + SITE + '" style="color:#5ddbc9;text-decoration:none;">Train for the Fast Lane</a>')
              + div(F + 'font-size:11px;color:rgba(255,255,255,0.4);padding-top:10px;', 'You are receiving this because an account was created on LANE FOUR with this email address.')
              + div(F + 'font-size:11px;color:rgba(255,255,255,0.4);padding-top:10px;', 'ronaldricomedia, 1875 Mission St Ste 103 #302, San Francisco, CA 94103')
              + '</td></tr></table></td></tr></table></body></html>')

          def build_text(first):
            lines = ['You just dove in. Congrats!', 'Welcome to LANE FOUR, ' + first + '!', '', INTRO, '', 'WHAT YOUR ACCOUNT UNLOCKS']
            lines += ['* %s: %s' % ft for ft in FEATURES]
            lines += ['', 'COMPLETE YOUR PROFILE', NUDGE % first, SITE + '/get-started?setup=1', '', 'GOOD TO KNOW']
            lines += ['* ' + k for k in KNOW]
            lines += ['', 'My Training: ' + SITE + '/my-training', 'Contact: ' + SITE + '/contact', '', 'Happy swimming,', 'LANE FOUR']
            lines += ['', 'ronaldricomedia, 1875 Mission St Ste 103 #302, San Francisco, CA 94103']
            return '\n'.join(lines)

          def send_welcome(user):
            first = (user.get('firstName') or '').strip() or 'swimmer'
            send_email(
              FROM, [user['email']],
              'Welcome to LANE FOUR, ' + first + '!',
              html=build_html(first), text=build_text(first)
            )
            users.update_item(Key={'email': user['email']},
              UpdateExpression='SET welcomeEmailSentAt = :t',
              ExpressionAttributeValues={':t': int(time.time() * 1000)})

          def handler(event, context):
            event = event or {}
            # Single send - fired asynchronously by the auth lambda on signup.
            # Pass {"force": true} to resend to one address (used for test sends).
            if event.get('email'):
              # Consistent read: this fires right after signup writes the user
              user = users.get_item(Key={'email': event['email'].strip().lower()}, ConsistentRead=True).get('Item')
              if not user:
                return {'statusCode': 404, 'body': json.dumps({'error': 'No such user'})}
              if user.get('welcomeEmailSentAt') and not event.get('force'):
                return {'statusCode': 200, 'body': json.dumps({'sent': 0, 'alreadySent': 1})}
              send_welcome(user)
              return {'statusCode': 200, 'body': json.dumps({'sent': 1})}
            # There is deliberately NO all-users broadcast mode here. The
            # welcome email is transactional only (sent once, at signup, plus
            # the recent-signup backfill below). It carries no unsubscribe
            # link, so re-sending it to the whole user base would be a
            # commercial email without an opt-out — a CAN-SPAM violation.
            # Deliberate marketing sends go through streamline-newsletter-send,
            # which does per-recipient one-click unsubscribe correctly.
            if event.get('all'):
              return {'statusCode': 400, 'body': json.dumps({'error': 'The all-users send mode was removed: the welcome email has no unsubscribe link, so mass sends must use streamline-newsletter-send instead.'})}
            # Backfill: welcome accounts created in the look-back window (default
            # 24h) that never got the email. Safe to re-run - sent users are marked.
            hours = float(event.get('hours') or 24)
            cutoff = int((time.time() - hours * 3600) * 1000)
            kw = {'FilterExpression': Attr('createdAt').gte(cutoff) & Attr('welcomeEmailSentAt').not_exists()}
            sent, errors = 0, []
            while True:
              r = users.scan(**kw)
              for u in r.get('Items', []):
                try:
                  send_welcome(u)
                  sent += 1
                except Exception as ex:
                  errors.append('%s: %s' % (u.get('email'), ex))
              if 'LastEvaluatedKey' not in r:
                break
              kw['ExclusiveStartKey'] = r['LastEvaluatedKey']
            print('welcome backfill: sent=%d errors=%s' % (sent, errors))
            return {'statusCode': 200, 'body': json.dumps({'sent': sent, 'errors': errors})}

  # Captures newsletter sign-ups (POST /newsletter) and honors one-click
  # unsubscribe links (GET /newsletter/unsubscribe) embedded in every broadcast
  # sent by streamline-newsletter-send. Each subscriber row carries an opaque
  # unsubToken so unsubscribe links can't be forged from the email alone.
  NewsletterFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: streamline-newsletter
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 10
      Environment:
        Variables:
          SITE_URL: !Sub "https://${DomainName}"
      Code:
        ZipFile: |
          import json, os, secrets, boto3
          from datetime import datetime, timezone
          from html import escape

          dynamo = boto3.resource('dynamodb')
          subscribers = dynamo.Table('streamline-subscribers')

          SITE = os.environ.get('SITE_URL', 'https://winlanefour.com')

          CORS = {
            'Access-Control-Allow-Origin': '*',
            'Access-Control-Allow-Headers': 'Content-Type',
            'Content-Type': 'application/json'
          }

          def page(title, message):
            html = (
              '<!DOCTYPE html><html><head><meta charset="utf-8">'
              '<meta name="viewport" content="width=device-width,initial-scale=1">'
              '<title>' + escape(title) + '</title></head>'
              '<body style="margin:0;background:#f0f7f6;font-family:Arial,Helvetica,sans-serif;">'
              '<table role="presentation" width="100%" cellpadding="0" cellspacing="0"><tr><td align="center" style="padding:60px 16px;">'
              '<table role="presentation" width="480" cellpadding="0" cellspacing="0" style="max-width:480px;width:100%;background:#ffffff;border-radius:14px;overflow:hidden;">'
              '<tr><td style="background:#0d4f47;text-align:center;padding:26px;">'
              '<div style="font-size:20px;letter-spacing:5px;color:#ffffff;font-weight:bold;">LANE FOUR</div></td></tr>'
              '<tr><td style="padding:36px 40px;text-align:center;">'
              '<div style="font-family:Georgia,serif;font-size:24px;color:#0d4f47;padding-bottom:12px;">' + escape(title) + '</div>'
              '<div style="font-size:15px;line-height:1.7;color:#3a6560;">' + message + '</div>'
              '<div style="padding-top:24px;"><a href="' + SITE + '" style="color:#1a7a6e;">Return to LANE FOUR &rarr;</a></div>'
              '</td></tr></table></td></tr></table></body></html>'
            )
            return {'statusCode': 200, 'headers': {'Content-Type': 'text/html; charset=utf-8'}, 'body': html}

          def subscribe(event):
            body = json.loads(event.get('body') or '{}')
            email = (body.get('email') or '').strip().lower()
            if not email or '@' not in email:
              return {'statusCode': 400, 'headers': CORS, 'body': json.dumps({'error': 'Valid email required'})}
            existing = subscribers.get_item(Key={'email': email}).get('Item') or {}
            # put_item replaces the row, which also clears any prior unsubscribedAt
            # (an explicit re-subscribe is a fresh opt-in). Keep the existing token
            # so links in older emails stay valid.
            subscribers.put_item(Item={
              'email': email,
              'source': (body.get('source') or 'hero').strip(),
              'timestamp': datetime.now(timezone.utc).isoformat(),
              'unsubToken': existing.get('unsubToken') or secrets.token_urlsafe(24)
            })
            return {'statusCode': 200, 'headers': CORS, 'body': json.dumps({'success': True})}

          def unsubscribe(event):
            params = event.get('queryStringParameters') or {}
            email = (params.get('email') or '').strip().lower()
            token = (params.get('token') or '').strip()
            if not email or not token:
              return page('Invalid link', 'This unsubscribe link is missing information. Please use the link from a recent newsletter, or contact us to be removed.')
            item = subscribers.get_item(Key={'email': email}).get('Item')
            if not item or item.get('unsubToken') != token:
              return page('We could not verify this link', 'This unsubscribe link is invalid or has expired. Please use the link from a recent newsletter, or contact us and we will remove you.')
            subscribers.update_item(
              Key={'email': email},
              UpdateExpression='SET unsubscribedAt = :t',
              ExpressionAttributeValues={':t': datetime.now(timezone.utc).isoformat()})
            return page('You are unsubscribed', 'You will no longer receive the LANE FOUR newsletter at <b>' + escape(email) + '</b>. Changed your mind? You can sign up again any time from our site.')

          def handler(event, context):
            method = (event.get('requestContext') or {}).get('http', {}).get('method', '')
            if method == 'OPTIONS':
              return {'statusCode': 200, 'headers': CORS, 'body': ''}
            try:
              if method == 'GET':
                return unsubscribe(event)
              return subscribe(event)
            except Exception as e:
              return {'statusCode': 500, 'headers': CORS, 'body': json.dumps({'error': str(e)})}

  # Broadcasts a newsletter to every current subscriber via Resend. Invoked by
  # IAM principals only (the newsletter GitHub workflows or a manual
  # `aws lambda invoke`), never exposed over the API. Event payload:
  #   {"subject": "...",           # required
  #    "preheader": "...",         # optional inbox preview text
  #    "heading": "...",           # optional serif headline
  #    "intro": "...",             # optional lead paragraph (HTML allowed)
  #    "body": "..." | "bodyHtml": "...",  # main content; body splits blank
  #                                #   lines into paragraphs, bodyHtml used as-is
  #    "rawHtml": "<!DOCTYPE...",  # optional COMPLETE email document, sent
  #                                #   verbatim instead of the built-in shell;
  #                                #   the literal token {{UNSUBSCRIBE_URL}} in
  #                                #   it is replaced per recipient. Used by the
  #                                #   weekly newsletter workflow, whose issue
  #                                #   HTML is fully rendered ahead of time.
  #    "ctaText": "...", "ctaUrl": "...",  # optional call-to-action button
  #    "test": "you@example.com",  # send ONLY to this address (preview)
  #    "limit": 50}                # optional cap on recipients (testing)
  NewsletterSendFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: streamline-newsletter-send
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      Environment:
        Variables:
          SITE_URL: !Sub "https://${DomainName}"
          # Unsubscribe links must hit the API (streamline-newsletter), not the
          # static site, so they point at the raw API Gateway endpoint.
          API_URL: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
          EMAIL_FROM: "LANE FOUR <newsletter@winlanefour.com>"
          RESEND_API_KEY: !Ref ResendApiKey
      Code:
        ZipFile: |
          import json, os, time, secrets, boto3, urllib.request
          from urllib.parse import quote
          from html import escape

          dynamo = boto3.resource('dynamodb')
          subscribers = dynamo.Table('streamline-subscribers')

          SITE = os.environ.get('SITE_URL', 'https://winlanefour.com')
          API = os.environ.get('API_URL', SITE)
          FROM = os.environ.get('EMAIL_FROM', 'LANE FOUR <newsletter@winlanefour.com>')
          RESEND_API_KEY = os.environ.get('RESEND_API_KEY', '')

          def send_email(source, to, subject, html=None, text=None, headers=None):
            payload = {'from': source, 'to': to if isinstance(to, list) else [to], 'subject': subject}
            if html is not None:
              payload['html'] = html
            if text is not None:
              payload['text'] = text
            if headers:
              payload['headers'] = headers
            req = urllib.request.Request(
              'https://api.resend.com/emails',
              data=json.dumps(payload).encode(),
              # A real User-Agent is required: Cloudflare (in front of the Resend
              # API) blocks the default "Python-urllib/x.y" signature with a 403
              # "error code: 1010" before the request reaches Resend.
              headers={'Authorization': 'Bearer ' + RESEND_API_KEY, 'Content-Type': 'application/json',
                       'User-Agent': 'lane-four-mailer/1.0 (+https://winlanefour.com)', 'Accept': 'application/json'},
              method='POST'
            )
            with urllib.request.urlopen(req, timeout=15) as r:
              return json.loads(r.read())

          # Brand palette + email-safe fonts, matched to the welcome email.
          F = 'font-family:Arial,Helvetica,sans-serif;'  # ~ DM Sans
          G = 'font-family:Georgia,serif;'               # ~ DM Serif Display
          LOGO_IMG = SITE + '/email/lane-four-logo.png'
          WORDMARK_IMG = SITE + '/email/lane-four-wordmark.png'

          def div(css, t): return '<div style="' + css + '">' + t + '</div>'

          def unsub_url(email, token):
            return API + '/newsletter/unsubscribe?email=' + quote(email) + '&token=' + quote(token)

          def body_to_html(body):
            # Turn a plain-text body into paragraphs: blank lines split
            # paragraphs, single newlines become <br>. HTML is left intact.
            html = ''
            for para in [p for p in body.replace('\r\n', '\n').split('\n\n') if p.strip()]:
              html += div(F + 'font-size:15px;line-height:1.75;color:#3a6560;margin:0 0 18px;',
                          para.strip().replace('\n', '<br>'))
            return html

          def build_html(subject, heading, intro, body_html, cta_text, cta_url, unsub, preheader):
            eyebrow = F + 'font-size:12px;font-weight:bold;letter-spacing:3px;text-transform:uppercase;color:#1a7a6e;padding-bottom:14px;'
            hidden = ''
            if preheader:
              hidden = ('<div style="display:none;max-height:0;overflow:hidden;opacity:0;'
                        'color:transparent;height:0;width:0;">' + escape(preheader) + '</div>')
            head = div(G + 'font-size:32px;line-height:1.25;color:#ffffff;', heading or subject)
            lead = div(F + 'font-size:15px;line-height:1.75;color:#3a6560;margin:0 0 18px;', intro) if intro else ''
            cta = ''
            if cta_text and cta_url:
              cta = div('padding:6px 0 8px;',
                '<a href="' + cta_url + '" style="display:inline-block;background:#5ddbc9;color:#0d4f47;' + F
                + 'font-size:13px;font-weight:bold;letter-spacing:2px;text-transform:uppercase;text-decoration:none;'
                'padding:13px 30px;border-radius:4px;">' + escape(cta_text) + ' &rarr;</a>')
            return ('<!DOCTYPE html><html><body style="margin:0;padding:0;background:#f0f7f6;">'
              + hidden +
              '<table role="presentation" width="100%" cellpadding="0" cellspacing="0"><tr><td align="center" style="padding:32px 12px;">'
              '<table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background:#ffffff;border-radius:14px;overflow:hidden;">'
              '<tr><td style="background:#0d4f47;text-align:center;padding:38px 40px 40px;">'
              + '<img src="' + LOGO_IMG + '" width="490" height="44" alt="LANE FOUR" style="display:inline-block;border:0;outline:none;max-width:100%;">'
              + div(F + 'font-size:11px;letter-spacing:11px;word-spacing:14px;text-transform:uppercase;color:rgba(255,255,255,0.4);padding:14px 0 30px 16px;', 'Train for the Fast Lane')
              + head
              + '</td></tr>'
              '<tr><td style="padding:36px 40px 8px;">' + lead + body_html + cta + '</td></tr>'
              '<tr><td style="padding:22px 40px 34px;">'
              + div(F + 'font-size:14px;line-height:1.8;color:#3a6560;',
                '<a href="' + SITE + '/my-training" style="color:#1a7a6e;">Open My Training</a> &middot; '
                '<a href="' + SITE + '/contact" style="color:#1a7a6e;">Contact us</a>')
              + '</td></tr>'
              '<tr><td style="background:#0d4f47;text-align:center;padding:28px 40px;">'
              + '<img src="' + WORDMARK_IMG + '" width="147" height="20" alt="LANE FOUR" style="display:inline-block;border:0;outline:none;">'
              + div(F + 'font-size:12px;color:rgba(255,255,255,0.55);padding-top:10px;',
                '&copy; ' + str(time.gmtime().tm_year) + ' LANE FOUR. All rights reserved.')
              + div(F + 'font-size:11px;color:rgba(255,255,255,0.45);padding-top:12px;line-height:1.6;',
                'You are receiving this because you subscribed to the LANE FOUR newsletter.<br>'
                '<a href="' + unsub + '" style="color:#a8ede5;text-decoration:underline;">Unsubscribe</a>')
              + '</td></tr></table></td></tr></table></body></html>')

          def build_text(subject, heading, intro, body, cta_text, cta_url, unsub):
            lines = [heading or subject, '']
            if intro:
              lines += [intro, '']
            lines += [body.strip(), '']
            if cta_text and cta_url:
              lines += [cta_text + ': ' + cta_url, '']
            lines += ['-- ', 'You are receiving this because you subscribed to the LANE FOUR newsletter.',
                      'Unsubscribe: ' + unsub]
            return '\n'.join(lines)

          def handler(event, context):
            event = event or {}
            subject = (event.get('subject') or '').strip()
            if not subject:
              return {'statusCode': 400, 'body': json.dumps({'error': 'subject is required'})}
            heading = event.get('heading') or ''
            intro = event.get('intro') or ''
            preheader = event.get('preheader') or ''
            cta_text = event.get('ctaText') or ''
            cta_url = event.get('ctaUrl') or ''
            raw_body = event.get('body') or ''
            raw_html = event.get('rawHtml') or ''
            body_html = event.get('bodyHtml') or body_to_html(raw_body)
            text_body = raw_body or (heading or subject)

            def deliver(email, token):
              unsub = unsub_url(email, token)
              if raw_html:
                # Pre-rendered issue (weekly newsletter): send the document
                # as-is, wiring in this recipient's one-click unsubscribe link.
                html = raw_html.replace('{{UNSUBSCRIBE_URL}}', unsub)
              else:
                html = build_html(subject, heading, intro, body_html, cta_text, cta_url, unsub, preheader)
              send_email(
                FROM, [email], subject,
                html=html,
                text=build_text(subject, heading, intro, text_body, cta_text, cta_url, unsub),
                headers={'List-Unsubscribe': '<' + unsub + '>',
                         'List-Unsubscribe-Post': 'List-Unsubscribe=One-Click'}
              )

            # Preview mode: send a single copy to the given address, no scan.
            test = (event.get('test') or '').strip().lower()
            if test:
              deliver(test, 'preview')
              return {'statusCode': 200, 'body': json.dumps({'sent': 1, 'test': test})}

            limit = event.get('limit')
            sent, skipped, errors = 0, 0, []
            kw = {}
            done = False
            while not done:
              r = subscribers.scan(**kw)
              for sub in r.get('Items', []):
                email = (sub.get('email') or '').strip().lower()
                if not email or sub.get('unsubscribedAt'):
                  skipped += 1
                  continue
                token = sub.get('unsubToken')
                if not token:
                  token = secrets.token_urlsafe(24)
                  subscribers.update_item(
                    Key={'email': email},
                    UpdateExpression='SET unsubToken = :t',
                    ExpressionAttributeValues={':t': token})
                try:
                  deliver(email, token)
                  subscribers.update_item(
                    Key={'email': email},
                    UpdateExpression='SET newsletterSentAt = :t',
                    ExpressionAttributeValues={':t': int(time.time() * 1000)})
                  sent += 1
                  if isinstance(limit, int) and sent >= limit:
                    done = True
                    break
                  time.sleep(0.06)  # stay under Resend's request rate limit
                except Exception as ex:
                  errors.append('%s: %s' % (email, ex))
              if done or 'LastEvaluatedKey' not in r:
                break
              kw['ExclusiveStartKey'] = r['LastEvaluatedKey']
            print('newsletter send: sent=%d skipped=%d errors=%s' % (sent, skipped, errors))
            return {'statusCode': 200, 'body': json.dumps({'sent': sent, 'skipped': skipped, 'errors': errors})}

  # Composes the weekly newsletter's editorial content so no human has to
  # write it. Invoked by the Monday newsletter GitHub workflow (IAM only,
  # never exposed over the API). Grounds everything in real sources rather
  # than letting the model invent facts:
  #   - "In the Water" news comes from the SwimSwam RSS feed (last 7 days),
  #     summarized by Claude; topic slugs are the feed's own post slugs so the
  #     no-repeat history works across weeks.
  #   - Today's workout blurbs come from the daily sets/dryland already
  #     generated by streamline-generate-sets / streamline-generate-dryland.
  #   - Athlete of the Week: Claude proposes candidates not yet featured;
  #     the first one with a Wikipedia photo wins (real photo, real person).
  #   - Calendar events are passed through from the caller (the repo's
  #     events catalog) — never invented, so dates stay trustworthy.
  # Event payload:
  #   {"date": "YYYY-MM-DD",        # optional, defaults to today Pacific
  #    "usedAthletes": [...],       # names already featured (from history)
  #    "usedTopics": [...],         # topic slugs already used (from history)
  #    "events": [...]}             # upcoming events, passed through verbatim
  # Returns {"statusCode": 200, "draft": {...draft-issue.json shape...}}.
  NewsletterComposeFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: streamline-newsletter-compose
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      Environment:
        Variables:
          SITE_URL: !Sub "https://${DomainName}"
          NEWS_FEED_URL: "https://swimswam.com/feed/"
          NEWS_FEED_URL_2: "https://www.swimmingworldmagazine.com/feed/"
      Code:
        ZipFile: |
          import json, os, re, boto3, urllib.request, urllib.parse
          from datetime import datetime, timezone
          from email.utils import parsedate_to_datetime
          from zoneinfo import ZoneInfo
          import xml.etree.ElementTree as ET

          PACIFIC = ZoneInfo('America/Los_Angeles')
          bedrock = boto3.client('bedrock-runtime', region_name='us-east-1')
          dynamo = boto3.resource('dynamodb')
          sets_tbl = dynamo.Table('streamline-daily-sets')
          dryland_tbl = dynamo.Table('streamline-daily-dryland')

          SITE = os.environ.get('SITE_URL', 'https://winlanefour.com')
          # Real swim-news RSS feeds, each tagged with the outlet name so every
          # rendered synopsis can credit and link it "(via <Source>)".
          FEEDS = [
            ('SwimSwam', os.environ.get('NEWS_FEED_URL', 'https://swimswam.com/feed/')),
            ('Swimming World', os.environ.get('NEWS_FEED_URL_2', 'https://www.swimmingworldmagazine.com/feed/')),
          ]
          UA = 'lane-four-newsletter/1.0 (+https://winlanefour.com)'
          ICONS = ('doc', 'trend', 'medal', 'globe')
          FREE_LICENSE_RE = re.compile(r'^(cc[\s-]?(by|0|zero)|public domain|pd|no restrictions)', re.I)

          def http_get(url, timeout=15):
            req = urllib.request.Request(url, headers={'User-Agent': UA, 'Accept': '*/*'})
            with urllib.request.urlopen(req, timeout=timeout) as r:
              return r.read()

          def strip_tags(s):
            return re.sub(r'\s+', ' ', re.sub(r'<[^>]+>', ' ', s or '')).strip()

          def norm_title(t):
            return re.sub(r'[^a-z0-9]+', ' ', (t or '').lower()).strip()

          def fetch_news():
            # Real swim news from each outlet's RSS feed, last 7 days only. The
            # post's URL slug becomes the topicSlug (what the no-repeat history
            # records), and the outlet name rides along as the credited source so
            # the same story can never run twice and is always attributed.
            items, now = [], datetime.now(timezone.utc)
            seen_slugs, seen_titles = set(), set()
            for source, feed_url in FEEDS:
              try:
                root = ET.fromstring(http_get(feed_url))
              except Exception as ex:
                print('feed fetch failed for %s: %s' % (source, ex))
                continue
              for it in root.iter('item'):
                title = (it.findtext('title') or '').strip()
                link = (it.findtext('link') or '').strip()
                summary = strip_tags(it.findtext('description') or '')[:400]
                if not title or not link:
                  continue
                try:
                  dt = parsedate_to_datetime(it.findtext('pubDate') or '')
                  if (now - dt).days > 7:
                    continue
                except Exception:
                  pass
                slug = re.sub(r'[^a-z0-9]+', '-', link.rstrip('/').rsplit('/', 1)[-1].lower()).strip('-')
                nt = norm_title(title)
                # Skip a story we already have: same outlet slug, or the same
                # headline reported by both outlets.
                if not slug or slug in seen_slugs or (nt and nt in seen_titles):
                  continue
                seen_slugs.add(slug)
                if nt:
                  seen_titles.add(nt)
                items.append({'slug': slug, 'title': title, 'summary': summary, 'url': link, 'source': source})
                if len(items) >= 16:
                  return items
            return items

          def fetch_workout(date_str):
            # Today's swim set and dryland were already generated at 12:01 AM
            # Pacific by the daily schedulers; the newsletter just describes them.
            swim, lift = {}, {}
            try:
              item = sets_tbl.get_item(Key={'level': 'intermediate'}).get('Item') or {}
              data = json.loads(item.get('setData') or '{}')
              swim = {k: data.get(k) for k in ('title', 'totalYards', 'strokeFocus', 'intensity', 'focusCue') if data.get(k)}
            except Exception as ex:
              print('swim set fetch failed: %s' % ex)
            try:
              item = dryland_tbl.get_item(Key={'category': 'bodyweight'}).get('Item') or {}
              data = json.loads(item.get('workoutData') or '{}')
              lift = {k: data.get(k) for k in ('title', 'trainingFocus', 'strokeEmphasis', 'intensity', 'isRestDay') if data.get(k) is not None}
            except Exception as ex:
              print('dryland fetch failed: %s' % ex)
            return swim, lift

          def wiki_photo(name):
            # A real press-quality photo AND a cheap existence check that the
            # proposed athlete is a real, notable person. Returns
            # (url, credit, is_free): is_free gates on the lead image's license,
            # since only Creative Commons / public-domain photos are legal to
            # reuse in the newsletter. Fair-use lead images are rejected.
            try:
              url = 'https://en.wikipedia.org/api/rest_v1/page/summary/' + urllib.parse.quote(name.replace(' ', '_'))
              data = json.loads(http_get(url, timeout=10))
              if data.get('type') != 'standard':
                return '', '', False
              photo = ((data.get('thumbnail') or {}).get('source')) or ''
              if not photo:
                return '', '', False
              credit, is_free = wiki_photo_license(name)
              return photo, credit, is_free
            except Exception as ex:
              print('wikipedia lookup failed for %s: %s' % (name, ex))
            return '', '', False

          def wiki_photo_license(name):
            # Author + license of the page's lead image, via the extmetadata of
            # the file behind the summary thumbnail. Returns (credit, is_free);
            # the credit is the attribution the free license requires us to print.
            try:
              api = ('https://en.wikipedia.org/w/api.php?format=json&action=query&redirects=1'
                     '&prop=pageimages&piprop=name&titles=' + urllib.parse.quote(name))
              pages = json.loads(http_get(api, timeout=10)).get('query', {}).get('pages', {})
              file_name = next((p.get('pageimage') for p in pages.values() if p.get('pageimage')), '')
              if not file_name:
                return '', False
              api = ('https://en.wikipedia.org/w/api.php?format=json&action=query&prop=imageinfo'
                     '&iiprop=extmetadata&iiextmetadatafilter=Artist%7CLicenseShortName%7CLicense'
                     '&titles=' + urllib.parse.quote('File:' + file_name))
              pages = json.loads(http_get(api, timeout=10)).get('query', {}).get('pages', {})
              info = next(iter(pages.values()), {}).get('imageinfo') or [{}]
              meta = info[0].get('extmetadata') or {}
              artist = strip_tags((meta.get('Artist') or {}).get('value') or '')[:80]
              license_name = strip_tags((meta.get('LicenseShortName') or {}).get('value') or '')
              license_code = strip_tags((meta.get('License') or {}).get('value') or '')
              is_free = bool(FREE_LICENSE_RE.match(license_name) or FREE_LICENSE_RE.match(license_code))
              parts = [p for p in (artist, license_name) if p]
              credit = ('Photo: ' + ', '.join(parts) + ', via Wikimedia Commons') if parts else ''
              return credit, is_free
            except Exception as ex:
              print('wikipedia license lookup failed for %s: %s' % (name, ex))
              return '', False

          def wiki_extract(name):
            # Plain-text article extract from Wikipedia — the factual basis for
            # the two-paragraph bio, so the model summarizes real sourced text
            # instead of inventing career facts.
            try:
              api = ('https://en.wikipedia.org/w/api.php?format=json&action=query&redirects=1'
                     '&prop=extracts&explaintext=1&exsectionformat=plain&titles=' + urllib.parse.quote(name))
              pages = json.loads(http_get(api, timeout=12)).get('query', {}).get('pages', {})
              extract = next((p.get('extract') for p in pages.values() if p.get('extract')), '')
              return (extract or '')[:5000]
            except Exception as ex:
              print('wikipedia extract failed for %s: %s' % (name, ex))
              return ''

          def summarize_bio(name, extract):
            # Two-paragraph bio grounded in the athlete's Wikipedia page:
            # (1) who they are as a person, (2) their competitive achievements.
            if not extract:
              return ''
            prompt = ('Using ONLY the Wikipedia text below about %s, write exactly two short paragraphs '
                      'separated by a blank line. Paragraph 1: who they are as a person (nationality, sport, '
                      'a sentence of background). Paragraph 2: their competitive achievements (medals, records, '
                      'titles). About 90 words total. Use only facts present in the text. No em dashes, no '
                      'invented dates or times, no preamble or quotes around the answer.\n\nWIKIPEDIA:\n%s'
                      % (name, extract))
            try:
              return invoke(prompt).strip()
            except Exception as ex:
              print('bio summarize failed for %s: %s' % (name, ex))
              return ''

          PROMPT = """You write LANE FOUR's weekly swim training newsletter (winlanefour.com). Tone: warm, direct, a coach who loves the sport — never corporate, never hype.

          Today is {weekday}, {date_label}.

          THIS WEEK'S REAL NEWS STORIES (from the last 7 days — your ONLY allowed news sources):
          {news_json}

          TODAY'S SWIM SET (already generated for the site): {swim_json}
          TODAY'S DRYLAND WORKOUT (already generated for the site): {lift_json}

          ATHLETES ALREADY FEATURED (never propose these): {used_athletes}

          Return ONLY valid JSON, no preamble, matching exactly this shape:
          {{"subject":"inbox subject line, <60 chars, specific to this week's content",
          "preheader":"inbox preview text, <90 chars",
          "heroHeading":"Good morning swimmers and happy Monday",
          "heroTeaser":"One sentence that teases the biggest news item and the athlete — written to make someone open the rest of the email, not summarize it.",
          "outroLine":"That's the week in the water. Happy swimming,",
          "workout":{{"dateLabel":"e.g. Mon, Jul 6 &middot; <swim focus> in the pool, <dryland focus> on land","swimSet":{{"title":"Today's Swim Set","description":"one sentence describing today's swim set from the data above"}},"lift":{{"title":"Today's Lift","description":"one sentence describing today's dryland from the data above (if it is a rest day, say so and tease tomorrow)"}}}},
          "newsItems":[{{"topicSlug":"MUST be the exact slug of one provided story","icon":"doc|trend|medal|globe","title":"short headline, punchier than the source's","body":"1-3 sentences summarizing that story. <strong>Bold</strong> athlete and organization names."}}],
          "athleteCandidates":[{{"name":"Full Name","badges":["4 short stat chips e.g. '7x Olympic Gold'"]}}]}}

          Rules:
          - newsItems: exactly 4, each from a DIFFERENT provided story. Use only facts present in the provided title/summary — do not add details you are not given. Vary the icons.
          - athleteCandidates: exactly 5 real aquatic or endurance athletes (pool swimming, open-water or marathon swimming, triathlon, para-swimming, or diving), each with an English Wikipedia page and at least one national- or international-level medal or award. Most interesting first, none from the already-featured list. Give only badges you are certain of. The bio is written separately from Wikipedia, so do not include one here.
          - No em dashes. No invented quotes, dates, times, or results."""

          def invoke(prompt):
            # Newsletter copy stays on Sonnet 4.6. Uses the US cross-region
            # inference profile (see streamline-generate-sets for why the bare
            # model ID doesn't work on these newer models).
            r = bedrock.invoke_model(
              modelId='us.anthropic.claude-sonnet-4-6',
              body=json.dumps({'anthropic_version': 'bedrock-2023-05-31', 'max_tokens': 4000,
                               'messages': [{'role': 'user', 'content': prompt}]})
            )
            return json.loads(r['body'].read())['content'][0]['text'].strip()

          def handler(event, context):
            event = event or {}
            now = datetime.now(PACIFIC)
            date_str = event.get('date') or now.strftime('%Y-%m-%d')
            day = datetime.strptime(date_str, '%Y-%m-%d')
            date_label = '%s %d, %d' % (day.strftime('%B'), day.day, day.year)
            used_athletes = [a.strip().lower() for a in (event.get('usedAthletes') or []) if a]
            used_topics = set(t.strip().lower() for t in (event.get('usedTopics') or []) if t)

            news = [n for n in fetch_news() if n['slug'].lower() not in used_topics]
            if len(news) < 4:
              raise RuntimeError('Only %d fresh, unused news stories in the feed; need 4. Not sending a stale issue.' % len(news))

            swim, lift = fetch_workout(date_str)
            prompt = PROMPT.format(
              weekday=day.strftime('%A'), date_label=date_label,
              news_json=json.dumps(news), swim_json=json.dumps(swim) or '{}',
              lift_json=json.dumps(lift) or '{}',
              used_athletes=json.dumps(sorted(used_athletes)))

            raw = invoke(prompt)
            data = json.loads(raw[raw.find('{'):raw.rfind('}') + 1])

            # Hard-validate the news against the feed: every item must reference
            # a real provided story and a slug never used before.
            valid_slugs = {n['slug'] for n in news}
            # Source + link come from the feed itself (never the model), so every
            # rendered item credits and links the real story it summarizes.
            url_by_slug = {n['slug']: n.get('url', '') for n in news}
            source_by_slug = {n['slug']: n.get('source', '') for n in news}
            items, seen = [], set()
            for it in data.get('newsItems') or []:
              slug = (it.get('topicSlug') or '').strip()
              if slug in valid_slugs and slug.lower() not in used_topics and slug not in seen and it.get('title') and it.get('body'):
                icon = it.get('icon') if it.get('icon') in ICONS else ICONS[len(items) % 4]
                items.append({'topicSlug': slug, 'icon': icon, 'title': it['title'], 'body': it['body'],
                              'url': url_by_slug.get(slug, ''), 'source': source_by_slug.get(slug, '')})
                seen.add(slug)
            if len(items) < 3:
              raise RuntimeError('Compose returned too few valid news items (%d).' % len(items))

            # First candidate that is genuinely new AND has a free-licensed
            # Wikipedia photo (legal to reuse in email). The two-paragraph bio is
            # then summarized from that athlete's Wikipedia page, not invented, so
            # a candidate with no usable extract is skipped too.
            athlete = None
            candidates = [c for c in (data.get('athleteCandidates') or [])
                          if (c.get('name') or '').strip() and (c.get('name') or '').strip().lower() not in used_athletes]
            for cand in candidates:
              name = cand['name'].strip()
              photo, credit, is_free = wiki_photo(name)
              if not (photo and is_free):
                continue
              bio = summarize_bio(name, wiki_extract(name))
              if not bio:
                continue
              athlete = {'name': name, 'photoUrl': photo, 'photoCredit': credit,
                         'badges': [str(b) for b in (cand.get('badges') or [])][:4],
                         'bio': bio}
              break
            if athlete is None:
              raise RuntimeError('No athlete candidate had a free-licensed Wikipedia photo and a usable bio.')

            draft = {
              'date': date_str,
              'issueDateLabel': date_label,
              'subject': data.get('subject') or ('LANE FOUR Weekly: %s' % date_label),
              'preheader': data.get('preheader') or '',
              'heroHeading': data.get('heroHeading') or 'Good morning swimmers and happy Monday',
              'heroTeaser': data.get('heroTeaser') or '',
              'outroLine': data.get('outroLine') or "That's the week in the water. Happy swimming,",
              'workout': data.get('workout') or {},
              'newsItems': items[:4],
              'athlete': athlete,
              # The gear section deliberately carries a fixed, athlete-neutral
              # headline (set by the renderer). Tying featured gear to the
              # named athlete implied an endorsement they never gave — a
              # right-of-publicity / false-endorsement claim waiting to happen.
              'events': event.get('events') or [],
            }
            return {'statusCode': 200, 'draft': draft}

  SearchFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: streamline-search
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      Code:
        ZipFile: |
          import json, boto3

          bedrock = boto3.client('bedrock-runtime', region_name='us-east-1')

          CORS = {
            'Access-Control-Allow-Origin': '*',
            'Content-Type': 'application/json'
          }

          SITE_KNOWLEDGE = """Streamline is a competitive swimming resource site. Pages and content:

          home - Landing page, overview of the platform
          swim-sets - Daily swim workouts: Beginner (2000-2500y), Intermediate (3000-4000y), Advanced (5000-6000y). Each has warmup, drill set, main set, cooldown. Keywords: interval training, yardage, lap swimming.
          dryland-workouts - Strength/conditioning for swimmers: Upper Body Push (bench, shoulder press, triceps), Upper Body Pull (rows, pull-ups, biceps), Lower Body (squats, lunges, hamstrings), Core & Stability (planks, rotational work). Keywords: gym, strength, conditioning, land training.
          blog - Articles index page
          freestyle-errors - Blog article: "7 Common Freestyle Errors and How to Fix Them". Covers: head position (looking forward vs neutral), kick (6-beat, 2-beat, ankle flexibility), over-gliding, body rotation (hip-driven vs shoulder-driven), high-elbow catch, going too hard too early, flip turns and open turns. Keywords: stroke technique, efficiency, form, tips, mistakes.
          pace-clock - Blog article: "How to Read a Pace Clock". Covers: reading the clock face (seconds hand, top of clock), common send-off intervals (1:00, 1:15, 1:30), calculating rest, using the pace clock for structured sets and negative splits. Keywords: clock, intervals, send-off, timing, rest.
          contact - Contact form for questions, bug reports, blog article requests, partnership inquiries
          my-training - Personal dashboard: today's swim plan, dryland workout, meal plan, progress tracking, streak. Requires a free account.
          get-started - Create a free account for personalized daily training plans"""

          def handler(event, context):
            params = (event.get('queryStringParameters') or {})
            query = (params.get('q') or '').strip()
            if not query:
              return {'statusCode': 400, 'headers': CORS, 'body': json.dumps({'error': 'Missing query'})}
            prompt = f"""{SITE_KNOWLEDGE}

          User searched: "{query}"

          Match the query (even if it is a partial word or fragment) to the most relevant pages on this site.
          Return a JSON array of up to 4 results, best match first. Each item: {{"title": "concise page/topic title", "description": "one sentence explaining what the user will find", "page": "page-id"}}
          Valid page IDs: home, swim-sets, dryland-workouts, blog, freestyle-errors, pace-clock, contact, my-training, get-started
          Return ONLY the JSON array, no other text."""
            try:
              resp = bedrock.invoke_model(
                modelId='anthropic.claude-3-haiku-20240307-v1:0',
                body=json.dumps({
                  'anthropic_version': 'bedrock-2023-05-31',
                  'max_tokens': 400,
                  'messages': [{'role': 'user', 'content': prompt}]
                })
              )
              text = json.loads(resp['body'].read())['content'][0]['text'].strip()
              start = text.find('[')
              end = text.rfind(']') + 1
              results = json.loads(text[start:end]) if start >= 0 else []
              return {'statusCode': 200, 'headers': CORS, 'body': json.dumps({'results': results})}
            except Exception as e:
              return {'statusCode': 500, 'headers': CORS, 'body': json.dumps({'error': str(e), 'results': []})}

  GenerateSetsFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: streamline-generate-sets
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      Environment:
        Variables:
          SKILL_URL: !Sub "https://${DomainName}/swim-sets.md"
      Code:
        ZipFile: |
          import json, os, boto3, uuid, urllib.request
          from datetime import datetime, timezone
          from zoneinfo import ZoneInfo

          # Daily sets are keyed by the Pacific "service day" so the date only
          # rolls over at midnight Pacific (when the schedule generates them),
          # matching the "fresh plan at midnight Pacific" promise to users.
          PACIFIC = ZoneInfo('America/Los_Angeles')

          bedrock = boto3.client('bedrock-runtime', region_name='us-east-1')
          dynamo = boto3.resource('dynamodb')
          daily_tbl = dynamo.Table('streamline-daily-sets')
          arch_tbl = dynamo.Table('streamline-set-archives')

          # The swim-sets.md skill is the single source of truth for how daily
          # sets are programmed. It is fetched from the live site and injected
          # into the prompt; the inline LEVELS notes below are only a fallback
          # for when the skill cannot be retrieved.
          SKILL_URL = os.environ.get('SKILL_URL', '')
          _skill_cache = {}

          def load_skill():
            if 'text' in _skill_cache:
              return _skill_cache['text']
            text = ''
            if SKILL_URL:
              try:
                with urllib.request.urlopen(SKILL_URL, timeout=10) as r:
                  text = r.read().decode('utf-8')
              except Exception as ex:
                print('skill fetch failed: %s' % ex)
            _skill_cache['text'] = text
            return text

          SCHED = {0:'Distance Freestyle',1:'Breaststroke',2:'Backstroke',3:'Butterfly',4:'IM',5:'Sprints & Dives',6:'Mid-Distance / Choice Stroke'}
          STROKE = {0:'freestyle',1:'breaststroke',2:'backstroke',3:'butterfly',4:'im',5:'freestyle',6:'choice'}

          # Per-level target yardage (sits within the swim-sets skill's volume
          # ranges) and a condensed fallback note used only when the skill file
          # cannot be fetched. The skill is the source of truth when available.
          LEVELS = [
            ('beginner', 1600,
             'Beginner (~1,200-2,000): new/young swimmers learning fundamentals. Generous rest (30-45s+), focus on completion. Single-swim cap 100 on distance days. High technique emphasis, a clear focal point per piece. Warm, encouraging cues. Warm-up 200 (100 free / 50 back / 50 breast). Cool-down 2x50 easy free.'),
            ('intermediate', 3000,
             'Intermediate (~2,500-3,800): all four strokes legally, beginning to race. Moderate rest (15-25s), aerobic base + some threshold. Single-swim cap 200. Corrections embedded in sets. Warm-up 400 (200 free / 100 back / 100 breast). Cool-down 200 easy choice.'),
            ('advanced', 5000,
             'Advanced (~4,500-6,500): club/HS/college, strong aerobic base, technically sound. Tight rest (5-15s), descending intervals, pace and threshold work. Single-swim cap 400. Cues are refinements. Warm-up up to 600. Cool-down 400 easy choice.'),
            ('pro', 8000,
             'Pro (~7,000-12,000+): elite/Olympic, periodized. Very tight or no rest, threshold/VO2/race-pace repeats. No single-swim cap. Terse elite micro-adjustment cues. Warm-up up to 600. Cool-down 600 easy choice.')
          ]

          PROMPT = """You are the Streamline daily swim-set coach. Write today's practice for ONE level only.

          {framework}

          Today is {day}. Stroke focus for the day: {focus}. Write the set for the {level} level only, aiming for ~{yards} yards.

          Use the swim-sets framework above as your single source of truth: apply the {level} level's volume range, intervals, technique emphasis and coaching tone; honor the day's stroke focus, the single-swim distance caps, the warm-up / cool-down standards, the stroke-specific drill library (use the Pre-Main for day-stroke drills), and the set-design principles. Choose a sensible secondary focus (endurance, technique, speed/threshold, race prep, or recovery) as the framework describes, and reflect it in the title. On Saturday include a Dives block. Main sets must have internal structure (descending, build, pyramid, broken, neg split, odds/evens) — not flat repeats.

          IMPORTANT — response format: IGNORE the framework's "Output Format" section and its markdown/whiteboard layout instructions for THIS response. Do NOT return markdown. Return ONLY valid JSON, no preamble, no explanation, matching exactly:
          {{"title":"descriptive title built from the set's focuses only (stroke, intensity, set type), ending with the secondary focus, e.g. Backstroke Threshold Builders. Do NOT include the day of the week or any date in the title.","totalYards":N,"estimatedMinutes":N,"strokeFocus":"freestyle|backstroke|butterfly|breaststroke|im|choice","intensity":"aerobic|threshold|sprint|recovery","setType":"drill|kick|pull|race|endurance|technique","distanceCategory":"short|mid|long|ultra","focusCue":"2-3 sentence coach's cue said at the start of practice, level-appropriate language, do not use em dashes","sections":[{{"name":"Warm-Up|Pre-Main|Main Set|Post-Main|Cool-Down","yards":N,"items":[{{"text":"one whiteboard line, e.g. 4x 100 free @1:30 or 8x 50 fly @ :55 w/ :15 rest","note":"short informational note OR null. State only HOW to execute this piece (stroke, pace, equipment, breathing pattern, interval mechanics), e.g. \\"comfortable aerobic\\" or \\"negative split\\" or \\"drill on the odds, swim on the evens\\". No coaching, motivational, or hype language, no justifications or emphasis like \\"no exceptions\\" or \\"find your rhythm\\". Keep it to a terse factual phrase."}}]}}]}}
          Sections in order: Warm-Up, Pre-Main, Main Set, optional Post-Main, Cool-Down. totalYards must equal the sum of the section yards and fall within the {level} range. Keep beginner notation plain (use "rest :30" rather than pace-clock sendoffs).
          IMPORTANT writing rule for ALL descriptor text (every item "note" and the "focusCue"): NEVER use em dashes or en dashes (— or –). Item notes must be purely informational about how to perform the swim, with zero coaching or motivational language."""

          def invoke(prompt):
            # max_tokens must cover the largest level. The advanced/pro sets
            # (5,000-8,000+ yds) produce long JSON with a coaching note on every
            # piece; at 2,500 tokens they were truncated mid-object so json.loads
            # threw and only the small beginner set (which fit) ever got written.
            #
            # Haiku 4.5 on Bedrock is inference-profile-only: the bare model ID
            # 'anthropic.claude-haiku-4-5' is rejected with on-demand throughput
            # ("Retry your request with the ID or ARN of an inference profile that
            # contains this model"). Use the US cross-region inference profile
            # (this Lambda runs in us-east-1). The older Claude 3 Haiku call
            # elsewhere can use a bare foundation-model ID because that older
            # model supports on-demand.
            r = bedrock.invoke_model(
              modelId='us.anthropic.claude-haiku-4-5',
              body=json.dumps({'anthropic_version':'bedrock-2023-05-31','max_tokens':8000,'messages':[{'role':'user','content':prompt}]})
            )
            return json.loads(r['body'].read())['content'][0]['text'].strip()

          def handler(event, context):
            now = datetime.now(PACIFIC)
            date_str = now.strftime('%Y-%m-%d')
            dow = now.weekday()
            focus = SCHED[dow]
            skill = load_skill()
            results = []
            for level, yards, notes in LEVELS:
              try:
                if skill:
                  framework = '=== SWIM-SETS SKILL (programming framework) ===\n' + skill + '\n=== END SKILL ==='
                else:
                  framework = 'Level guidance (skill unavailable): ' + notes
                p = PROMPT.format(framework=framework, day=now.strftime('%A'), focus=focus, level=level, yards=yards)
                raw = invoke(p)
                s = raw.find('{'); e = raw.rfind('}') + 1
                data = json.loads(raw[s:e])
                # Deterministic setId (level + service day) so re-running the
                # generator for a given day overwrites that day's archived set
                # rather than creating a duplicate: exactly one set is archived
                # per level per day.
                sid = '%s-%s' % (level, date_str)
                data.update({'date': date_str, 'level': level, 'setId': sid})
                daily_tbl.put_item(Item={'level': level, 'setData': json.dumps(data), 'date': date_str, 'generatedAt': now.isoformat()})
                arch_tbl.put_item(Item={
                  'setId': sid, 'level': level, 'date': date_str,
                  'title': data.get('title', ''), 'totalYards': data.get('totalYards', yards),
                  'estimatedMinutes': data.get('estimatedMinutes', 0),
                  'strokeFocus': data.get('strokeFocus', STROKE[dow]),
                  'intensity': data.get('intensity', 'aerobic'),
                  'setType': data.get('setType', 'endurance'),
                  'distanceCategory': data.get('distanceCategory', 'mid'),
                  'setData': json.dumps(data), 'generatedAt': now.isoformat()
                })
                results.append({'level': level, 'status': 'ok'})
              except Exception as ex:
                print('generate failed for %s: %s' % (level, ex))
                results.append({'level': level, 'status': 'error', 'error': str(ex)})
            ok = sum(1 for r in results if r['status'] == 'ok')
            # If every level failed (bad model ID, Bedrock access revoked, etc.),
            # raise so the failure is loud instead of a silent 200 with an empty
            # results set. EventBridge then retries the schedule, and the deploy
            # step's `aws lambda invoke` reports a FunctionError that fails CI —
            # rather than leaving the site with no sets for the day unnoticed.
            if ok == 0:
              raise RuntimeError('generate-sets wrote no sets for %s: %s' % (date_str, json.dumps(results)))
            return {'statusCode': 200, 'body': json.dumps({'results': results, 'date': date_str})}

  GetDailySetsFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: streamline-get-daily-sets
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 15
      Code:
        ZipFile: |
          import json, boto3
          dynamo = boto3.resource('dynamodb')
          tbl = dynamo.Table('streamline-daily-sets')
          CORS = {'Access-Control-Allow-Origin':'*','Access-Control-Allow-Headers':'Content-Type','Content-Type':'application/json'}
          VALID = ('beginner','intermediate','advanced','pro')
          def handler(event, context):
            if (event.get('requestContext') or {}).get('http', {}).get('method') == 'OPTIONS':
              return {'statusCode':200,'headers':CORS,'body':''}
            p = (event.get('queryStringParameters') or {})
            level = (p.get('level') or '').strip().lower()
            if level not in VALID:
              return {'statusCode':400,'headers':CORS,'body':json.dumps({'error':'level must be one of: ' + ', '.join(VALID)})}
            try:
              r = tbl.get_item(Key={'level':level})
              if 'Item' not in r:
                return {'statusCode':404,'headers':CORS,'body':json.dumps({'error':'No set has been generated yet for this level'})}
              # Always serve whatever set is currently stored for this level.
              # The table holds exactly one row per level, overwritten only when
              # the generator pushes a new set at 12:01 AM Pacific. So once a set
              # is pushed it stays on the page, unchanged, until the next day's
              # set replaces it — and if a day's generation ever fails, the most
              # recent set keeps showing instead of the page breaking. We do not
              # gate on the stored date: that previously 404'd yesterday's set
              # the instant midnight Pacific rolled over, before (or if) the new
              # set finished generating.
              return {'statusCode':200,'headers':CORS,'body':r['Item']['setData']}
            except Exception as e:
              return {'statusCode':500,'headers':CORS,'body':json.dumps({'error':str(e)})}

  GetArchivesFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: streamline-get-archives
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      Code:
        ZipFile: |
          import json, boto3, decimal
          from boto3.dynamodb.conditions import Attr
          dynamo = boto3.resource('dynamodb')
          tbl = dynamo.Table('streamline-set-archives')
          CORS = {'Access-Control-Allow-Origin':'*','Access-Control-Allow-Headers':'Content-Type','Content-Type':'application/json'}
          def dec(o):
            if isinstance(o, decimal.Decimal):
              return int(o) if o % 1 == 0 else float(o)
            raise TypeError
          def handler(event, context):
            if (event.get('requestContext') or {}).get('http', {}).get('method') == 'OPTIONS':
              return {'statusCode':200,'headers':CORS,'body':''}
            p = (event.get('queryStringParameters') or {})
            fe = None
            def add(f):
              nonlocal fe
              fe = f if fe is None else fe & f
            lv=p.get('level',''); sk=p.get('stroke',''); ins=p.get('intensity',''); st=p.get('type',''); ds=p.get('distance','')
            if lv: add(Attr('level').eq(lv))
            if sk: add(Attr('strokeFocus').eq(sk))
            if ins: add(Attr('intensity').eq(ins))
            if st: add(Attr('setType').eq(st))
            if ds: add(Attr('distanceCategory').eq(ds))
            proj = 'setId,#lv,#dt,title,totalYards,estimatedMinutes,strokeFocus,intensity,setType,distanceCategory,setData'
            kw = {'ProjectionExpression':proj,'ExpressionAttributeNames':{'#lv':'level','#dt':'date'}}
            if fe: kw['FilterExpression'] = fe
            try:
              items = []
              r = tbl.scan(**kw)
              items += r['Items']
              while 'LastEvaluatedKey' in r:
                r = tbl.scan(**kw, ExclusiveStartKey=r['LastEvaluatedKey'])
                items += r['Items']
              # Only one set should be archived per level per day. Older runs
              # used a random setId, so re-generations left duplicate rows for
              # the same (level, date). Keep one per (level, date) and delete
              # the rest from the table so the archive self-heals.
              kept, dupes = [], []
              seen = {}
              for it in items:
                key = (it.get('level',''), it.get('date',''))
                if not key[0] or not key[1]:
                  kept.append(it); continue
                if key in seen:
                  dupes.append(it)
                else:
                  seen[key] = True
                  kept.append(it)
              if dupes:
                try:
                  with tbl.batch_writer() as bw:
                    for d in dupes:
                      if d.get('setId'):
                        bw.delete_item(Key={'setId': d['setId']})
                except Exception as de:
                  print('archive dedupe delete failed: %s' % de)
              items = kept
              items.sort(key=lambda x: x.get('date',''), reverse=True)
              return {'statusCode':200,'headers':CORS,'body':json.dumps({'items':items},default=dec)}
            except Exception as e:
              return {'statusCode':500,'headers':CORS,'body':json.dumps({'error':str(e)})}

  # ─── DRYLAND GENERATOR + READ FUNCTIONS ────────────────────────────────────
  # Parallel to the swim-set stack: a Bedrock generator writes today's dryland
  # workout for each equipment category at 12:01 AM Pacific, and two read
  # functions serve today's workout and the archive.

  GenerateDrylandFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: streamline-generate-dryland
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      Environment:
        Variables:
          SKILL_URL: !Sub "https://${DomainName}/dryland.md"
      Code:
        ZipFile: |
          import json, os, boto3, urllib.request
          from datetime import datetime
          from zoneinfo import ZoneInfo

          # Workouts are keyed by the Pacific "service day" so the date only rolls
          # over at midnight Pacific (when the schedule generates them), matching
          # the swim-set generator and the "fresh plan at midnight Pacific" promise.
          PACIFIC = ZoneInfo('America/Los_Angeles')

          bedrock = boto3.client('bedrock-runtime', region_name='us-east-1')
          dynamo = boto3.resource('dynamodb')
          daily_tbl = dynamo.Table('streamline-daily-dryland')
          arch_tbl = dynamo.Table('streamline-dryland-archives')

          # dryland.md (the swim-dryland skill) is the single source of truth for
          # how dryland sessions are programmed. It is fetched from the live site
          # and injected into the prompt; the inline schedule below is the fallback.
          SKILL_URL = os.environ.get('SKILL_URL', '')
          _skill_cache = {}

          def load_skill():
            if 'text' in _skill_cache:
              return _skill_cache['text']
            text = ''
            if SKILL_URL:
              try:
                with urllib.request.urlopen(SKILL_URL, timeout=10) as r:
                  text = r.read().decode('utf-8')
              except Exception as ex:
                print('skill fetch failed: %s' % ex)
            _skill_cache['text'] = text
            return text

          # weekday() -> (training focus, stroke emphasis, primary muscles, intensity)
          SCHED = {
            0: ('Core & Stability', 'Freestyle / Backstroke', 'Obliques, transverse abdominis, erector spinae, hip flexors, glutes (stability)', 'stability'),
            1: ('Shoulder, Lat & Upper Back', 'Butterfly', 'Latissimus dorsi, rotator cuff, trapezius, posterior deltoid, biceps/forearms', 'strength'),
            2: ('Lower Body Power & Explosiveness', 'All Strokes (Starts & Turns)', 'Quadriceps, hamstrings, glutes, hip adductors/abductors, calves', 'power'),
            3: ('Upper Body Strength', 'Breaststroke', 'Pectorals, triceps, anterior deltoid, lats (secondary), inner chest', 'strength'),
            4: ('Full Body Mobility & Recovery', 'IM / All Strokes', 'Shoulder capsule, hip flexors, hamstrings, ankles, thoracic spine', 'mobility'),
            5: ('Rest or Light Movement', '—', '—', 'recovery'),
            6: ('Full Rest', '—', '—', 'recovery'),
          }

          # (id, label, equipment description). Mirrors the three frontend tabs and
          # the skill's three equipment categories.
          CATEGORIES = [
            ('bodyweight', 'Bodyweight', 'Yoga mat only — zero equipment, every movement done on or from the floor'),
            ('freeweights', 'Free Weights', 'Home gym — adjustable dumbbells, a flat bench or sturdy chair, resistance bands. No barbell, cable machine, or pull-up bar.'),
            ('commercial', 'Commercial Gym', 'Full access — barbells, dumbbells, cables, machines, pull-up bar, bench, box, medicine balls, bands'),
          ]

          # Skill default when no duration is specified.
          MINUTES = 30

          PROMPT = """You are the Streamline daily dryland coach. Write today's dryland session for ONE equipment category only.

          {framework}

          Today is {day}. Training focus: {focus}. Stroke emphasis: {stroke}. Primary muscle groups: {muscles}. Write the session for the {cat_label} category ({equipment}), about {minutes} minutes total.

          Use the dryland framework above as your single source of truth: honor the day's training focus, stroke emphasis and primary muscle groups; follow the Workout Duration & Structure split for a {minutes}-minute session (warm-up / main work / cool-down); apply the day's required movement rules (e.g. Monday's anti-rotation + rotational core blocks; Tuesday's roughly 2:1 pull-to-press ratio with a mandatory shoulder-health movement; Wednesday plyometrics-first with full rest then strength; Thursday compound-first heavier pressing and pulling with face pulls/external rotation included; Friday restorative mobility only, no loading); and pull stroke-specific movements from the library for the {stroke} emphasis. Select exercises that fit the {cat_label} equipment ONLY — never prescribe equipment this category does not have.

          IMPORTANT — response format: IGNORE the framework's "Output Format" markdown layout for THIS response. Do NOT return markdown. Return ONLY valid JSON, no preamble, no explanation, matching exactly:
          {{"title":"short descriptive title built from the focus only, e.g. Lat-Dominant Pull & Shoulder Health. Do NOT include the day of the week or any date.","trainingFocus":"{focus}","strokeEmphasis":"{stroke}","primaryMuscles":"{muscles}","estimatedMinutes":{minutes},"equipment":"one short phrase naming the gear this session actually uses","intensity":"stability|strength|power|mobility|recovery","focusCue":"2-3 sentence coach's cue connecting today's dryland to swim performance, do not use em dashes","coachNote":"one tight closing sentence specific to this day and category","sections":[{{"name":"Warm-Up | Main Work · Block 1 — <theme> | Main Work · Block 2 — <theme> | Cool-Down & Mobility","duration":"~N min","items":[{{"exercise":"movement name","prescription":"sets x reps, a timed hold, or a movement/time cue e.g. 3 x 12 or 3 x 30 sec or 20 each direction","note":"short informational note OR null. State only HOW to perform the movement (form, tempo, range of motion, setup), e.g. \\"slow eccentric\\" or \\"keep ribs down\\" or \\"pause at the bottom\\". No coaching, motivational, or hype language, no justifications or emphasis. Keep it to a terse factual phrase.","muscles":["target muscle tag","..."]}}]}}]}}
          Sections in order: Warm-Up, one or more Main Work blocks, Cool-Down & Mobility. estimatedMinutes must equal {minutes}. Keep every exercise strictly within the {cat_label} equipment.
          IMPORTANT writing rule for ALL descriptor text (every item "note", the "focusCue" and the "coachNote"): NEVER use em dashes or en dashes (— or –). Item notes must be purely informational about how to perform the movement, with zero coaching or motivational language."""

          def invoke(prompt):
            # Haiku 4.5 on Bedrock is inference-profile-only, so use the US
            # cross-region inference profile (this Lambda runs in us-east-1).
            r = bedrock.invoke_model(
              modelId='us.anthropic.claude-haiku-4-5',
              body=json.dumps({'anthropic_version':'bedrock-2023-05-31','max_tokens':8000,'messages':[{'role':'user','content':prompt}]})
            )
            return json.loads(r['body'].read())['content'][0]['text'].strip()

          def rest_day(dow):
            # Saturday: optional light movement. Sunday: full rest. Same payload for
            # every category so the page always shows a card instead of a 404.
            if dow == 5:
              return {
                'title': 'Active Recovery & Light Movement',
                'trainingFocus': 'Rest or Light Movement', 'strokeEmphasis': '—',
                'primaryMuscles': 'Full body (light)', 'estimatedMinutes': 20,
                'equipment': 'None required', 'intensity': 'recovery', 'isRestDay': True,
                'focusCue': "Saturday is a deliberate down day. Move easy to flush the legs and shoulders without adding fatigue, so you walk into next week recovered and ready to train hard.",
                'coachNote': 'Move easy, breathe, and let the week settle. No loading today.',
                'sections': [{
                  'name': 'Optional Light Movement', 'duration': '~20 min', 'items': [
                    {'exercise': 'Easy walk, jog, or light spin', 'prescription': '15-20 min', 'note': 'Conversational pace, nothing taxing', 'muscles': ['Full body']},
                    {'exercise': 'Full-body mobility flow', 'prescription': '5-8 min', 'note': 'Cobra to downward dog, hip openers, shoulder CARS', 'muscles': ['Shoulders', 'Hips', 'Spine']},
                    {'exercise': 'Light band pull-aparts', 'prescription': '2 x 15', 'note': 'Optional, very light, just keep the shoulders healthy', 'muscles': ['Upper back', 'Rotator cuff']},
                  ]
                }]
              }
            return {
              'title': 'Full Rest Day',
              'trainingFocus': 'Full Rest', 'strokeEmphasis': '—',
              'primaryMuscles': '—', 'estimatedMinutes': 0,
              'equipment': 'None', 'intensity': 'recovery', 'isRestDay': True,
              'focusCue': "Sunday is full rest. Adaptation happens while you recover, the work you put in this week becomes speed and strength now. Sleep, hydrate, eat well, and let your body rebuild.",
              'coachNote': 'No dryland today. Rest is part of the program.',
              'sections': []
            }

          def handler(event, context):
            now = datetime.now(PACIFIC)
            date_str = now.strftime('%Y-%m-%d')
            day_name = now.strftime('%A')
            dow = now.weekday()
            focus, stroke, muscles, intensity = SCHED[dow]
            is_rest = dow >= 5
            skill = load_skill()
            results = []
            for cat, cat_label, equipment in CATEGORIES:
              try:
                if is_rest:
                  data = rest_day(dow)
                else:
                  if skill:
                    framework = '=== SWIM-DRYLAND SKILL (programming framework) ===\n' + skill + '\n=== END SKILL ==='
                  else:
                    framework = 'Schedule guidance (skill unavailable): focus %s, stroke %s, muscles %s.' % (focus, stroke, muscles)
                  p = PROMPT.format(framework=framework, day=day_name, focus=focus, stroke=stroke, muscles=muscles, cat_label=cat_label, equipment=equipment, minutes=MINUTES)
                  raw = invoke(p)
                  s = raw.find('{'); e = raw.rfind('}') + 1
                  data = json.loads(raw[s:e])
                  data['isRestDay'] = False
                # Deterministic workoutId (category + service day) so re-running the
                # generator overwrites that day's row rather than duplicating it.
                wid = '%s-%s' % (cat, date_str)
                data.update({'date': date_str, 'category': cat, 'workoutId': wid, 'day': day_name})
                daily_tbl.put_item(Item={'category': cat, 'workoutData': json.dumps(data), 'date': date_str, 'generatedAt': now.isoformat()})
                # Saturday/Sunday rest days still appear on the daily page, but
                # they are not workouts so they are never written to the archive.
                if not bool(data.get('isRestDay', is_rest)):
                  arch_tbl.put_item(Item={
                    'workoutId': wid, 'category': cat, 'date': date_str, 'day': day_name,
                    'title': data.get('title', ''), 'trainingFocus': data.get('trainingFocus', focus),
                    'strokeEmphasis': data.get('strokeEmphasis', stroke), 'intensity': data.get('intensity', intensity),
                    'estimatedMinutes': data.get('estimatedMinutes', MINUTES), 'isRestDay': False,
                    'workoutData': json.dumps(data), 'generatedAt': now.isoformat()
                  })
                results.append({'category': cat, 'status': 'ok'})
              except Exception as ex:
                print('generate dryland failed for %s: %s' % (cat, ex))
                results.append({'category': cat, 'status': 'error', 'error': str(ex)})
            ok = sum(1 for r in results if r['status'] == 'ok')
            # If every category failed, raise so the failure is loud (EventBridge
            # retries, and a manual invoke reports a FunctionError) instead of a
            # silent 200 that leaves the site with no dryland for the day.
            if ok == 0:
              raise RuntimeError('generate-dryland wrote nothing for %s: %s' % (date_str, json.dumps(results)))
            return {'statusCode': 200, 'body': json.dumps({'results': results, 'date': date_str})}

  GetDailyDrylandFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: streamline-get-daily-dryland
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 15
      Code:
        ZipFile: |
          import json, boto3
          dynamo = boto3.resource('dynamodb')
          tbl = dynamo.Table('streamline-daily-dryland')
          CORS = {'Access-Control-Allow-Origin':'*','Access-Control-Allow-Headers':'Content-Type','Content-Type':'application/json'}
          VALID = ('bodyweight','freeweights','commercial')
          def handler(event, context):
            if (event.get('requestContext') or {}).get('http', {}).get('method') == 'OPTIONS':
              return {'statusCode':200,'headers':CORS,'body':''}
            p = (event.get('queryStringParameters') or {})
            category = (p.get('category') or '').strip().lower()
            if category not in VALID:
              return {'statusCode':400,'headers':CORS,'body':json.dumps({'error':'category must be one of: ' + ', '.join(VALID)})}
            try:
              r = tbl.get_item(Key={'category':category})
              if 'Item' not in r:
                return {'statusCode':404,'headers':CORS,'body':json.dumps({'error':'No dryland workout has been generated yet for this category'})}
              # Serve whatever workout is currently stored. The table holds exactly
              # one row per category, overwritten only when the generator pushes a
              # new workout at 12:01 AM Pacific, so a workout stays up until the next
              # day's replaces it (and a failed day keeps the prior one instead of
              # breaking the page). We do not gate on the stored date.
              return {'statusCode':200,'headers':CORS,'body':r['Item']['workoutData']}
            except Exception as e:
              return {'statusCode':500,'headers':CORS,'body':json.dumps({'error':str(e)})}

  GetDrylandArchivesFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: streamline-get-dryland-archives
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      Code:
        ZipFile: |
          import json, boto3, decimal
          from boto3.dynamodb.conditions import Attr
          dynamo = boto3.resource('dynamodb')
          tbl = dynamo.Table('streamline-dryland-archives')
          CORS = {'Access-Control-Allow-Origin':'*','Access-Control-Allow-Headers':'Content-Type','Content-Type':'application/json'}
          def dec(o):
            if isinstance(o, decimal.Decimal):
              return int(o) if o % 1 == 0 else float(o)
            raise TypeError
          def handler(event, context):
            if (event.get('requestContext') or {}).get('http', {}).get('method') == 'OPTIONS':
              return {'statusCode':200,'headers':CORS,'body':''}
            p = (event.get('queryStringParameters') or {})
            fe = None
            def add(f):
              nonlocal fe
              fe = f if fe is None else fe & f
            cat=p.get('category',''); fo=p.get('focus',''); sk=p.get('stroke',''); ins=p.get('intensity','')
            if cat: add(Attr('category').eq(cat))
            if fo: add(Attr('trainingFocus').eq(fo))
            if sk: add(Attr('strokeEmphasis').eq(sk))
            if ins: add(Attr('intensity').eq(ins))
            proj = 'workoutId,category,#dt,#dy,title,trainingFocus,strokeEmphasis,intensity,estimatedMinutes,isRestDay,workoutData'
            kw = {'ProjectionExpression':proj,'ExpressionAttributeNames':{'#dt':'date','#dy':'day'}}
            if fe: kw['FilterExpression'] = fe
            try:
              items = []
              r = tbl.scan(**kw)
              items += r['Items']
              while 'LastEvaluatedKey' in r:
                r = tbl.scan(**kw, ExclusiveStartKey=r['LastEvaluatedKey'])
                items += r['Items']
              # One workout per category per day. Keep one per (category, date),
              # and drop Saturday/Sunday rest days entirely (they are not workouts).
              # Duplicates and rest-day rows are deleted so the archive self-heals.
              kept, dupes, seen = [], [], {}
              for it in items:
                if it.get('isRestDay'):
                  dupes.append(it); continue
                key = (it.get('category',''), it.get('date',''))
                if not key[0] or not key[1]:
                  kept.append(it); continue
                if key in seen:
                  dupes.append(it)
                else:
                  seen[key] = True; kept.append(it)
              if dupes:
                try:
                  with tbl.batch_writer() as bw:
                    for d in dupes:
                      if d.get('workoutId'):
                        bw.delete_item(Key={'workoutId': d['workoutId']})
                except Exception as de:
                  print('dryland archive dedupe delete failed: %s' % de)
              items = kept
              items.sort(key=lambda x: x.get('date',''), reverse=True)
              return {'statusCode':200,'headers':CORS,'body':json.dumps({'items':items},default=dec)}
            except Exception as e:
              return {'statusCode':500,'headers':CORS,'body':json.dumps({'error':str(e)})}

  # ─── API GATEWAY HTTP API ──────────────────────────────────────────────────

  # Serves all stored blog edits (GET) and saves them after password check (POST).
  BlogEditsFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: streamline-blog-edits
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 15
      Environment:
        Variables:
          EDITOR_PASSWORD: !Ref EditorPassword
      Code:
        ZipFile: |
          import json, os, hmac, boto3
          dynamo = boto3.resource('dynamodb')
          tbl = dynamo.Table('streamline-blog-edits')
          PW = os.environ.get('EDITOR_PASSWORD', '')
          CORS = {'Access-Control-Allow-Origin':'*','Access-Control-Allow-Headers':'Content-Type','Access-Control-Allow-Methods':'GET,POST,OPTIONS','Content-Type':'application/json'}
          MAX_LEN = 200000  # per-region HTML cap (~200 KB)
          def resp(code, obj):
            return {'statusCode':code,'headers':CORS,'body':json.dumps(obj)}
          def ok_pw(supplied):
            # Constant-time compare; empty server password disables all writes.
            return bool(PW) and isinstance(supplied, str) and hmac.compare_digest(supplied, PW)
          def handler(event, context):
            method = (event.get('requestContext') or {}).get('http', {}).get('method', '')
            if method == 'OPTIONS':
              return {'statusCode':200,'headers':CORS,'body':''}
            if method == 'GET':
              try:
                out = {}
                kw = {}
                while True:
                  r = tbl.scan(**kw)
                  for it in r.get('Items', []):
                    pid = it.get('pageId')
                    if not pid: continue
                    rec = {}
                    if 'title' in it: rec['title'] = it['title']
                    if 'body' in it: rec['body'] = it['body']
                    out[pid] = rec
                  if 'LastEvaluatedKey' not in r: break
                  kw['ExclusiveStartKey'] = r['LastEvaluatedKey']
                return resp(200, {'edits': out})
              except Exception as e:
                return resp(500, {'error': str(e)})
            if method == 'POST':
              try:
                body = json.loads(event.get('body') or '{}')
              except Exception:
                return resp(400, {'error': 'invalid JSON'})
              if not ok_pw(body.get('password')):
                return resp(401, {'error': 'unauthorized'})
              # A verify ping carries no edits; a correct password alone is success.
              edits = body.get('edits') or {}
              if not isinstance(edits, dict):
                return resp(400, {'error': 'edits must be an object'})
              # Optional: list of page ids to clear back to their shipped text.
              reset = body.get('reset') or []
              saved = 0
              try:
                if isinstance(reset, list):
                  for pid in reset:
                    if isinstance(pid, str) and pid.startswith('page-'):
                      tbl.delete_item(Key={'pageId': pid})
                for pid, regions in edits.items():
                  # Only accept real article page ids to keep the table clean.
                  if not isinstance(pid, str) or not pid.startswith('page-'):
                    continue
                  if not isinstance(regions, dict):
                    continue
                  names, values, sets = {}, {}, []
                  for k in ('title', 'body'):
                    if k in regions and regions[k] is not None:
                      v = str(regions[k])
                      if len(v) > MAX_LEN:
                        return resp(413, {'error': 'content too large for ' + pid})
                      names['#' + k] = k
                      values[':' + k] = v
                      sets.append('#%s = :%s' % (k, k))
                  if not sets:
                    continue
                  tbl.update_item(Key={'pageId': pid}, UpdateExpression='SET ' + ', '.join(sets),
                                  ExpressionAttributeNames=names, ExpressionAttributeValues=values)
                  saved += 1
                return resp(200, {'ok': True, 'saved': saved})
              except Exception as e:
                return resp(500, {'error': str(e)})
            return resp(405, {'error': 'method not allowed'})

  # ─── PERSONAL TRAINING PLAN (My Training) ──────────────────────────────────
  # Builds each account's personalized weekly training plan from their profile:
  # the personal-trainer skill designs the week (schedule, periodization,
  # nutrition, meals) and the swim-sets / dryland skills program each session.
  # POST /training-plan validates the session token and serves the cached plan;
  # when the profile changed or a new Pacific week started, it kicks off an
  # async self-invocation that runs the multi-minute Bedrock generation while
  # the site polls for the finished plan.
  TrainingPlanFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: streamline-training-plan
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 900
      MemorySize: 512
      Environment:
        Variables:
          SELF_FUNCTION: streamline-training-plan
          TRAINER_SKILL_URL: !Sub "https://${DomainName}/personal-trainer.md"
          SWIM_SKILL_URL: !Sub "https://${DomainName}/swim-sets.md"
          DRYLAND_SKILL_URL: !Sub "https://${DomainName}/dryland.md"
      Code:
        ZipFile: |
          import json, os, time, hashlib, boto3, urllib.request
          from concurrent.futures import ThreadPoolExecutor
          from datetime import datetime, timedelta
          from zoneinfo import ZoneInfo

          # Plans are keyed to the Pacific "service week" (Monday start) so they
          # roll over on the same clock as the daily set/dryland generators.
          PACIFIC = ZoneInfo('America/Los_Angeles')

          bedrock = boto3.client('bedrock-runtime', region_name='us-east-1')
          dynamo = boto3.resource('dynamodb')
          plans = dynamo.Table('streamline-training-plans')
          users = dynamo.Table('streamline-users')
          tokens = dynamo.Table('streamline-auth-tokens')
          lam = boto3.client('lambda')

          CORS = {'Access-Control-Allow-Origin':'*','Access-Control-Allow-Headers':'Content-Type','Content-Type':'application/json'}
          SELF_FUNCTION = os.environ.get('SELF_FUNCTION', 'streamline-training-plan')

          # personal-trainer.md is the head-coach framework (week design,
          # periodization, safety); swim-sets.md and dryland.md program the
          # individual sessions. All three are fetched from the live site,
          # mirroring the daily generators.
          SKILL_URLS = {'trainer': os.environ.get('TRAINER_SKILL_URL', ''),
                        'swim': os.environ.get('SWIM_SKILL_URL', ''),
                        'dryland': os.environ.get('DRYLAND_SKILL_URL', '')}
          _skills = {}

          def load_skill(name):
            if name not in _skills:
              text = ''
              url = SKILL_URLS.get(name) or ''
              if url:
                try:
                  with urllib.request.urlopen(url, timeout=10) as r:
                    text = r.read().decode('utf-8')
                except Exception as ex:
                  print('skill fetch failed %s: %s' % (name, ex))
              _skills[name] = text
            return _skills[name]

          DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday']
          # Deliberately excludes raw body metrics (age, height, weight, gender):
          # the site computes maintenance calories + macro targets in the browser
          # and stores only those results plus an isAdult flag. Raw metrics, health
          # data, and location are never collected here, must not flow into prompts
          # or the profile hash. Nutrition (calorie/macro) output is adults-only.
          PROFILE_KEYS = ['maintenanceCalories','proteinG','carbG','fatG','isAdult',
                          'skillLevel','trainingFor','fitnessGoal',
                          'swimGoal','strokeFocus','muscleFocus','swimDays','drylandDays','workoutTime',
                          'poolAccess','gymAccess','gear']

          def is_adult(profile):
            # Nutrition is restricted to adults. New profiles carry an explicit
            # isAdult flag; legacy profiles fall back to a stored age if present.
            # Anything ambiguous is treated as a minor (no nutrition) — fail safe.
            v = (profile or {}).get('isAdult')
            if isinstance(v, bool):
              return v
            if isinstance(v, str) and v.strip():
              return v.strip().lower() in ('true', '1', 'yes')
            try:
              return float((profile or {}).get('age') or 0) >= 18
            except (TypeError, ValueError):
              return False

          def resp(code, data):
            return {'statusCode': code, 'headers': CORS, 'body': json.dumps(data)}

          def profile_hash(profile):
            slim = {k: profile.get(k, '') for k in PROFILE_KEYS}
            return hashlib.sha256(json.dumps(slim, sort_keys=True).encode()).hexdigest()

          def week_start(now):
            return (now.date() - timedelta(days=now.weekday())).isoformat()

          def swim_level(profile):
            s = (profile.get('skillLevel') or '').lower()
            for lvl in ('pro', 'advanced', 'intermediate'):
              if lvl in s:
                return lvl
            return 'beginner'

          # Map the profile's gym-access answer to the dryland skill's three
          # equipment categories (the same ones the daily dryland generator uses).
          def lift_category(profile):
            g = (profile.get('gymAccess') or '').lower()
            if 'no gym' in g:
              return ('Bodyweight', 'Yoga mat only, zero equipment, every movement done on or from the floor')
            if 'home' in g or 'limited' in g:
              return ('Free Weights', 'Home gym: adjustable dumbbells, a flat bench or sturdy chair, resistance bands. No barbell, cable machine, or pull-up bar.')
            return ('Commercial Gym', 'Full access: barbells, dumbbells, cables, machines, pull-up bar, bench, box, medicine balls, bands')

          def invoke_model(prompt, max_tokens):
            # Personal-coaching plans (and the recipes generated from them) stay
            # on Sonnet 4.6, via the US cross-region inference profile.
            r = bedrock.invoke_model(
              modelId='us.anthropic.claude-sonnet-4-6',
              body=json.dumps({'anthropic_version': 'bedrock-2023-05-31', 'max_tokens': max_tokens,
                               'messages': [{'role': 'user', 'content': prompt}]})
            )
            return json.loads(r['body'].read())['content'][0]['text'].strip()

          def gen_json(prompt, max_tokens):
            last = None
            for attempt in range(2):
              try:
                raw = invoke_model(prompt, max_tokens)
                return json.loads(raw[raw.find('{'):raw.rfind('}') + 1])
              except Exception as ex:
                last = ex
                print('generation attempt %d failed: %s' % (attempt, ex))
            raise last

          SKELETON_PROMPT = """You are the LANE FOUR head swim coach building a personalized training week.

          %(framework)s

          ATHLETE PROFILE (site intake form; empty fields were left blank): %(profile)s

          Today is %(today)s. The plan covers the 7 days Monday through Sunday of the week starting Monday %(week_start)s. Treat this as week %(week_number)s of a rolling 4-week block (weeks 1-3 progress, week 4 is a deload) unless the athlete's goals name a specific event or date, in which case back-cast Base/Build/Peak/Taper phases from that date as the framework describes.

          Design the training week ONLY, no workout content yet, following the framework's Step 1 and Step 2 exactly: honor the athlete's available swim days and dryland days (never schedule a session on a day they don't have), the allocation heuristics for their level, the interference rules, the roughly 60/40 target-to-supporting stroke split, and youth/masters handling. Site constraint: at most one swim and one lift per day, no double swims. Every week includes at least one full rest day.

          ADULTS ONLY — NUTRITION GATE: Nutrition is a feature for athletes 18 and older. If the profile field "isAdult" is not true, OR "maintenanceCalories" is missing or empty, the athlete is a minor or has not provided body metrics: you MUST return "nutrition":{} and "meals":{} with absolutely no calorie or macro numbers of any kind, and put nothing about calories, macros, weight, or dieting anywhere in the plan. This is a hard rule with no exceptions. Do NOT estimate, infer, or ask for the missing numbers.

          Otherwise (adult with maintenanceCalories present): do NOT compute calories from body measurements — they are not provided. Use the profile's precomputed daily MAINTENANCE targets: "maintenanceCalories" and the macro targets "proteinG", "carbG", "fatG". Set the day's calories relative to maintenance from the fitness goal: a moderate deficit (about 10 to 20 percent below maintenance) only for fat-loss goals, a small surplus (about 5 to 15 percent above) for muscle or weight gain, otherwise maintenance. Hold protein near the provided proteinG, keep fat at least 20 percent of calories, and scale carbs to fill the remaining calories. Then split the day's targets into two one-day meal schedules (a training-day schedule and a rest-day schedule). Each meal is a SLOT, not a menu: give it a name, a realistic time of day anchored to the athlete's preferred workout time, a per-meal macro budget, and optionally one short note tying the slot to training. Do NOT write menus or name specific dishes; the athlete asks for a recipe for any slot on demand.

          Eating-disorder safety rail (adults): this is nutrition for athletic performance, never for extreme restriction. Never set calories below about 90 percent of the provided maintenanceCalories on any single day except a brief, intentional pre-meet context, never build rapid-weight-loss or compensatory eat-less-because-you-trained-less schemes. If the profile's goals contain language suggesting disordered eating (extreme calorie targets, punishing food rules, fear of eating, wanting to earn or burn off food), ignore that language, build the plan at maintenance, and use part of the rationale to gently encourage the athlete to talk with a coach, doctor, or registered dietitian; free confidential support is available from the National Eating Disorders Association at nationaleatingdisorders.org or by calling or texting 988.

          Return ONLY valid JSON, no preamble, no markdown, matching exactly:
          {"phase":"Base|Build|Peak|Taper|Deload","phaseLabel":"e.g. Build, Week 2 of 4","goalLine":"one line combining the swimming goal and fitness goal","phaseRoadmap":"one line, e.g. Rolling 4-week blocks: 3 progressive weeks then 1 deload week","rationale":"3-5 sentences spoken directly TO the athlete in second person, like a coach on deck giving their swimmer the rundown of the week before Monday practice: name the phase and what it means for them right now, walk through how their swims, lifts, and rest fit around each other, and tell them what you want them to focus on. Warm, direct coach voice; address the athlete as you and never describe them in third person (never their age, gender, or level as facts about them). No em dashes","nutrition":{"calories":N,"proteinG":N,"carbsG":N,"fatG":N,"restDayNote":"one short line, e.g. Rest days: same protein, drop carbs about 40 g"},"days":[{"day":"Monday","label":"Swim + Lift|Swim|Lift|Active Recovery|Rest","swim":{"focus":"freestyle|backstroke|breaststroke|butterfly|im|sprint|choice","secondary":"endurance|technique|speed|threshold|race prep|recovery","yards":N}or null,"lift":{"focus":"Core & Stability|Shoulder, Lat & Upper Back|Lower Body Power|Upper Body Strength|Mobility & Recovery|Full Body","minutes":N}or null,"recovery":"short description only for Active Recovery days, else null","timeLabel":"~1:20 total session time, or a dash for rest days","mealType":"training|rest"}],"meals":{"training":[{"name":"Breakfast","time":"7:00 AM","note":"short note tying the slot to training, e.g. eat 90 minutes before practice, or null","calories":N,"proteinG":N,"carbsG":N,"fatG":N}],"rest":[{"name":"Breakfast","time":"8:00 AM","note":null,"calories":N,"proteinG":N,"carbsG":N,"fatG":N}]}}
          "days" must contain all 7 days Monday through Sunday in order. Each meals list has 3 meals plus 1 or 2 snacks. Every meal carries its own calories and macros; a day's meals must sum to within about 5 percent of the daily targets (rest-day meals to the rest-day adjusted targets). Swim yards must sit inside the athlete's level range (beginner 1200-2000, intermediate 2500-3800, advanced 4500-6500, pro 7000-12000). Do not use em dashes anywhere in any text value."""

          SWIM_PROMPT = """You are the LANE FOUR personal swim coach writing ONE practice inside an athlete's weekly plan.

          %(framework)s

          Athlete level: %(level)s. Training phase: %(phase)s. This is %(day)s's swim. Stroke focus: %(focus)s. Secondary focus: %(secondary)s. Target volume: about %(yards)s yards.
          Gear the athlete owns (prescribe ONLY this gear; substitute drills that need anything else): %(gear)s.

          Use the swim-sets framework above as your single source of truth: apply the %(level)s level's volume range, intervals, technique emphasis and coaching tone; honor the stroke focus and secondary focus, the single-swim distance caps, the warm-up / cool-down standards, and the stroke-specific drill library (use the Pre-Main for focus-stroke drills), all adjusted for the %(phase)s phase. Main sets must have internal structure (descending, build, pyramid, broken, neg split, odds/evens), not flat repeats.

          IMPORTANT response format: IGNORE the framework's "Output Format" section and its markdown/whiteboard layout for THIS response. Do NOT return markdown. Return ONLY valid JSON, no preamble, matching exactly:
          {"title":"descriptive title built from the set's focuses only (stroke, intensity, set type), ending with the secondary focus. No day of the week or date.","totalYards":N,"estimatedMinutes":N,"strokeFocus":"freestyle|backstroke|butterfly|breaststroke|im|choice","intensity":"aerobic|threshold|sprint|recovery","focusCue":"2-3 sentence coach's cue said at the start of practice, level-appropriate language","sections":[{"name":"Warm-Up|Pre-Main|Main Set|Post-Main|Cool-Down","yards":N,"items":[{"text":"one whiteboard line, e.g. 4x 100 free @1:30","note":"short informational note OR null. State only HOW to execute this piece (stroke, pace, equipment, breathing pattern, interval mechanics). No coaching, motivational, or hype language. Terse factual phrase."}]}]}
          Sections in order: Warm-Up, Pre-Main, Main Set, optional Post-Main, Cool-Down. totalYards must equal the sum of the section yards. Keep beginner notation plain (use "rest :30" rather than pace-clock sendoffs). NEVER use em dashes or en dashes in any text value."""

          LIFT_PROMPT = """You are the LANE FOUR personal dryland coach writing ONE session inside an athlete's weekly plan.

          %(framework)s

          Equipment category: %(cat)s (%(equipment)s). Training phase: %(phase)s. This is %(day)s's lift. Training focus: %(focus)s. Stroke emphasis: %(stroke)s. Session length: about %(minutes)s minutes.

          Use the dryland framework above as your single source of truth: follow the Workout Duration & Structure split for a %(minutes)s-minute session (warm-up / main work / cool-down), apply the framework's movement rules for the "%(focus)s" theme, include a shoulder-health movement, and pull stroke-specific movements from the library for the %(stroke)s emphasis. Select exercises that fit the %(cat)s equipment ONLY; never prescribe equipment this category does not have. Adjust loading for the %(phase)s phase (deload or taper weeks run lighter with more mobility).

          IMPORTANT response format: IGNORE the framework's "Output Format" markdown layout for THIS response. Do NOT return markdown. Return ONLY valid JSON, no preamble, matching exactly:
          {"title":"short descriptive title built from the focus only. No day of the week or date.","trainingFocus":"%(focus)s","strokeEmphasis":"%(stroke)s","estimatedMinutes":%(minutes)s,"equipment":"one short phrase naming the gear this session actually uses","intensity":"stability|strength|power|mobility|recovery","focusCue":"2-3 sentence coach's cue connecting this dryland to swim performance","coachNote":"one tight closing sentence","sections":[{"name":"Warm-Up | Main Work Block 1 <theme> | Cool-Down & Mobility","duration":"~N min","items":[{"exercise":"movement name","prescription":"sets x reps or a timed hold, e.g. 3 x 12","note":"short informational note OR null. State only HOW to perform the movement (form, tempo, range of motion, setup). No coaching or motivational language. Terse factual phrase.","muscles":["target muscle tag"]}]}]}
          Sections in order: Warm-Up, one or more Main Work blocks, Cool-Down & Mobility. NEVER use em dashes or en dashes in any text value."""

          RECIPE_PROMPT = """You write LANE FOUR's nutrition guidance (general sports-nutrition information, never presented as advice from a licensed professional). An athlete asked: "%(request)s"

          Athlete's daily nutrition targets: %(targets)s
          Today's planned meals with per-meal macro budgets: %(meals)s
          %(target)s
          The site does not collect dietary restrictions or allergies, so write for a general audience with common ingredients. If the request itself names a restriction, allergy, or food to avoid (e.g. vegetarian, no peanuts), honor it strictly and never include that food.

          Eating-disorder safety rail: never write a recipe in service of extreme restriction. If the request pushes below the meal's macro budget in a way that reads as disordered eating (near-zero-calorie versions, punishing food rules, earning or burning off food), keep the recipe at the normal budget and use the note field to gently suggest talking with a parent, coach, doctor, or registered dietitian; free confidential support is available from the National Eating Disorders Association at nationaleatingdisorders.org or by calling or texting 988.

          Write ONE fully fleshed, realistic recipe that satisfies the request and fits the macro budget of the meal the request refers to (if the request does not name a meal, assume dinner; if that meal is not in the list, aim for roughly a third of the daily targets). The dish must make sense for that meal and time of day: breakfast food at breakfast, a real lunch or dinner plate at those meals, and snack-sized food for snacks. Home-cook friendly: normal grocery ingredients, precise quantities, clear steps.

          Return ONLY valid JSON, no preamble, matching exactly:
          {"title":"recipe name","meal":"Breakfast|Lunch|Dinner|Snack","description":"1-2 appetizing sentences","servings":N,"prepMinutes":N,"cookMinutes":N,"calories":N,"proteinG":N,"carbsG":N,"fatG":N,"ingredients":["quantity plus ingredient, one per entry"],"steps":["one clear instruction per entry"],"note":"one short tip or swap, or null"}
          Macros are per serving and must land within about 10 percent of the meal's budget. NEVER use em dashes or en dashes in any text value."""

          # Synchronous by design: one recipe is a small, fast generation that
          # fits inside the API Gateway window, so no async/poll round-trip.
          def recipe_request(user, profile, body):
            # Nutrition, including recipes, is an adults-only (18+) feature.
            if not is_adult(profile):
              return resp(403, {'error': 'Nutrition guidance is available to members 18 and older.'})
            req = str(body.get('request') or '').strip()[:300]
            if not req:
              return resp(400, {'error': 'Tell me what kind of recipe you want.'})
            # A structured slot rides along when the athlete taps "Suggest Meal"
            # on a specific meal of their plan; the recipe must hit that slot's
            # macro budget and suit its time of day.
            target = body.get('meal') if isinstance(body.get('meal'), dict) else None
            target_txt = 'No specific meal slot was selected; infer the meal from the request itself.'
            if target:
              slot = {}
              for k in ('name', 'time', 'mealType'):
                v = target.get(k)
                if v:
                  slot[k] = str(v)[:60]
              for k in ('calories', 'proteinG', 'carbsG', 'fatG'):
                try:
                  slot[k] = int(float(target.get(k)))
                except (TypeError, ValueError):
                  pass
              if slot:
                target_txt = 'The athlete tapped Suggest Meal on this exact slot of their plan. The recipe is FOR this slot: land on its macro budget and fit its time of day: %s' % json.dumps(slot)
            targets, meals = {}, []
            item = plans.get_item(Key={'email': user['email']}).get('Item') or {}
            if item.get('status') == 'ready':
              try:
                plan = json.loads(item.get('planData') or '{}')
                targets = plan.get('nutrition') or {}
                today = datetime.now(PACIFIC).strftime('%A')
                day = next((d for d in plan.get('days') or [] if d.get('day') == today), {})
                mtype = 'rest' if day.get('mealType') == 'rest' else 'training'
                meals = (plan.get('meals') or {}).get(mtype) or []
              except Exception as ex:
                print('recipe plan context failed: %s' % ex)
            try:
              # single attempt (no gen_json retry) to stay inside the gateway timeout
              raw = invoke_model(RECIPE_PROMPT % {
                'request': req.replace('"', "'"), 'target': target_txt,
                'targets': json.dumps(targets), 'meals': json.dumps(meals)}, 3000)
              recipe = json.loads(raw[raw.find('{'):raw.rfind('}') + 1])
              return resp(200, {'status': 'ready', 'recipe': recipe})
            except Exception as ex:
              print('recipe generation failed: %s' % ex)
              return resp(500, {'error': 'Could not generate a recipe right now. Please try again.'})

          def build_plan(profile, week_no, now):
            trainer = load_skill('trainer')
            swim = load_skill('swim')
            dryland = load_skill('dryland')
            level = swim_level(profile)
            cat, equipment = lift_category(profile)
            ws = week_start(now)
            trainer_fw = ('=== PERSONAL TRAINER SKILL (head-coach framework) ===\n' + trainer + '\n=== END SKILL ===') if trainer else 'Head-coach framework unavailable: use sound club-coach judgment for week design, periodization and safety.'
            prof_txt = json.dumps({k: profile.get(k, '') for k in PROFILE_KEYS})
            skeleton = gen_json(SKELETON_PROMPT % {
              'framework': trainer_fw, 'profile': prof_txt,
              'today': now.strftime('%A, %B %d, %Y'),
              'week_start': ws, 'week_number': week_no}, 6000)
            by_day = {}
            for d in skeleton.get('days') or []:
              if isinstance(d, dict) and d.get('day') in DAYS:
                by_day[d['day']] = d
            days = []
            for name in DAYS:
              d = by_day.get(name) or {'day': name, 'label': 'Rest', 'swim': None, 'lift': None,
                                       'recovery': None, 'timeLabel': '-', 'mealType': 'rest'}
              d['day'] = name
              days.append(d)
            phase = skeleton.get('phase') or 'Base'
            gear = profile.get('gear') or 'No special gear, standard pool equipment only'
            swim_fw = ('=== SWIM-SETS SKILL (programming framework) ===\n' + swim + '\n=== END SKILL ===') if swim else 'Swim framework unavailable: use standard competitive swim programming for the level.'
            dry_fw = ('=== SWIM-DRYLAND SKILL (programming framework) ===\n' + dryland + '\n=== END SKILL ===') if dryland else 'Dryland framework unavailable: use standard swim-specific strength programming.'

            # A single failed session leaves a flag for the UI instead of
            # sinking the whole plan.
            def fill_day(d):
              sw = d.get('swim')
              if isinstance(sw, dict):
                try:
                  d['swimSet'] = gen_json(SWIM_PROMPT % {
                    'framework': swim_fw, 'level': level, 'phase': phase, 'day': d['day'],
                    'focus': sw.get('focus') or 'freestyle',
                    'secondary': sw.get('secondary') or 'endurance',
                    'yards': sw.get('yards') or 2000, 'gear': gear}, 8000)
                except Exception as ex:
                  print('swim generation failed for %s: %s' % (d['day'], ex))
                  d['swimError'] = True
              lf = d.get('lift')
              if isinstance(lf, dict):
                try:
                  d['liftSession'] = gen_json(LIFT_PROMPT % {
                    'framework': dry_fw, 'cat': cat, 'equipment': equipment, 'phase': phase,
                    'day': d['day'], 'focus': lf.get('focus') or 'Full Body',
                    'stroke': (sw or {}).get('focus') or profile.get('strokeFocus') or 'Freestyle',
                    'minutes': lf.get('minutes') or 30}, 8000)
                except Exception as ex:
                  print('lift generation failed for %s: %s' % (d['day'], ex))
                  d['liftError'] = True

            with ThreadPoolExecutor(max_workers=4) as pool:
              list(pool.map(fill_day, days))

            # Hard gate: nutrition (calories, macros, meal schedules) is an adults-
            # only feature. For anyone under 18 we drop it entirely here, in code,
            # regardless of what the model returned — the prompt is asked to omit
            # it too, but this is the guarantee.
            adult = is_adult(profile)
            nutrition = (skeleton.get('nutrition') or {}) if adult else {}
            meals = (skeleton.get('meals') or {}) if adult else {}
            return {
              'weekStart': ws, 'weekNumber': week_no, 'phase': phase,
              'phaseLabel': skeleton.get('phaseLabel') or phase,
              'goalLine': skeleton.get('goalLine') or '',
              'phaseRoadmap': skeleton.get('phaseRoadmap') or '',
              'rationale': skeleton.get('rationale') or '',
              'nutrition': nutrition,
              'meals': meals,
              'nutritionRestricted': (None if adult else 'under18'),
              'days': days, 'level': level, 'liftCategory': cat,
              'generatedAt': now.isoformat()
            }

          def generate(event):
            email = event.get('email') or ''
            week_no = int(event.get('weekNumber') or 1)
            now = datetime.now(PACIFIC)
            user = users.get_item(Key={'email': email}).get('Item') or {}
            try:
              profile = json.loads(user.get('profile') or '{}')
            except Exception:
              profile = {}
            ph = profile_hash(profile)
            ws = week_start(now)
            try:
              plan = build_plan(profile, week_no, now)
              plans.put_item(Item={'email': email, 'status': 'ready', 'planData': json.dumps(plan),
                                   'profileHash': ph, 'weekStart': ws, 'weekNumber': week_no,
                                   'generatedAt': now.isoformat()})
              return {'statusCode': 200, 'body': json.dumps({'ok': True})}
            except Exception as ex:
              print('plan generation failed for %s: %s' % (email, ex))
              plans.put_item(Item={'email': email, 'status': 'error', 'error': str(ex)[:500],
                                   'profileHash': ph, 'weekStart': ws, 'weekNumber': week_no})
              return {'statusCode': 500, 'body': json.dumps({'error': str(ex)})}

          def handler(event, context):
            # Async self-invocation carries the generation payload.
            if event.get('trainingPlanGenerate'):
              return generate(event)
            if (event.get('requestContext') or {}).get('http', {}).get('method') == 'OPTIONS':
              return {'statusCode': 200, 'headers': CORS, 'body': ''}
            try:
              body = json.loads(event.get('body') or '{}')
            except Exception:
              body = {}
            token = (body.get('token') or '').strip()
            sess = tokens.get_item(Key={'token': token}).get('Item') if token else None
            if not sess or sess.get('kind') != 'session' or int(sess.get('expiresAt', 0)) < time.time():
              return resp(401, {'error': 'Session expired. Please log in again.'})
            user = users.get_item(Key={'email': sess['email']}).get('Item')
            if not user:
              return resp(401, {'error': 'Session expired. Please log in again.'})
            try:
              profile = json.loads(user.get('profile') or '{}')
            except Exception:
              profile = {}
            # Recipe suggestions ride the same route; they work with or
            # without a finished plan (the plan just sharpens the macros).
            if body.get('action') == 'recipe':
              return recipe_request(user, profile, body)
            # The plan can't be built without the essentials everything else
            # is mapped from.
            if not (profile.get('skillLevel') and profile.get('swimDays')):
              return resp(200, {'status': 'no-profile'})
            email = user['email']
            now = datetime.now(PACIFIC)
            ph = profile_hash(profile)
            ws = week_start(now)
            item = plans.get_item(Key={'email': email}).get('Item') or {}
            fresh = item.get('profileHash') == ph and item.get('weekStart') == ws
            if item.get('status') == 'ready' and fresh and not body.get('force'):
              return resp(200, {'status': 'ready', 'plan': json.loads(item['planData'])})
            # Failed generations wait for an explicit retry (force) instead of
            # re-burning Bedrock on every poll.
            if item.get('status') == 'error' and fresh and not body.get('force'):
              return resp(200, {'status': 'error', 'error': str(item.get('error') or 'Plan generation failed.')})
            # A generation is already running; a stale marker (crashed run)
            # falls through and restarts after 15 minutes.
            if item.get('status') == 'generating' and int(item.get('startedAt', 0)) > time.time() - 900:
              return resp(200, {'status': 'generating'})
            # The same profile rolling into a new week advances the 4-week
            # block; a profile change (or first plan) starts over at week 1.
            week_no = 1
            if item.get('profileHash') == ph and item.get('weekNumber'):
              week_no = int(item['weekNumber']) if item.get('weekStart') == ws else int(item['weekNumber']) % 4 + 1
            plans.put_item(Item={'email': email, 'status': 'generating', 'startedAt': int(time.time()),
                                 'profileHash': ph, 'weekStart': ws, 'weekNumber': week_no})
            lam.invoke(FunctionName=SELF_FUNCTION, InvocationType='Event',
                       Payload=json.dumps({'trainingPlanGenerate': True, 'email': email, 'weekNumber': week_no}).encode())
            return resp(200, {'status': 'generating'})

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: streamline-api
      ProtocolType: HTTP
      # Restricted to the site's own origins. The API lives on a separate
      # execute-api domain, so the browser needs CORS to call it — but only
      # from winlanefour.com, never from any third-party site. API Gateway
      # echoes the matching origin and overrides the "*" the Lambdas still
      # send in their own responses.
      CorsConfiguration:
        AllowOrigins:
          - !Sub "https://${DomainName}"
          - !Sub "https://www.${DomainName}"
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type
        MaxAge: 300

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: "$default"
      AutoDeploy: true
      # Account-wide throttle so a single abusive client (credential-stuffing,
      # scraping, or accidental loops) can't hammer the auth/search/plan routes.
      # These are generous for real traffic but cap runaway request rates.
      DefaultRouteSettings:
        ThrottlingRateLimit: 50
        ThrottlingBurstLimit: 100

  # Contact route
  ContactIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ContactFunction.Arn
      PayloadFormatVersion: "2.0"

  ContactRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "POST /contact"
      Target: !Sub "integrations/${ContactIntegration}"

  ContactFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ContactFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/contact"

  # Auth routes (google/logout/me/profile/favorites/training/delete)
  AuthIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt AuthFunction.Arn
      PayloadFormatVersion: "2.0"

  AuthPostRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "POST /auth/{action}"
      Target: !Sub "integrations/${AuthIntegration}"

  AuthGetRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "GET /auth/{action}"
      Target: !Sub "integrations/${AuthIntegration}"

  AuthFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AuthFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/auth/*"

  # Newsletter route
  NewsletterIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt NewsletterFunction.Arn
      PayloadFormatVersion: "2.0"

  NewsletterRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "POST /newsletter"
      Target: !Sub "integrations/${NewsletterIntegration}"

  # One-click unsubscribe target for links embedded in every newsletter.
  NewsletterUnsubscribeRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "GET /newsletter/unsubscribe"
      Target: !Sub "integrations/${NewsletterIntegration}"

  # Wildcard covers both /newsletter and /newsletter/unsubscribe.
  NewsletterFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref NewsletterFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/newsletter*"

  # Search route
  SearchIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt SearchFunction.Arn
      PayloadFormatVersion: "2.0"

  SearchRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "GET /search"
      Target: !Sub "integrations/${SearchIntegration}"

  SearchFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SearchFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/search"

  # Daily sets route
  GetDailySetsIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt GetDailySetsFunction.Arn
      PayloadFormatVersion: "2.0"

  GetDailySetsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "GET /daily-sets"
      Target: !Sub "integrations/${GetDailySetsIntegration}"

  GetDailySetsFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref GetDailySetsFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/daily-sets"

  # Archives route
  GetArchivesIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt GetArchivesFunction.Arn
      PayloadFormatVersion: "2.0"

  GetArchivesRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "GET /archives"
      Target: !Sub "integrations/${GetArchivesIntegration}"

  GetArchivesFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref GetArchivesFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/archives"

  # Daily dryland route
  GetDailyDrylandIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt GetDailyDrylandFunction.Arn
      PayloadFormatVersion: "2.0"

  GetDailyDrylandRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "GET /daily-dryland"
      Target: !Sub "integrations/${GetDailyDrylandIntegration}"

  GetDailyDrylandFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref GetDailyDrylandFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/daily-dryland"

  # Dryland archives route
  GetDrylandArchivesIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt GetDrylandArchivesFunction.Arn
      PayloadFormatVersion: "2.0"

  GetDrylandArchivesRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "GET /dryland-archives"
      Target: !Sub "integrations/${GetDrylandArchivesIntegration}"

  GetDrylandArchivesFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref GetDrylandArchivesFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/dryland-archives"

  # Training plan route (POST only; session token travels in the body)
  TrainingPlanIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt TrainingPlanFunction.Arn
      PayloadFormatVersion: "2.0"

  TrainingPlanRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "POST /training-plan"
      Target: !Sub "integrations/${TrainingPlanIntegration}"

  TrainingPlanFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref TrainingPlanFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/training-plan"

  # Blog edits route (GET to load overrides for everyone, POST to save)
  BlogEditsIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt BlogEditsFunction.Arn
      PayloadFormatVersion: "2.0"

  BlogEditsGetRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "GET /blog-edits"
      Target: !Sub "integrations/${BlogEditsIntegration}"

  BlogEditsPostRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "POST /blog-edits"
      Target: !Sub "integrations/${BlogEditsIntegration}"

  BlogEditsFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref BlogEditsFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/blog-edits"

  # ─── EVENTBRIDGE SCHEDULER ─────────────────────────────────────────────────

  # Role EventBridge Scheduler assumes to invoke the generator.
  SchedulerExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: streamline-scheduler-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: streamline-scheduler-invoke
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource:
                  - !GetAtt GenerateSetsFunction.Arn
                  - !GetAtt GenerateDrylandFunction.Arn

  # EventBridge Scheduler (not a classic Events::Rule) so the run time is
  # expressed in Pacific local time and fires at 12:01 AM Pacific every day,
  # year-round. A fixed UTC cron would drift by an hour across daylight-saving
  # changes (firing at 1:01 AM Pacific from spring through fall).
  GenerateSetsScheduler:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: streamline-generate-sets-daily
      Description: Generate daily swim sets for all levels at 12:01 AM Pacific
      ScheduleExpression: "cron(1 0 * * ? *)"
      ScheduleExpressionTimezone: America/Los_Angeles
      FlexibleTimeWindow:
        Mode: "OFF"
      State: ENABLED
      Target:
        Arn: !GetAtt GenerateSetsFunction.Arn
        RoleArn: !GetAtt SchedulerExecutionRole.Arn

  # Dryland generator runs on the same 12:01 AM Pacific cadence (year-round, DST
  # aware) so the day's dryland workout and swim set refresh together.
  GenerateDrylandScheduler:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: streamline-generate-dryland-daily
      Description: Generate daily dryland workouts for all categories at 12:01 AM Pacific
      ScheduleExpression: "cron(1 0 * * ? *)"
      ScheduleExpressionTimezone: America/Los_Angeles
      FlexibleTimeWindow:
        Mode: "OFF"
      State: ENABLED
      Target:
        Arn: !GetAtt GenerateDrylandFunction.Arn
        RoleArn: !GetAtt SchedulerExecutionRole.Arn


Outputs:
  BucketName:
    Value: !Ref WebsiteBucket
    Export:
      Name: StreamlineWebsiteBucketName

  DistributionId:
    Value: !Ref Distribution
    Export:
      Name: StreamlineDistributionId

  WebsiteURL:
    Value: !Sub "https://${DomainName}"

  ApiUrl:
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
    Export:
      Name: StreamlineApiUrl
