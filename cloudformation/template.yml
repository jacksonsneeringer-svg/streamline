AWSTemplateFormatVersion: "2010-09-09"
Description: Streamline static website - S3 + CloudFront + ACM + API (Lambda/DynamoDB/Bedrock)

Parameters:
  DomainName:
    Type: String
    Default: winlanefour.com

  CertificateArn:
    Type: String
    Description: ACM certificate ARN (must be in us-east-1)

  ResendApiKey:
    Type: String
    Description: Resend API key used to send transactional email (welcome, contact)
    NoEcho: true
    Default: ""

  EditorPassword:
    Type: String
    Description: Password that authorizes saving inline blog/article edits. Empty disables saving.
    NoEcho: true
    Default: ""

  RecaptchaSecretKey:
    Type: String
    Description: Google reCAPTCHA v2 secret key used to verify contact-form submissions server-side. Empty disables verification (local/dev stacks).
    NoEcho: true
    Default: ""

  GoogleClientId:
    Type: String
    Description: Google OAuth 2.0 Web client ID used to verify "Sign in with Google" credentials server-side. This is a public value (also rendered into the client). Empty disables Google sign-in.
    Default: "999928080923-q8e138qp4asjtm9bjl3gl9fgg3lp7dj3.apps.googleusercontent.com"

Resources:

  # ─── S3 / CLOUDFRONT ───────────────────────────────────────────────────────

  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${DomainName}-website"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # Maps clean page URLs to the prerendered objects the deploy uploads:
  # /swim-sets -> swim-sets/index.html (scripts/prerender.mjs writes one such
  # object per page/blog post). This is what lets Google index every page as
  # its own URL on an S3 origin, where only the root path gets index.html
  # resolution (DefaultRootObject). Extensionless paths with or without a
  # trailing slash serve the same object; each page's canonical tag names the
  # no-slash form so search engines index a single URL per page.
  UrlRewriteFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: streamline-url-rewrite
      AutoPublish: true
      FunctionConfig:
        Comment: Rewrite extensionless page paths to their prerendered index.html
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          var uri = request.uri;
          while (uri.length > 1 && uri[uri.length - 1] === '/') {
            uri = uri.slice(0, -1);
          }
          var last = uri.split('/').pop();
          if (uri !== '/' && last && last.indexOf('.') === -1) {
            uri = uri + '/index.html';
          }
          request.uri = uri;
          return request;
        }

  OAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${DomainName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${WebsiteBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution}"

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Ref DomainName
        DefaultRootObject: index.html
        Aliases:
          - !Ref DomainName
        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt WebsiteBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt OAC.Id
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          Compress: true
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt UrlRewriteFunction.FunctionMetadata.FunctionARN
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 404
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 404
            ResponsePagePath: /index.html
        HttpVersion: http2and3
        PriceClass: PriceClass_100

  # ─── DYNAMODB ──────────────────────────────────────────────────────────────

  ContactsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: streamline-contacts
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      # The privacy policy promises contact-form submissions are kept for at
      # most 1 year; the contact Lambda stamps each row with a matching
      # expiresAt so DynamoDB enforces that promise automatically.
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  SubscribersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: streamline-subscribers
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: email
          KeyType: HASH

  DailySetsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: streamline-daily-sets
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: level
          AttributeType: S
      KeySchema:
        - AttributeName: level
          KeyType: HASH

  SetArchivesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: streamline-set-archives
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: setId
          AttributeType: S
      KeySchema:
        - AttributeName: setId
          KeyType: HASH

  # Today's dryland workout per equipment category (one row each, overwritten at
  # 12:01 AM Pacific by the dryland generator). Mirrors DailySetsTable.
  DailyDrylandTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: streamline-daily-dryland
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: category
          AttributeType: S
      KeySchema:
        - AttributeName: category
          KeyType: HASH

  # Archive of every generated dryland workout (one per category per day).
  # Mirrors SetArchivesTable.
  DrylandArchivesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: streamline-dryland-archives
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: workoutId
          AttributeType: S
      KeySchema:
        - AttributeName: workoutId
          KeyType: HASH

  # Inline blog/article edits. One row per article page (pageId, e.g.
  # "page-race-week-taper") holding the overridden headline and body HTML.
  # Served to every visitor by GetBlogEditsFunction and written by the
  # password-gated editor in the site footer.
  BlogEditsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: streamline-blog-edits
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pageId
          AttributeType: S
      KeySchema:
        - AttributeName: pageId
          KeyType: HASH

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: streamline-users
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: email
          KeyType: HASH

  AuthTokensTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: streamline-auth-tokens
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: token
          AttributeType: S
      KeySchema:
        - AttributeName: token
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  # One personalized weekly training plan per account (keyed by email). Written
  # by the training-plan generator; re-generated when the profile changes or a
  # new Pacific week starts.
  TrainingPlansTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: streamline-training-plans
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: email
          KeyType: HASH

  # ─── IAM ROLE FOR LAMBDA ───────────────────────────────────────────────────

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: streamline-lambda-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: streamline-lambda-policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:BatchWriteItem
                  - dynamodb:Scan
                  - dynamodb:Query
                Resource:
                  - !GetAtt ContactsTable.Arn
                  - !GetAtt SubscribersTable.Arn
                  - !GetAtt DailySetsTable.Arn
                  - !GetAtt SetArchivesTable.Arn
                  - !GetAtt DailyDrylandTable.Arn
                  - !GetAtt DrylandArchivesTable.Arn
                  - !GetAtt UsersTable.Arn
                  - !GetAtt AuthTokensTable.Arn
                  - !GetAtt BlogEditsTable.Arn
                  - !GetAtt TrainingPlansTable.Arn
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource: "*"
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:streamline-welcome-email"
                  # training-plan invokes itself asynchronously: the API-facing
                  # call returns immediately while a second (Event) invocation
                  # does the multi-minute Bedrock generation.
                  - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:streamline-training-plan"
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"

  # ─── LAMBDA FUNCTIONS ──────────────────────────────────────────────────────

  ContactFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: streamline-contact
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 15
      Environment:
        Variables:
          RESEND_API_KEY: !Ref ResendApiKey
          RECAPTCHA_SECRET: !Ref RecaptchaSecretKey
      Code:
        ZipFile: |
          import json, os, re, time, secrets, boto3, uuid, urllib.parse, urllib.request
          from datetime import datetime, timezone

          dynamo = boto3.resource('dynamodb')
          contacts = dynamo.Table('streamline-contacts')
          subscribers = dynamo.Table('streamline-subscribers')

          RESEND_API_KEY = os.environ.get('RESEND_API_KEY', '')

          def send_email(source, to, subject, html=None, text=None, reply_to=None):
            payload = {'from': source, 'to': to if isinstance(to, list) else [to], 'subject': subject}
            if html is not None:
              payload['html'] = html
            if text is not None:
              payload['text'] = text
            if reply_to:
              payload['reply_to'] = reply_to if isinstance(reply_to, list) else [reply_to]
            req = urllib.request.Request(
              'https://api.resend.com/emails',
              data=json.dumps(payload).encode(),
              # A real User-Agent is required: Cloudflare (in front of the Resend
              # API) blocks the default "Python-urllib/x.y" signature with a 403
              # "error code: 1010" before the request reaches Resend.
              headers={'Authorization': 'Bearer ' + RESEND_API_KEY, 'Content-Type': 'application/json',
                       'User-Agent': 'lane-four-mailer/1.0 (+https://winlanefour.com)', 'Accept': 'application/json'},
              method='POST'
            )
            with urllib.request.urlopen(req, timeout=15) as r:
              return json.loads(r.read())

          CORS = {
            'Access-Control-Allow-Origin': '*',
            'Access-Control-Allow-Headers': 'Content-Type',
            'Content-Type': 'application/json'
          }

          NOTIFY_TO = 'jackson@snurray.com'
          NOTIFY_FROM = 'LANE FOUR Contact <noreply@winlanefour.com>'

          RECAPTCHA_SECRET = os.environ.get('RECAPTCHA_SECRET', '')

          def verify_recaptcha(token, ip):
            # Server-side check of the reCAPTCHA v2 token the contact form
            # sends. Returns None on success, or a human-readable failure
            # reason that goes back to the browser: Google's error-codes are
            # not sensitive, and surfacing them turns an opaque "verification
            # failed" into an instant diagnosis (e.g. invalid-input-secret
            # means the server key doesn't pair with the site key, which only
            # the reCAPTCHA admin console / GitHub secrets can fix).
            # No secret configured = verification disabled, so local and dev
            # stacks keep a working form without Google keys.
            # The length cap is a sanity bound only: real v2 response tokens
            # regularly exceed 2,000 characters, so it must stay far above
            # that (a tighter cap corrupts the token and siteverify rejects
            # every legitimate submission).
            if not RECAPTCHA_SECRET:
              return None
            if not token:
              return 'not completed. Please check the "I\'m not a robot" box and try again.'
            data = urllib.parse.urlencode({'secret': RECAPTCHA_SECRET,
                                           'response': str(token)[:8000],
                                           'remoteip': ip or ''}).encode()
            req = urllib.request.Request(
              'https://www.google.com/recaptcha/api/siteverify', data=data,
              headers={'Content-Type': 'application/x-www-form-urlencoded',
                       'User-Agent': 'lane-four-contact/1.0 (+https://winlanefour.com)'},
              method='POST')
            try:
              with urllib.request.urlopen(req, timeout=10) as r:
                result = json.loads(r.read())
            except Exception as ex:
              print('recaptcha verify failed:', ex)
              return 'could not be verified right now. Please try again in a moment.'
            if result.get('success'):
              return None
            codes = result.get('error-codes') or []
            print('recaptcha rejected:', codes)
            if 'timeout-or-duplicate' in codes:
              return 'expired. Please check the box again and resubmit.'
            if 'invalid-input-secret' in codes or 'missing-input-secret' in codes:
              return ('verification is misconfigured on the server (invalid-input-secret: '
                      'the secret key does not match the site key). Please report this to the site owner.')
            return 'failed (' + (', '.join(str(c) for c in codes) or 'no error code') + '). Please try again.'

          # Mirror of the client-side text hardening: plain text only (no
          # tag-like content, no control characters) and fixed length caps,
          # enforced server-side so a crafted request can't bypass the form.
          def clean_text(value, cap):
            v = re.sub(r'<[^>]*>', '', str(value or ''))
            v = v.replace('<', '').replace('>', '')
            v = re.sub(r'[\x00-\x08\x0b\x0c\x0e-\x1f\x7f]', '', v)
            return v.strip()[:cap]

          def handler(event, context):
            if event.get('requestContext', {}).get('http', {}).get('method') == 'OPTIONS':
              return {'statusCode': 200, 'headers': CORS, 'body': ''}
            try:
              body = json.loads(event.get('body') or '{}')
              ip = ((event.get('requestContext') or {}).get('http') or {}).get('sourceIp', '')
              captcha_problem = verify_recaptcha(body.get('recaptchaToken'), ip)
              if captcha_problem:
                return {'statusCode': 400, 'headers': CORS, 'body': json.dumps({'error': 'CAPTCHA ' + captcha_problem})}
              email = clean_text(body.get('email'), 254).lower()
              if not email or '@' not in email:
                return {'statusCode': 400, 'headers': CORS, 'body': json.dumps({'error': 'Valid email required'})}
              now = datetime.now(timezone.utc).isoformat()
              first = clean_text(body.get('firstName'), 60)
              last = clean_text(body.get('lastName'), 60)
              subject = clean_text(body.get('subject'), 120)
              message = clean_text(body.get('message'), 1000)
              newsletter = bool(body.get('newsletterOptIn'))
              item = {
                'id': str(uuid.uuid4()),
                'timestamp': now,
                'firstName': first,
                'lastName': last,
                'email': email,
                'subject': subject,
                'message': message,
                'newsletterOptIn': newsletter,
                # DynamoDB TTL: enforces the privacy policy's "contact form
                # submissions retained for up to 1 year" promise.
                'expiresAt': int(time.time()) + 365 * 24 * 3600
              }
              contacts.put_item(Item=item)
              if newsletter:
                # Same rules as the newsletter subscribe endpoint: keep the
                # existing unsubToken so unsubscribe links in newsletters we
                # already sent stay valid (CAN-SPAM requires working opt-out
                # links after send), and let the explicit checkbox act as a
                # fresh opt-in (put_item clears any prior unsubscribedAt).
                existing = subscribers.get_item(Key={'email': email}).get('Item') or {}
                subscribers.put_item(Item={
                  'email': email,
                  'source': 'contact-form',
                  'timestamp': now,
                  'unsubToken': existing.get('unsubToken') or secrets.token_urlsafe(24)
                })
              try:
                email_body = (
                  f"Name: {first} {last}\n"
                  f"Email: {email}\n"
                  f"Subject: {subject}\n"
                  f"Newsletter opt-in: {'Yes' if newsletter else 'No'}\n"
                  f"Submitted: {now}\n\n"
                  f"--- Message ---\n{message}"
                )
                send_email(
                  NOTIFY_FROM, [NOTIFY_TO],
                  f'[LANE FOUR] {subject or "New contact message"}',
                  text=email_body, reply_to=email
                )
              except Exception:
                pass
              return {'statusCode': 200, 'headers': CORS, 'body': json.dumps({'success': True})}
            except Exception as e:
              return {'statusCode': 500, 'headers': CORS, 'body': json.dumps({'error': str(e)})}

  AuthFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: streamline-auth
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 15
      Environment:
        Variables:
          SITE_URL: !Sub "https://${DomainName}"
          EMAIL_FROM: "LANE FOUR <noreply@winlanefour.com>"
          RESEND_API_KEY: !Ref ResendApiKey
          GOOGLE_CLIENT_ID: !Ref GoogleClientId
      Code:
        ZipFile: |
          import json, os, re, time, hmac, hashlib, secrets, boto3, urllib.request
          from urllib.parse import quote
          from datetime import datetime, timezone
          from boto3.dynamodb.conditions import Attr

          dynamo = boto3.resource('dynamodb')
          users = dynamo.Table('streamline-users')
          tokens = dynamo.Table('streamline-auth-tokens')
          plans = dynamo.Table('streamline-training-plans')
          subscribers = dynamo.Table('streamline-subscribers')
          contacts = dynamo.Table('streamline-contacts')
          lam = boto3.client('lambda')

          CORS = {
            'Access-Control-Allow-Origin': '*',
            'Access-Control-Allow-Headers': 'Content-Type',
            'Content-Type': 'application/json'
          }

          SITE_URL = os.environ.get('SITE_URL', 'https://winlanefour.com')
          EMAIL_FROM = os.environ.get('EMAIL_FROM', 'LANE FOUR <noreply@winlanefour.com>')
          RESEND_API_KEY = os.environ.get('RESEND_API_KEY', '')
          GOOGLE_CLIENT_ID = os.environ.get('GOOGLE_CLIENT_ID', '')
          SESSION_TTL = 30 * 24 * 3600  # 30 days

          def send_email(source, to, subject, html=None, text=None, reply_to=None):
            payload = {'from': source, 'to': to if isinstance(to, list) else [to], 'subject': subject}
            if html is not None:
              payload['html'] = html
            if text is not None:
              payload['text'] = text
            if reply_to:
              payload['reply_to'] = reply_to if isinstance(reply_to, list) else [reply_to]
            req = urllib.request.Request(
              'https://api.resend.com/emails',
              data=json.dumps(payload).encode(),
              # A real User-Agent is required: Cloudflare (in front of the Resend
              # API) blocks the default "Python-urllib/x.y" signature with a 403
              # "error code: 1010" before the request reaches Resend.
              headers={'Authorization': 'Bearer ' + RESEND_API_KEY, 'Content-Type': 'application/json',
                       'User-Agent': 'lane-four-mailer/1.0 (+https://winlanefour.com)', 'Accept': 'application/json'},
              method='POST'
            )
            with urllib.request.urlopen(req, timeout=15) as r:
              return json.loads(r.read())

          def resp(code, data):
            return {'statusCode': code, 'headers': CORS, 'body': json.dumps(data)}

          def issue_token(email, kind, ttl):
            token = secrets.token_urlsafe(32)
            tokens.put_item(Item={
              'token': token, 'kind': kind, 'email': email,
              'expiresAt': int(time.time()) + ttl,
              'createdAt': datetime.now(timezone.utc).isoformat()
            })
            return token

          def get_valid_token(token, kind):
            if not token:
              return None
            item = tokens.get_item(Key={'token': token}).get('Item')
            # DynamoDB TTL deletion is lazy, so re-check expiry here
            if not item or item.get('kind') != kind or int(item.get('expiresAt', 0)) < time.time():
              return None
            return item

          def get_user(email):
            if not email:
              return None
            return users.get_item(Key={'email': email}).get('Item')

          def public_account(user):
            return {
              'firstName': user.get('firstName', ''),
              'lastName': user.get('lastName', ''),
              'email': user.get('email', ''),
              'createdAt': int(user.get('createdAt', 0))
            }

          # Fields the site no longer stores. Scrubbed from every profile read and
          # write so legacy values drain out of storage instead of lingering:
          #   - health data the site never collects (injuries, diet, allergies)
          #   - location: now browser-provided and session-only, never persisted
          #   - raw body metrics (age, height, weight, gender): entered only to
          #     compute nutrition targets in the browser, then discarded
          RETIRED_PROFILE_KEYS = ('injuries', 'injuryNotes', 'dietaryStyle', 'allergies', 'dietaryNotes',
                                  'locLat', 'locLon', 'locName', 'city',
                                  'age', 'height', 'weight', 'gender')

          def scrub_profile(profile):
            if not isinstance(profile, dict):
              return {}
            # Migration: legacy profiles stored a raw age but no isAdult flag.
            # Derive the flag from that age before the age is scrubbed, so existing
            # adults stay classified as adults. (They will have no maintenance
            # calories until they re-run setup, so nutrition simply waits for that.)
            if 'isAdult' not in profile and profile.get('age') not in (None, ''):
              try:
                profile['isAdult'] = float(profile.get('age')) >= 18
              except (TypeError, ValueError):
                pass
            for k in RETIRED_PROFILE_KEYS:
              profile.pop(k, None)
            return profile

          # COPPA: the Terms require users to be 13+. A profile reporting an
          # age under 13 is actual knowledge of an under-age user, so the
          # write is refused and nothing is stored.
          UNDER_13_ERROR = 'LANE FOUR is for swimmers 13 and older, so we can\'t save this profile. If this age was a typo, correct it and try again.'

          def reports_under_13(profile):
            try:
              age = float(str((profile or {}).get('age') or '').strip())
              return 0 < age < 13
            except (TypeError, ValueError):
              return False

          def user_profile(user):
            try:
              return scrub_profile(json.loads(user.get('profile') or '{}'))
            except Exception:
              return {}

          # Favorites snapshot the full set/recipe data so they render even when
          # the generator API is offline. They share the user's DynamoDB item
          # (400 KB hard limit) with the profile, the workout log, and the PRs,
          # so cap both the entry count and the serialized size of each list,
          # trimming oldest-first (the client keeps newest entries at the front
          # of the list). The caps sum to well under the 400 KB item limit.
          MAX_FAVORITES = 300
          MAX_FAVORITES_BYTES = 250000
          MAX_LOG_ENTRIES = 500
          MAX_LOG_BYTES = 100000
          MAX_PRS = 200
          MAX_PR_BYTES = 20000

          def user_list(user, attr):
            try:
              val = json.loads(user.get(attr) or '[]')
              return val if isinstance(val, list) else []
            except Exception:
              return []

          def user_favorites(user):
            return user_list(user, 'favorites')

          def clean_favorites(favs):
            if not isinstance(favs, list):
              return None
            favs = [f for f in favs if isinstance(f, dict) and isinstance(f.get('setId'), str) and f['setId']][:MAX_FAVORITES]
            while favs and len(json.dumps(favs)) > MAX_FAVORITES_BYTES:
              favs.pop()
            return favs

          def clean_entries(entries, max_items, max_bytes):
            if not isinstance(entries, list):
              return None
            entries = [e for e in entries if isinstance(e, dict)][:max_items]
            while entries and len(json.dumps(entries)) > max_bytes:
              entries.pop()
            return entries

          def session_payload(user):
            return {
              'success': True,
              'token': issue_token(user['email'], 'session', SESSION_TTL),
              'account': public_account(user),
              'profile': user_profile(user),
              'favorites': user_favorites(user),
              'workoutLog': user_list(user, 'workoutLog'),
              'prs': user_list(user, 'prs')
            }

          # Names are echoed into page greetings and welcome-email HTML, so they
          # are kept to capped plain text (no tag-like content, no control chars).
          def clean_name(value):
            v = re.sub(r'<[^>]*>', '', str(value or ''))
            v = v.replace('<', '').replace('>', '')
            v = re.sub(r'[\x00-\x08\x0b\x0c\x0e-\x1f\x7f]', '', v)
            return v.strip()[:60]

          def logout(body):
            token = body.get('token') or ''
            if token:
              tokens.delete_item(Key={'token': token})
            return resp(200, {'success': True})

          def me(event):
            params = event.get('queryStringParameters') or {}
            session = get_valid_token((params.get('token') or '').strip(), 'session')
            user = get_user(session['email']) if session else None
            if not user:
              return resp(401, {'error': 'Session expired. Please log in again.'})
            return resp(200, {'success': True, 'account': public_account(user), 'profile': user_profile(user), 'favorites': user_favorites(user), 'workoutLog': user_list(user, 'workoutLog'), 'prs': user_list(user, 'prs')})

          # Favorites live on the account so they follow the user across tabs,
          # browsers, and devices instead of being stranded in one browser's
          # localStorage. The client sends the full list on every change.
          def save_favorites(body):
            session = get_valid_token(body.get('token') or '', 'session')
            user = get_user(session['email']) if session else None
            if not user:
              return resp(401, {'error': 'Session expired. Please log in again.'})
            favs = clean_favorites(body.get('favorites'))
            if favs is None:
              return resp(400, {'error': 'favorites must be a list.'})
            user['favorites'] = json.dumps(favs)
            users.put_item(Item=user)
            return resp(200, {'success': True})

          # The workout log and hand-entered PRs live on the account too, so
          # training history follows the athlete across tabs, browsers, and
          # devices. The client sends the full lists on every change.
          def save_training(body):
            session = get_valid_token(body.get('token') or '', 'session')
            user = get_user(session['email']) if session else None
            if not user:
              return resp(401, {'error': 'Session expired. Please log in again.'})
            changed = False
            if 'workoutLog' in body:
              logs = clean_entries(body.get('workoutLog'), MAX_LOG_ENTRIES, MAX_LOG_BYTES)
              if logs is None:
                return resp(400, {'error': 'workoutLog must be a list.'})
              user['workoutLog'] = json.dumps(logs)
              changed = True
            if 'prs' in body:
              prs = clean_entries(body.get('prs'), MAX_PRS, MAX_PR_BYTES)
              if prs is None:
                return resp(400, {'error': 'prs must be a list.'})
              user['prs'] = json.dumps(prs)
              changed = True
            if changed:
              users.put_item(Item=user)
            return resp(200, {'success': True})

          def save_profile(body):
            session = get_valid_token(body.get('token') or '', 'session')
            user = get_user(session['email']) if session else None
            if not user:
              return resp(401, {'error': 'Session expired. Please log in again.'})
            if isinstance(body.get('profile'), dict):
              if reports_under_13(body['profile']):
                return resp(400, {'error': UNDER_13_ERROR})
              user['profile'] = json.dumps(scrub_profile(body['profile']))
            if clean_name(body.get('firstName')):
              user['firstName'] = clean_name(body.get('firstName'))
            if clean_name(body.get('lastName')):
              user['lastName'] = clean_name(body.get('lastName'))
            users.put_item(Item=user)
            return resp(200, {'success': True, 'account': public_account(user)})

          # CCPA/CPRA right to delete, self-service: removes the account and
          # every row keyed to it (user, training plan, sessions/tokens,
          # newsletter subscription, contact messages). Accounts are Google-only
          # (no password), so a valid session is the proof of identity.
          def delete_account(body):
            session = get_valid_token(body.get('token') or '', 'session')
            user = get_user(session['email']) if session else None
            if not user:
              return resp(401, {'error': 'Session expired. Please log in again.'})
            email = user['email']
            errors = []
            for tbl, key in ((plans, {'email': email}), (subscribers, {'email': email})):
              try:
                tbl.delete_item(Key=key)
              except Exception as ex:
                errors.append('%s: %s' % (tbl.name, ex))
            # Tokens and contacts are keyed by their own ids, so filter-scan
            # for this email's rows. Both tables are small.
            try:
              kw = {'FilterExpression': Attr('email').eq(email), 'ProjectionExpression': '#t', 'ExpressionAttributeNames': {'#t': 'token'}}
              while True:
                r = tokens.scan(**kw)
                for it in r.get('Items', []):
                  tokens.delete_item(Key={'token': it['token']})
                if 'LastEvaluatedKey' not in r:
                  break
                kw['ExclusiveStartKey'] = r['LastEvaluatedKey']
            except Exception as ex:
              errors.append('tokens: %s' % ex)
            try:
              kw = {'FilterExpression': Attr('email').eq(email), 'ProjectionExpression': 'id'}
              while True:
                r = contacts.scan(**kw)
                for it in r.get('Items', []):
                  contacts.delete_item(Key={'id': it['id']})
                if 'LastEvaluatedKey' not in r:
                  break
                kw['ExclusiveStartKey'] = r['LastEvaluatedKey']
            except Exception as ex:
              errors.append('contacts: %s' % ex)
            users.delete_item(Key={'email': email})
            if errors:
              # The account itself is gone; log the stragglers for manual cleanup.
              print('delete_account partial cleanup errors for %s: %s' % (email, errors))
            return resp(200, {'success': True})

          # ── Sign in with Google ──────────────────────────────────────────────
          # Google is the only way to authenticate; no passwords are ever stored.
          # Identity is proven by a Google ID token (a signed
          # JWT) that the browser gets from Google Identity Services and posts
          # here. We hand that token to Google's tokeninfo endpoint, which does
          # the JWT signature / issuer / expiry checks; we then confirm the
          # audience is our own client ID so a token minted for some other app
          # can never mint a session here.
          def verify_google_token(id_token):
            if not id_token or not isinstance(id_token, str) or len(id_token) > 8000:
              return None
            try:
              req = urllib.request.Request(
                'https://oauth2.googleapis.com/tokeninfo?id_token=' + quote(id_token, safe=''),
                headers={'User-Agent': 'lane-four-auth/1.0 (+https://winlanefour.com)', 'Accept': 'application/json'})
              with urllib.request.urlopen(req, timeout=10) as r:
                claims = json.loads(r.read())
            except Exception as e:
              print('google tokeninfo failed:', e)
              return None
            if not GOOGLE_CLIENT_ID or claims.get('aud') != GOOGLE_CLIENT_ID:
              return None
            if claims.get('iss') not in ('accounts.google.com', 'https://accounts.google.com'):
              return None
            # email_verified comes back as the string 'true' from tokeninfo.
            if str(claims.get('email_verified')).lower() != 'true':
              return None
            if not claims.get('email'):
              return None
            return claims

          def google_auth(body):
            if not GOOGLE_CLIENT_ID:
              return resp(503, {'error': 'Google Sign-In is not configured.'})
            claims = verify_google_token(body.get('credential') or '')
            if not claims:
              return resp(401, {'error': 'Google sign-in failed. Please try again.'})
            email = (claims.get('email') or '').strip().lower()
            if not re.match(r'^[^@\s]+@[^@\s]+\.[^@\s]+$', email):
              return resp(400, {'error': 'A valid email is required.'})
            sub = str(claims.get('sub') or '')
            user = get_user(email)
            if not user:
              first = clean_name(claims.get('given_name') or (claims.get('name') or '').split(' ')[0] or email.split('@')[0])
              last = clean_name(claims.get('family_name'))
              user = {
                'email': email, 'firstName': first or 'Swimmer', 'lastName': last,
                'authProvider': 'google', 'googleSub': sub,
                'createdAt': int(time.time() * 1000),
                'profile': json.dumps({})
              }
              # Record the age/terms attestation made at account creation (the
              # user checked "I am at least 13 and agree to the Terms"). Stored as
              # proof of the neutral age screen for COPPA.
              if body.get('ageConfirmed'):
                user['ageConfirmedAt'] = int(time.time() * 1000)
              users.put_item(Item=user)
              try:
                lam.invoke(FunctionName='streamline-welcome-email', InvocationType='Event',
                           Payload=json.dumps({'email': email}).encode())
              except Exception as e:
                print('welcome email invoke failed:', e)
            elif (sub and not user.get('googleSub')) or 'passwordHash' in user:
              # An existing account signs in with Google: link the Google identity
              # so future logins match by sub, and drain any legacy password hash
              # left over from the old email/password login — we no longer store
              # passwords of any kind.
              if sub and not user.get('googleSub'):
                user['googleSub'] = sub
              user['authProvider'] = user.get('authProvider') or 'google'
              user.pop('passwordHash', None)
              try:
                users.put_item(Item=user)
              except Exception as e:
                print('google link save failed:', e)
            return resp(200, session_payload(user))

          ACTIONS = {'google': google_auth, 'logout': logout, 'profile': save_profile, 'favorites': save_favorites, 'training': save_training, 'delete': delete_account}

          def handler(event, context):
            if (event.get('requestContext') or {}).get('http', {}).get('method') == 'OPTIONS':
              return {'statusCode': 200, 'headers': CORS, 'body': ''}
            action = (event.get('pathParameters') or {}).get('action') or ''
            if action == 'me':
              return me(event)
            fn = ACTIONS.get(action)
            if not fn:
              return resp(404, {'error': 'Unknown auth action'})
            try:
              body = json.loads(event.get('body') or '{}')
            except Exception:
              body = {}
            try:
              return fn(body)
            except Exception as e:
              print('auth error:', e)
              return resp(500, {'error': 'Something went wrong. Please try again.'})

  WelcomeEmailFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: streamline-welcome-email
      Runtime: python3.12
      Handler: index.handler
