AWSTemplateFormatVersion: "2010-09-09"
Description: Streamline static website - S3 + CloudFront + ACM + API (Lambda/DynamoDB/Bedrock)

Parameters:
  DomainName:
    Type: String
    Default: streamline.snurray.com

  CertificateArn:
    Type: String
    Description: ACM certificate ARN (must be in us-east-1)

Resources:

  # ─── S3 / CLOUDFRONT ───────────────────────────────────────────────────────

  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${DomainName}-website"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  OAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${DomainName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${WebsiteBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution}"

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Ref DomainName
        DefaultRootObject: index.html
        Aliases:
          - !Ref DomainName
        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt WebsiteBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt OAC.Id
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          Compress: true
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 404
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 404
            ResponsePagePath: /index.html
        HttpVersion: http2and3
        PriceClass: PriceClass_100

  # ─── DYNAMODB ──────────────────────────────────────────────────────────────

  ContactsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: streamline-contacts
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  SubscribersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: streamline-subscribers
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: email
          KeyType: HASH

  # ─── IAM ROLE FOR LAMBDA ───────────────────────────────────────────────────

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: streamline-lambda-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: streamline-lambda-policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                Resource:
                  - !GetAtt ContactsTable.Arn
                  - !GetAtt SubscribersTable.Arn
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource: "*"
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"

  # ─── LAMBDA FUNCTIONS ──────────────────────────────────────────────────────

  ContactFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: streamline-contact
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 15
      Code:
        ZipFile: |
          import json, boto3, uuid
          from datetime import datetime, timezone

          dynamo = boto3.resource('dynamodb')
          contacts = dynamo.Table('streamline-contacts')
          subscribers = dynamo.Table('streamline-subscribers')

          CORS = {
            'Access-Control-Allow-Origin': '*',
            'Access-Control-Allow-Headers': 'Content-Type',
            'Content-Type': 'application/json'
          }

          def handler(event, context):
            if event.get('requestContext', {}).get('http', {}).get('method') == 'OPTIONS':
              return {'statusCode': 200, 'headers': CORS, 'body': ''}
            try:
              body = json.loads(event.get('body') or '{}')
              email = (body.get('email') or '').strip().lower()
              if not email or '@' not in email:
                return {'statusCode': 400, 'headers': CORS, 'body': json.dumps({'error': 'Valid email required'})}
              now = datetime.now(timezone.utc).isoformat()
              item = {
                'id': str(uuid.uuid4()),
                'timestamp': now,
                'firstName': (body.get('firstName') or '').strip(),
                'lastName': (body.get('lastName') or '').strip(),
                'email': email,
                'subject': (body.get('subject') or '').strip(),
                'message': (body.get('message') or '').strip(),
                'newsletterOptIn': bool(body.get('newsletterOptIn'))
              }
              contacts.put_item(Item=item)
              if item['newsletterOptIn']:
                subscribers.put_item(Item={
                  'email': email,
                  'source': 'contact-form',
                  'timestamp': now
                })
              return {'statusCode': 200, 'headers': CORS, 'body': json.dumps({'success': True})}
            except Exception as e:
              return {'statusCode': 500, 'headers': CORS, 'body': json.dumps({'error': str(e)})}

  NewsletterFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: streamline-newsletter
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 10
      Code:
        ZipFile: |
          import json, boto3
          from datetime import datetime, timezone

          dynamo = boto3.resource('dynamodb')
          subscribers = dynamo.Table('streamline-subscribers')

          CORS = {
            'Access-Control-Allow-Origin': '*',
            'Access-Control-Allow-Headers': 'Content-Type',
            'Content-Type': 'application/json'
          }

          def handler(event, context):
            if event.get('requestContext', {}).get('http', {}).get('method') == 'OPTIONS':
              return {'statusCode': 200, 'headers': CORS, 'body': ''}
            try:
              body = json.loads(event.get('body') or '{}')
              email = (body.get('email') or '').strip().lower()
              if not email or '@' not in email:
                return {'statusCode': 400, 'headers': CORS, 'body': json.dumps({'error': 'Valid email required'})}
              subscribers.put_item(Item={
                'email': email,
                'source': (body.get('source') or 'hero').strip(),
                'timestamp': datetime.now(timezone.utc).isoformat()
              })
              return {'statusCode': 200, 'headers': CORS, 'body': json.dumps({'success': True})}
            except Exception as e:
              return {'statusCode': 500, 'headers': CORS, 'body': json.dumps({'error': str(e)})}

  SearchFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: streamline-search
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      Code:
        ZipFile: |
          import json, boto3

          bedrock = boto3.client('bedrock-runtime', region_name='us-east-1')

          CORS = {
            'Access-Control-Allow-Origin': '*',
            'Content-Type': 'application/json'
          }

          SITE_KNOWLEDGE = """Streamline is a competitive swimming resource site. Pages and content:

          home - Landing page, overview of the platform
          swim-sets - Daily swim workouts: Beginner (2000-2500y), Intermediate (3000-4000y), Advanced (5000-6000y). Each has warmup, drill set, main set, cooldown.
          dryland-workouts - Strength/conditioning for swimmers: Upper Body Push, Upper Body Pull, Lower Body, Core & Stability workouts with sets/reps.
          blog - Articles: "7 Common Freestyle Errors and How to Fix Them" (page: freestyle-errors) covers head position, kick, glide, body rotation, catch, intensity, turns. "How to Read a Pace Clock" (page: pace-clock) covers reading the clock face, common intervals (1:00, 1:15, 1:30 send-offs), using it for structured sets.
          contact - Contact form for questions, bug reports, blog requests, partnership inquiries
          my-training - Personal dashboard: daily swim plan, dryland workout, meal plan, progress tracking (requires account)
          get-started - Create a free account for personalized plans"""

          def handler(event, context):
            params = (event.get('queryStringParameters') or {})
            query = (params.get('q') or '').strip()
            if not query:
              return {'statusCode': 400, 'headers': CORS, 'body': json.dumps({'error': 'Missing query'})}
            prompt = f"""{SITE_KNOWLEDGE}

          User searched: "{query}"

          Return a JSON array of up to 4 relevant results. Each item: {{"title": "...", "description": "one sentence", "page": "page-id"}}
          Use these page IDs: home, swim-sets, dryland-workouts, blog, freestyle-errors, pace-clock, contact, my-training, get-started
          Return ONLY the JSON array."""
            try:
              resp = bedrock.invoke_model(
                modelId='anthropic.claude-3-haiku-20240307-v1:0',
                body=json.dumps({
                  'anthropic_version': 'bedrock-2023-05-31',
                  'max_tokens': 400,
                  'messages': [{'role': 'user', 'content': prompt}]
                })
              )
              text = json.loads(resp['body'].read())['content'][0]['text'].strip()
              start = text.find('[')
              end = text.rfind(']') + 1
              results = json.loads(text[start:end]) if start >= 0 else []
              return {'statusCode': 200, 'headers': CORS, 'body': json.dumps({'results': results})}
            except Exception as e:
              return {'statusCode': 500, 'headers': CORS, 'body': json.dumps({'error': str(e), 'results': []})}

  # ─── API GATEWAY HTTP API ──────────────────────────────────────────────────

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: streamline-api
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type
        MaxAge: 300

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: "$default"
      AutoDeploy: true

  # Contact route
  ContactIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ContactFunction.Arn
      PayloadFormatVersion: "2.0"

  ContactRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "POST /contact"
      Target: !Sub "integrations/${ContactIntegration}"

  ContactFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ContactFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/contact"

  # Newsletter route
  NewsletterIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt NewsletterFunction.Arn
      PayloadFormatVersion: "2.0"

  NewsletterRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "POST /newsletter"
      Target: !Sub "integrations/${NewsletterIntegration}"

  NewsletterFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref NewsletterFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/newsletter"

  # Search route
  SearchIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt SearchFunction.Arn
      PayloadFormatVersion: "2.0"

  SearchRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "GET /search"
      Target: !Sub "integrations/${SearchIntegration}"

  SearchFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SearchFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/search"


Outputs:
  BucketName:
    Value: !Ref WebsiteBucket
    Export:
      Name: StreamlineWebsiteBucketName

  DistributionId:
    Value: !Ref Distribution
    Export:
      Name: StreamlineDistributionId

  WebsiteURL:
    Value: !Sub "https://${DomainName}"

  ApiUrl:
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
    Export:
      Name: StreamlineApiUrl
