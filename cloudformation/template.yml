AWSTemplateFormatVersion: "2010-09-09"
Description: Streamline static website - S3 + CloudFront + ACM + API (Lambda/DynamoDB/Bedrock)

Parameters:
  DomainName:
    Type: String
    Default: streamline.snurray.com

  CertificateArn:
    Type: String
    Description: ACM certificate ARN (must be in us-east-1)

Resources:

  # ─── S3 / CLOUDFRONT ───────────────────────────────────────────────────────

  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${DomainName}-website"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  OAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${DomainName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${WebsiteBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution}"

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Ref DomainName
        DefaultRootObject: index.html
        Aliases:
          - !Ref DomainName
        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt WebsiteBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt OAC.Id
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          Compress: true
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 404
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 404
            ResponsePagePath: /index.html
        HttpVersion: http2and3
        PriceClass: PriceClass_100

  # ─── DYNAMODB ──────────────────────────────────────────────────────────────

  ContactsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: streamline-contacts
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  SubscribersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: streamline-subscribers
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: email
          KeyType: HASH

  DailySetsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: streamline-daily-sets
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: level
          AttributeType: S
      KeySchema:
        - AttributeName: level
          KeyType: HASH

  SetArchivesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: streamline-set-archives
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: setId
          AttributeType: S
      KeySchema:
        - AttributeName: setId
          KeyType: HASH

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: streamline-users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: email
          KeyType: HASH

  AuthTokensTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: streamline-auth-tokens
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: token
          AttributeType: S
      KeySchema:
        - AttributeName: token
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  # ─── IAM ROLE FOR LAMBDA ───────────────────────────────────────────────────

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: streamline-lambda-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: streamline-lambda-policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Scan
                  - dynamodb:Query
                Resource:
                  - !GetAtt ContactsTable.Arn
                  - !GetAtt SubscribersTable.Arn
                  - !GetAtt DailySetsTable.Arn
                  - !GetAtt SetArchivesTable.Arn
                  - !GetAtt UsersTable.Arn
                  - !GetAtt AuthTokensTable.Arn
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource: "*"
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: "*"
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:streamline-welcome-email"
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"

  # ─── LAMBDA FUNCTIONS ──────────────────────────────────────────────────────

  ContactFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: streamline-contact
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 15
      Code:
        ZipFile: |
          import json, boto3, uuid
          from datetime import datetime, timezone

          dynamo = boto3.resource('dynamodb')
          contacts = dynamo.Table('streamline-contacts')
          subscribers = dynamo.Table('streamline-subscribers')
          ses = boto3.client('ses', region_name='us-east-1')

          CORS = {
            'Access-Control-Allow-Origin': '*',
            'Access-Control-Allow-Headers': 'Content-Type',
            'Content-Type': 'application/json'
          }

          NOTIFY_TO = 'jackson@snurray.com'
          NOTIFY_FROM = 'Streamline Contact <noreply@snurray.com>'

          def handler(event, context):
            if event.get('requestContext', {}).get('http', {}).get('method') == 'OPTIONS':
              return {'statusCode': 200, 'headers': CORS, 'body': ''}
            try:
              body = json.loads(event.get('body') or '{}')
              email = (body.get('email') or '').strip().lower()
              if not email or '@' not in email:
                return {'statusCode': 400, 'headers': CORS, 'body': json.dumps({'error': 'Valid email required'})}
              now = datetime.now(timezone.utc).isoformat()
              first = (body.get('firstName') or '').strip()
              last = (body.get('lastName') or '').strip()
              subject = (body.get('subject') or '').strip()
              message = (body.get('message') or '').strip()
              newsletter = bool(body.get('newsletterOptIn'))
              item = {
                'id': str(uuid.uuid4()),
                'timestamp': now,
                'firstName': first,
                'lastName': last,
                'email': email,
                'subject': subject,
                'message': message,
                'newsletterOptIn': newsletter
              }
              contacts.put_item(Item=item)
              if newsletter:
                subscribers.put_item(Item={
                  'email': email,
                  'source': 'contact-form',
                  'timestamp': now
                })
              try:
                email_body = (
                  f"Name: {first} {last}\n"
                  f"Email: {email}\n"
                  f"Subject: {subject}\n"
                  f"Newsletter opt-in: {'Yes' if newsletter else 'No'}\n"
                  f"Submitted: {now}\n\n"
                  f"--- Message ---\n{message}"
                )
                ses.send_email(
                  Source=NOTIFY_FROM,
                  Destination={'ToAddresses': [NOTIFY_TO]},
                  Message={
                    'Subject': {'Data': f'[Streamline] {subject or "New contact message"}'},
                    'Body': {'Text': {'Data': email_body}}
                  },
                  ReplyToAddresses=[email]
                )
              except Exception:
                pass
              return {'statusCode': 200, 'headers': CORS, 'body': json.dumps({'success': True})}
            except Exception as e:
              return {'statusCode': 500, 'headers': CORS, 'body': json.dumps({'error': str(e)})}

  AuthFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: streamline-auth
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 15
      Environment:
        Variables:
          SITE_URL: !Sub "https://${DomainName}"
          EMAIL_FROM: "Streamline <noreply@snurray.com>"
      Code:
        ZipFile: |
          import json, os, re, time, hmac, hashlib, secrets, boto3
          from datetime import datetime, timezone

          dynamo = boto3.resource('dynamodb')
          users = dynamo.Table('streamline-users')
          tokens = dynamo.Table('streamline-auth-tokens')
          ses = boto3.client('ses', region_name='us-east-1')
          lam = boto3.client('lambda')

          CORS = {
            'Access-Control-Allow-Origin': '*',
            'Access-Control-Allow-Headers': 'Content-Type',
            'Content-Type': 'application/json'
          }

          SITE_URL = os.environ.get('SITE_URL', 'https://streamline.snurray.com')
          EMAIL_FROM = os.environ.get('EMAIL_FROM', 'Streamline <noreply@snurray.com>')
          SESSION_TTL = 30 * 24 * 3600  # 30 days
          RESET_TTL = 3600              # 1 hour
          ITERATIONS = 120000

          def resp(code, data):
            return {'statusCode': code, 'headers': CORS, 'body': json.dumps(data)}

          def hash_password(password, salt=None, iterations=ITERATIONS):
            salt = salt or secrets.token_hex(16)
            dk = hashlib.pbkdf2_hmac('sha256', password.encode(), bytes.fromhex(salt), iterations)
            return 'pbkdf2$%d$%s$%s' % (iterations, salt, dk.hex())

          def verify_password(password, stored):
            try:
              _, iterations, salt, _ = stored.split('$')
              return hmac.compare_digest(hash_password(password, salt, int(iterations)), stored)
            except Exception:
              return False

          def issue_token(email, kind, ttl):
            token = secrets.token_urlsafe(32)
            tokens.put_item(Item={
              'token': token, 'kind': kind, 'email': email,
              'expiresAt': int(time.time()) + ttl,
              'createdAt': datetime.now(timezone.utc).isoformat()
            })
            return token

          def get_valid_token(token, kind):
            if not token:
              return None
            item = tokens.get_item(Key={'token': token}).get('Item')
            # DynamoDB TTL deletion is lazy, so re-check expiry here
            if not item or item.get('kind') != kind or int(item.get('expiresAt', 0)) < time.time():
              return None
            return item

          def get_user(email):
            if not email:
              return None
            return users.get_item(Key={'email': email}).get('Item')

          def public_account(user):
            return {
              'firstName': user.get('firstName', ''),
              'lastName': user.get('lastName', ''),
              'email': user.get('email', ''),
              'createdAt': int(user.get('createdAt', 0))
            }

          def user_profile(user):
            try:
              return json.loads(user.get('profile') or '{}')
            except Exception:
              return {}

          def session_payload(user):
            return {
              'success': True,
              'token': issue_token(user['email'], 'session', SESSION_TTL),
              'account': public_account(user),
              'profile': user_profile(user)
            }

          def signup(body):
            first = (body.get('firstName') or '').strip()
            last = (body.get('lastName') or '').strip()
            email = (body.get('email') or '').strip().lower()
            password = body.get('password') or ''
            if not first or not last:
              return resp(400, {'error': 'First and last name are required.'})
            if not re.match(r'^[^@\s]+@[^@\s]+\.[^@\s]+$', email):
              return resp(400, {'error': 'A valid email is required.'})
            if len(password) < 8:
              return resp(400, {'error': 'Password must be at least 8 characters.'})
            if get_user(email):
              return resp(409, {'error': 'An account with that email already exists. Try logging in instead.'})
            user = {
              'email': email, 'firstName': first, 'lastName': last,
              'passwordHash': hash_password(password),
              'createdAt': int(time.time() * 1000),
              'profile': json.dumps(body.get('profile') or {})
            }
            users.put_item(Item=user)
            try:
              lam.invoke(FunctionName='streamline-welcome-email', InvocationType='Event',
                         Payload=json.dumps({'email': email}).encode())
            except Exception as e:
              print('welcome email invoke failed:', e)
            return resp(200, session_payload(user))

          def login(body):
            email = (body.get('email') or '').strip().lower()
            password = body.get('password') or ''
            user = get_user(email)
            if not user or not verify_password(password, user.get('passwordHash', '')):
              return resp(401, {'error': 'That email and password do not match.'})
            return resp(200, session_payload(user))

          def logout(body):
            token = body.get('token') or ''
            if token:
              tokens.delete_item(Key={'token': token})
            return resp(200, {'success': True})

          def me(event):
            params = event.get('queryStringParameters') or {}
            session = get_valid_token((params.get('token') or '').strip(), 'session')
            user = get_user(session['email']) if session else None
            if not user:
              return resp(401, {'error': 'Session expired. Please log in again.'})
            return resp(200, {'success': True, 'account': public_account(user), 'profile': user_profile(user)})

          def save_profile(body):
            session = get_valid_token(body.get('token') or '', 'session')
            user = get_user(session['email']) if session else None
            if not user:
              return resp(401, {'error': 'Session expired. Please log in again.'})
            if isinstance(body.get('profile'), dict):
              user['profile'] = json.dumps(body['profile'])
            if (body.get('firstName') or '').strip():
              user['firstName'] = body['firstName'].strip()
            if (body.get('lastName') or '').strip():
              user['lastName'] = body['lastName'].strip()
            users.put_item(Item=user)
            return resp(200, {'success': True, 'account': public_account(user)})

          def forgot(body):
            email = (body.get('email') or '').strip().lower()
            # Always report success so this endpoint can't be used to probe which emails exist
            done = resp(200, {'success': True})
            user = get_user(email)
            if not user:
              return done
            token = issue_token(email, 'reset', RESET_TTL)
            link = SITE_URL + '/#reset-password?token=' + token
            first = user.get('firstName') or 'there'
            text = (
              'Hi ' + first + ',\n\n'
              'We received a request to reset the password for your Streamline account.\n\n'
              'Reset it with this link (valid for 1 hour):\n' + link + '\n\n'
              'If you did not request this, you can safely ignore this email - your password will not change.\n\n'
              '- The Streamline Team'
            )
            html = (
              '<p>Hi ' + first + ',</p>'
              '<p>We received a request to reset the password for your <b>Streamline</b> account.</p>'
              '<p><a href="' + link + '">Reset your password</a> (this link is valid for 1 hour)</p>'
              '<p>If you did not request this, you can safely ignore this email - your password will not change.</p>'
              '<p>&mdash; The Streamline Team</p>'
            )
            try:
              ses.send_email(
                Source=EMAIL_FROM,
                Destination={'ToAddresses': [email]},
                Message={
                  'Subject': {'Data': 'Reset your Streamline password'},
                  'Body': {'Text': {'Data': text}, 'Html': {'Data': html}}
                }
              )
            except Exception as e:
              print('SES send failed:', e)
            return done

          def reset(body):
            token_item = get_valid_token(body.get('token') or '', 'reset')
            password = body.get('password') or ''
            if not token_item:
              return resp(400, {'error': 'This reset link is invalid or has expired. Please request a new one.'})
            if len(password) < 8:
              return resp(400, {'error': 'Password must be at least 8 characters.'})
            user = get_user(token_item['email'])
            if not user:
              return resp(400, {'error': 'This reset link is invalid or has expired. Please request a new one.'})
            user['passwordHash'] = hash_password(password)
            users.put_item(Item=user)
            tokens.delete_item(Key={'token': token_item['token']})  # single use
            return resp(200, {'success': True})

          ACTIONS = {'signup': signup, 'login': login, 'logout': logout, 'forgot': forgot, 'reset': reset, 'profile': save_profile}

          def handler(event, context):
            if (event.get('requestContext') or {}).get('http', {}).get('method') == 'OPTIONS':
              return {'statusCode': 200, 'headers': CORS, 'body': ''}
            action = (event.get('pathParameters') or {}).get('action') or ''
            if action == 'me':
              return me(event)
            fn = ACTIONS.get(action)
            if not fn:
              return resp(404, {'error': 'Unknown auth action'})
            try:
              body = json.loads(event.get('body') or '{}')
            except Exception:
              body = {}
            try:
              return fn(body)
            except Exception as e:
              print('auth error:', e)
              return resp(500, {'error': 'Something went wrong. Please try again.'})

  WelcomeEmailFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: streamline-welcome-email
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 120
      Environment:
        Variables:
          SITE_URL: !Sub "https://${DomainName}"
          EMAIL_FROM: "Streamline <noreply@snurray.com>"
      Code:
        ZipFile: |
          import json, os, time, boto3
          from boto3.dynamodb.conditions import Attr

          dynamo = boto3.resource('dynamodb')
          users = dynamo.Table('streamline-users')
          ses = boto3.client('ses', region_name='us-east-1')

          SITE = os.environ.get('SITE_URL', 'https://streamline.snurray.com')
          FROM = os.environ.get('EMAIL_FROM', 'Streamline <noreply@snurray.com>')

          # Brand palette (site :root): deep #0d4f47, teal #1a7a6e, lap #5ddbc9,
          # light lap #a8ede5, pale lap #e6faf7, surface #f0f7f6, ink #091f1c,
          # muted #3a6560. Email-safe font stand-ins for the site faces:
          F = 'font-family:Arial,Helvetica,sans-serif;'  # ~ DM Sans
          G = 'font-family:Georgia,serif;'               # ~ DM Serif Display

          FEATURES = [
            ('Personalized training, every day', "Your My Training dashboard brings today's swim set and dryland lift together, customized to your skill level, training focus, and schedule."),
            ('Nutrition built around your training', 'Daily meal-plan recommendations matched to your body profile, training load, and the dietary preferences you set in your profile.'),
            ('Progress tracking & workout log', 'Log every session and track your training volume, times, and trends over time as your history builds.'),
            ('Set & workout archives', 'Browse every past swim set and dryland workout, filterable by level, stroke, intensity, and distance.'),
            ('Featured blog posts', 'Read featured blog posts and technique deep-dives written for swimmers, from stroke mechanics to training science.'),
            ('Favorite sets and workouts', 'Favorite the swim sets and dryland workouts you want to come back to, and find them again in one place.')
          ]
          INTRO = 'Your free account is ready. STREAMLINE is your daily training partner for competitive swimming: personalized pool sets, dryland work, and nutrition, planned for you every day so you can just show up and swim fast.'
          NUDGE = 'If you have not finished setting up your profile yet, take two minutes to tell us your level, strokes, and goals so your daily plans actually fit you. You can do it any time from the Hi %s! button in the site menu.'
          KNOW = [
            'Your daily training plan (swim set, dryland lift, and meal plan) drops at midnight Pacific time, so a fresh session is waiting in My Training every morning.',
            'Your plan adapts to you: update your level, strokes, goals, or dietary preferences any time from your profile, and your daily training adjusts to match.',
            'Each swim set opens with a focus cue and pace guidance: read it before you push off, since that is where the coaching lives, not just the yardage.',
            'Questions, ideas, or article requests? Send them through the contact page; we read everything.'
          ]

          def div(css, t): return '<div style="' + css + '">' + t + '</div>'

          # Logo art ships as hosted PNGs (rendered from the site CC Smash face)
          # under /email, so every email client renders the logo identically.
          LOGO_IMG = SITE + '/email/streamline-logo.png'       # goggles + wordmark
          WORDMARK_IMG = SITE + '/email/streamline-wordmark.png'  # wordmark only

          def build_html(first):
            feats = ''
            for t, d in FEATURES:
              feats += div('border-left:3px solid #5ddbc9;padding:2px 0 2px 16px;margin:0 0 16px;',
                div(F + 'font-size:15px;font-weight:bold;color:#0d4f47;', t) +
                div(F + 'font-size:14px;line-height:1.6;color:#3a6560;', d))
            know = ''
            for k in KNOW:
              know += div(F + 'font-size:14px;line-height:1.8;color:#3a6560;', '&bull;&nbsp; ' + k)
            eyebrow = F + 'font-size:12px;font-weight:bold;letter-spacing:3px;text-transform:uppercase;color:#1a7a6e;padding-bottom:14px;'
            return ('<!DOCTYPE html><html><body style="margin:0;padding:0;background:#f0f7f6;">'
              '<table role="presentation" width="100%" cellpadding="0" cellspacing="0"><tr><td align="center" style="padding:32px 12px;">'
              '<table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background:#ffffff;border-radius:14px;overflow:hidden;">'
              '<tr><td style="background:#0d4f47;text-align:center;padding:40px 40px 44px;">'
              + '<img src="' + LOGO_IMG + '" width="490" height="44" alt="STREAMLINE" style="display:inline-block;border:0;outline:none;">'
              + div(F + 'font-size:11px;letter-spacing:11px;word-spacing:14px;text-transform:uppercase;color:rgba(255,255,255,0.4);padding:14px 0 32px 16px;', 'Train for the Fast Lane')
              + div(G + 'font-size:34px;line-height:1.25;color:#ffffff;', 'You just dove in. Congrats!')
              + div(F + 'font-size:16px;color:#a8ede5;padding-top:12px;', 'Welcome to STREAMLINE, ' + first + '!')
              + '</td></tr>'
              '<tr><td style="padding:36px 40px 24px;">' + div(F + 'font-size:15px;line-height:1.75;color:#091f1c;', INTRO) + '</td></tr>'
              '<tr><td style="padding:0 40px 10px;">' + div(eyebrow, 'What your account unlocks') + feats + '</td></tr>'
              '<tr><td style="padding:8px 40px;">'
              '<div style="background:#e6faf7;border-left:4px solid #5ddbc9;border-radius:8px;padding:22px 24px;">'
              + div(G + 'font-size:19px;color:#0d4f47;padding-bottom:6px;', 'Make it yours: complete your profile')
              + div(F + 'font-size:14px;line-height:1.7;color:#3a6560;padding-bottom:16px;', NUDGE % ('<b>' + first + '</b>'))
              + '<a href="' + SITE + '/#profile" style="display:inline-block;background:#5ddbc9;color:#0d4f47;' + F
              + 'font-size:13px;font-weight:bold;letter-spacing:2px;text-transform:uppercase;text-decoration:none;padding:13px 30px;border-radius:4px;">Complete Your Profile &rarr;</a>'
              '</div></td></tr>'
              '<tr><td style="padding:26px 40px 36px;">' + div(eyebrow, 'Good to know') + know
              + div(F + 'font-size:14px;line-height:1.8;color:#3a6560;padding-top:10px;',
                '<a href="' + SITE + '/#my-training" style="color:#1a7a6e;">Open My Training</a> &middot; <a href="' + SITE + '/#contact" style="color:#1a7a6e;">Contact us</a>')
              + '</td></tr>'
              '<tr><td style="background:#0d4f47;text-align:center;padding:28px 40px;">'
              + '<img src="' + WORDMARK_IMG + '" width="147" height="20" alt="STREAMLINE" style="display:inline-block;border:0;outline:none;">'
              + div(F + 'font-size:12px;color:rgba(255,255,255,0.55);padding-top:10px;',
                '&copy; ' + str(time.gmtime().tm_year) + ' STREAMLINE. All rights reserved.')
              + div(F + 'font-size:12px;padding-top:6px;', '<a href="' + SITE + '" style="color:#5ddbc9;text-decoration:none;">Train for the Fast Lane</a>')
              + div(F + 'font-size:11px;color:rgba(255,255,255,0.4);padding-top:10px;', 'You are receiving this because an account was created on STREAMLINE with this email address.')
              + '</td></tr></table></td></tr></table></body></html>')

          def build_text(first):
            lines = ['You just dove in. Congrats!', 'Welcome to STREAMLINE, ' + first + '!', '', INTRO, '', 'WHAT YOUR ACCOUNT UNLOCKS']
            lines += ['* %s: %s' % ft for ft in FEATURES]
            lines += ['', 'COMPLETE YOUR PROFILE', NUDGE % first, SITE + '/#profile', '', 'GOOD TO KNOW']
            lines += ['* ' + k for k in KNOW]
            lines += ['', 'My Training: ' + SITE + '/#my-training', 'Contact: ' + SITE + '/#contact', '', '- The Streamline Team | Train for the Fast Lane']
            return '\n'.join(lines)

          def send_welcome(user):
            first = (user.get('firstName') or '').strip() or 'swimmer'
            ses.send_email(
              Source=FROM,
              Destination={'ToAddresses': [user['email']]},
              Message={
                'Subject': {'Data': 'You just dove in! Welcome to STREAMLINE, ' + first + '!'},
                'Body': {'Text': {'Data': build_text(first)}, 'Html': {'Data': build_html(first)}}
              }
            )
            users.update_item(Key={'email': user['email']},
              UpdateExpression='SET welcomeEmailSentAt = :t',
              ExpressionAttributeValues={':t': int(time.time() * 1000)})

          def handler(event, context):
            event = event or {}
            # Single send - fired asynchronously by the auth lambda on signup
            if event.get('email'):
              # Consistent read: this fires right after signup writes the user
              user = users.get_item(Key={'email': event['email'].strip().lower()}, ConsistentRead=True).get('Item')
              if not user:
                return {'statusCode': 404, 'body': json.dumps({'error': 'No such user'})}
              if user.get('welcomeEmailSentAt'):
                return {'statusCode': 200, 'body': json.dumps({'sent': 0, 'alreadySent': 1})}
              send_welcome(user)
              return {'statusCode': 200, 'body': json.dumps({'sent': 1})}
            # All-users send: every account, no createdAt window.
            # {"all": true}              - only those not yet sent
            # {"all": true, "force": true} - resend to every account including already-sent
            if event.get('all'):
              force = bool(event.get('force'))
              kw = {} if force else {'FilterExpression': Attr('welcomeEmailSentAt').not_exists()}
              sent, errors = 0, []
              while True:
                r = users.scan(**kw)
                for u in r.get('Items', []):
                  try:
                    send_welcome(u)
                    sent += 1
                  except Exception as ex:
                    errors.append('%s: %s' % (u.get('email'), ex))
                if 'LastEvaluatedKey' not in r:
                  break
                kw['ExclusiveStartKey'] = r['LastEvaluatedKey']
              print('welcome all-send: force=%s sent=%d errors=%s' % (force, sent, errors))
              return {'statusCode': 200, 'body': json.dumps({'sent': sent, 'errors': errors})}
            # Backfill: welcome accounts created in the look-back window (default
            # 24h) that never got the email. Safe to re-run - sent users are marked.
            hours = float(event.get('hours') or 24)
            cutoff = int((time.time() - hours * 3600) * 1000)
            kw = {'FilterExpression': Attr('createdAt').gte(cutoff) & Attr('welcomeEmailSentAt').not_exists()}
            sent, errors = 0, []
            while True:
              r = users.scan(**kw)
              for u in r.get('Items', []):
                try:
                  send_welcome(u)
                  sent += 1
                except Exception as ex:
                  errors.append('%s: %s' % (u.get('email'), ex))
              if 'LastEvaluatedKey' not in r:
                break
              kw['ExclusiveStartKey'] = r['LastEvaluatedKey']
            print('welcome backfill: sent=%d errors=%s' % (sent, errors))
            return {'statusCode': 200, 'body': json.dumps({'sent': sent, 'errors': errors})}

  NewsletterFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: streamline-newsletter
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 10
      Code:
        ZipFile: |
          import json, boto3
          from datetime import datetime, timezone

          dynamo = boto3.resource('dynamodb')
          subscribers = dynamo.Table('streamline-subscribers')

          CORS = {
            'Access-Control-Allow-Origin': '*',
            'Access-Control-Allow-Headers': 'Content-Type',
            'Content-Type': 'application/json'
          }

          def handler(event, context):
            if event.get('requestContext', {}).get('http', {}).get('method') == 'OPTIONS':
              return {'statusCode': 200, 'headers': CORS, 'body': ''}
            try:
              body = json.loads(event.get('body') or '{}')
              email = (body.get('email') or '').strip().lower()
              if not email or '@' not in email:
                return {'statusCode': 400, 'headers': CORS, 'body': json.dumps({'error': 'Valid email required'})}
              subscribers.put_item(Item={
                'email': email,
                'source': (body.get('source') or 'hero').strip(),
                'timestamp': datetime.now(timezone.utc).isoformat()
              })
              return {'statusCode': 200, 'headers': CORS, 'body': json.dumps({'success': True})}
            except Exception as e:
              return {'statusCode': 500, 'headers': CORS, 'body': json.dumps({'error': str(e)})}

  SearchFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: streamline-search
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      Code:
        ZipFile: |
          import json, boto3

          bedrock = boto3.client('bedrock-runtime', region_name='us-east-1')

          CORS = {
            'Access-Control-Allow-Origin': '*',
            'Content-Type': 'application/json'
          }

          SITE_KNOWLEDGE = """Streamline is a competitive swimming resource site. Pages and content:

          home - Landing page, overview of the platform
          swim-sets - Daily swim workouts: Beginner (2000-2500y), Intermediate (3000-4000y), Advanced (5000-6000y). Each has warmup, drill set, main set, cooldown. Keywords: interval training, yardage, lap swimming.
          dryland-workouts - Strength/conditioning for swimmers: Upper Body Push (bench, shoulder press, triceps), Upper Body Pull (rows, pull-ups, biceps), Lower Body (squats, lunges, hamstrings), Core & Stability (planks, rotational work). Keywords: gym, strength, conditioning, land training.
          blog - Articles index page
          freestyle-errors - Blog article: "7 Common Freestyle Errors and How to Fix Them". Covers: head position (looking forward vs neutral), kick (6-beat, 2-beat, ankle flexibility), over-gliding, body rotation (hip-driven vs shoulder-driven), high-elbow catch, going too hard too early, flip turns and open turns. Keywords: stroke technique, efficiency, form, tips, mistakes.
          pace-clock - Blog article: "How to Read a Pace Clock". Covers: reading the clock face (seconds hand, top of clock), common send-off intervals (1:00, 1:15, 1:30), calculating rest, using the pace clock for structured sets and negative splits. Keywords: clock, intervals, send-off, timing, rest.
          contact - Contact form for questions, bug reports, blog article requests, partnership inquiries
          my-training - Personal dashboard: today's swim plan, dryland workout, meal plan, progress tracking, streak. Requires a free account.
          get-started - Create a free account for personalized daily training plans"""

          def handler(event, context):
            params = (event.get('queryStringParameters') or {})
            query = (params.get('q') or '').strip()
            if not query:
              return {'statusCode': 400, 'headers': CORS, 'body': json.dumps({'error': 'Missing query'})}
            prompt = f"""{SITE_KNOWLEDGE}

          User searched: "{query}"

          Match the query (even if it is a partial word or fragment) to the most relevant pages on this site.
          Return a JSON array of up to 4 results, best match first. Each item: {{"title": "concise page/topic title", "description": "one sentence explaining what the user will find", "page": "page-id"}}
          Valid page IDs: home, swim-sets, dryland-workouts, blog, freestyle-errors, pace-clock, contact, my-training, get-started
          Return ONLY the JSON array, no other text."""
            try:
              resp = bedrock.invoke_model(
                modelId='anthropic.claude-3-haiku-20240307-v1:0',
                body=json.dumps({
                  'anthropic_version': 'bedrock-2023-05-31',
                  'max_tokens': 400,
                  'messages': [{'role': 'user', 'content': prompt}]
                })
              )
              text = json.loads(resp['body'].read())['content'][0]['text'].strip()
              start = text.find('[')
              end = text.rfind(']') + 1
              results = json.loads(text[start:end]) if start >= 0 else []
              return {'statusCode': 200, 'headers': CORS, 'body': json.dumps({'results': results})}
            except Exception as e:
              return {'statusCode': 500, 'headers': CORS, 'body': json.dumps({'error': str(e), 'results': []})}

  GenerateSetsFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: streamline-generate-sets
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      Code:
        ZipFile: |
          import json, boto3, uuid
          from datetime import datetime, timezone

          bedrock = boto3.client('bedrock-runtime', region_name='us-east-1')
          dynamo = boto3.resource('dynamodb')
          daily_tbl = dynamo.Table('streamline-daily-sets')
          arch_tbl = dynamo.Table('streamline-set-archives')

          SCHED = {0:'Distance Freestyle',1:'Breaststroke',2:'Backstroke',3:'Butterfly',4:'IM',5:'Sprints & Dives',6:'Mid-Distance Choice Stroke'}
          STROKE = {0:'freestyle',1:'breaststroke',2:'backstroke',3:'butterfly',4:'im',5:'freestyle',6:'choice'}

          LEVELS = [
            ('beginner', 1000,
             'Warm-Up, Drill Set, Main Set, Cool-Down',
             'Beginner: knows basic freestyle, maybe backstroke. No flip turns. No jargon (no "hypoxic", no "descend"). Max single piece: 100 yards. Use plain rest like "30 sec rest" not intervals.'),
            ('intermediate', 2500,
             'Warm-Up, Pre-Main, Main Set, Cool-Down',
             'Intermediate: all 4 strokes, flip turns, reads a pace clock. Comfortable up to 200 per piece. Basic terms OK: descend, build, easy/moderate/fast. Intervals like @1:30.'),
            ('advanced', 4500,
             'Warm-Up, Pre-Main, Main Set, Second Main, Cool-Down',
             'Advanced: race-trained, knows hypoxic sets, descend/negative split/lactate threshold. Comfortable up to 400+ per piece. All standard coaching terms fine.'),
            ('pro', 7000,
             'Warm-Up, Pre-Main, Main Set, Second Main, Third Main, Cool-Down',
             'Pro/elite: use all technical terms freely. VO2, threshold blocks, race pace, breakout distance, underwaters, tempo sets. Pieces up to 1000. Precision pace targets.')
          ]

          PROMPT = """You are an elite competitive swim coach writing today's practice for a real team. Write sets exactly as a coach would — varied distances, smart intervals, purposeful pieces.
          Day: {day}. Focus stroke/theme: {focus}. Level: {level}. Target distance: ~{yards} yards.
          Sections to include (in order): {sections}
          Level notes: {notes}
          Interval format (use exactly): "4x 200 free @2:45" or "200 back @1:30" or "8x 50 fly @:55 w/ :15 rest" or "4x (100 free + 50 back) @2:30".
          Stroke abbreviations: free, back, fly, breast, IM, choice.
          Make each section serve a specific purpose (breath work, turns, head position, race pace, endurance, technique, etc.) and note it in the coaching notes.
          Return ONLY valid JSON with no markdown, no preamble, no explanation:
          {{"title":"descriptive set title based on stroke/intensity/theme","totalYards":{yards},"estimatedMinutes":N,"strokeFocus":"freestyle|backstroke|butterfly|breaststroke|im|choice","intensity":"aerobic|threshold|sprint|recovery","setType":"drill|kick|pull|race|endurance|technique","distanceCategory":"short|mid|long|ultra","focusCue":"2-3 sentence coaching cue that a coach would say at the start of practice — level-appropriate language","sections":[{{"name":"section name","yards":N,"items":[{{"text":"interval line exactly as written on a whiteboard","note":"coaching note for this piece or null"}}]}}]}}"""

          def invoke(prompt):
            r = bedrock.invoke_model(
              modelId='anthropic.claude-3-5-sonnet-20241022-v2:0',
              body=json.dumps({'anthropic_version':'bedrock-2023-05-31','max_tokens':2500,'messages':[{'role':'user','content':prompt}]})
            )
            return json.loads(r['body'].read())['content'][0]['text'].strip()

          def handler(event, context):
            now = datetime.now(timezone.utc)
            date_str = now.strftime('%Y-%m-%d')
            dow = now.weekday()
            focus = SCHED[dow]
            results = []
            for level, yards, sections, notes in LEVELS:
              try:
                p = PROMPT.format(day=now.strftime('%A'), focus=focus, level=level, yards=yards, sections=sections, notes=notes)
                raw = invoke(p)
                s = raw.find('{'); e = raw.rfind('}') + 1
                data = json.loads(raw[s:e])
                sid = str(uuid.uuid4())
                data.update({'date': date_str, 'level': level, 'setId': sid})
                daily_tbl.put_item(Item={'level': level, 'setData': json.dumps(data), 'date': date_str, 'generatedAt': now.isoformat()})
                arch_tbl.put_item(Item={
                  'setId': sid, 'level': level, 'date': date_str,
                  'title': data.get('title', ''), 'totalYards': data.get('totalYards', yards),
                  'estimatedMinutes': data.get('estimatedMinutes', 0),
                  'strokeFocus': data.get('strokeFocus', STROKE[dow]),
                  'intensity': data.get('intensity', 'aerobic'),
                  'setType': data.get('setType', 'endurance'),
                  'distanceCategory': data.get('distanceCategory', 'mid'),
                  'setData': json.dumps(data), 'generatedAt': now.isoformat()
                })
                results.append({'level': level, 'status': 'ok'})
              except Exception as ex:
                results.append({'level': level, 'status': 'error', 'error': str(ex)})
            return {'statusCode': 200, 'body': json.dumps({'results': results, 'date': date_str})}

  GetDailySetsFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: streamline-get-daily-sets
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 15
      Code:
        ZipFile: |
          import json, boto3
          from datetime import datetime, timezone
          dynamo = boto3.resource('dynamodb')
          tbl = dynamo.Table('streamline-daily-sets')
          CORS = {'Access-Control-Allow-Origin':'*','Access-Control-Allow-Headers':'Content-Type','Content-Type':'application/json'}
          VALID = ('beginner','intermediate','advanced','pro')
          def handler(event, context):
            if (event.get('requestContext') or {}).get('http', {}).get('method') == 'OPTIONS':
              return {'statusCode':200,'headers':CORS,'body':''}
            p = (event.get('queryStringParameters') or {})
            level = (p.get('level') or '').strip().lower()
            if level not in VALID:
              return {'statusCode':400,'headers':CORS,'body':json.dumps({'error':'level must be one of: ' + ', '.join(VALID)})}
            try:
              r = tbl.get_item(Key={'level':level})
              if 'Item' not in r:
                return {'statusCode':404,'headers':CORS,'body':json.dumps({'error':'No set generated yet for today'})}
              today = datetime.now(timezone.utc).strftime('%Y-%m-%d')
              if r['Item'].get('date') != today:
                return {'statusCode':404,'headers':CORS,'body':json.dumps({'error':'No set generated yet for today'})}
              return {'statusCode':200,'headers':CORS,'body':r['Item']['setData']}
            except Exception as e:
              return {'statusCode':500,'headers':CORS,'body':json.dumps({'error':str(e)})}

  GetArchivesFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: streamline-get-archives
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      Code:
        ZipFile: |
          import json, boto3, decimal
          from boto3.dynamodb.conditions import Attr
          dynamo = boto3.resource('dynamodb')
          tbl = dynamo.Table('streamline-set-archives')
          CORS = {'Access-Control-Allow-Origin':'*','Access-Control-Allow-Headers':'Content-Type','Content-Type':'application/json'}
          def dec(o):
            if isinstance(o, decimal.Decimal):
              return int(o) if o % 1 == 0 else float(o)
            raise TypeError
          def handler(event, context):
            if (event.get('requestContext') or {}).get('http', {}).get('method') == 'OPTIONS':
              return {'statusCode':200,'headers':CORS,'body':''}
            p = (event.get('queryStringParameters') or {})
            fe = None
            def add(f):
              nonlocal fe
              fe = f if fe is None else fe & f
            lv=p.get('level',''); sk=p.get('stroke',''); ins=p.get('intensity',''); st=p.get('type',''); ds=p.get('distance','')
            if lv: add(Attr('level').eq(lv))
            if sk: add(Attr('strokeFocus').eq(sk))
            if ins: add(Attr('intensity').eq(ins))
            if st: add(Attr('setType').eq(st))
            if ds: add(Attr('distanceCategory').eq(ds))
            proj = 'setId,#lv,#dt,title,totalYards,estimatedMinutes,strokeFocus,intensity,setType,distanceCategory'
            kw = {'ProjectionExpression':proj,'ExpressionAttributeNames':{'#lv':'level','#dt':'date'}}
            if fe: kw['FilterExpression'] = fe
            try:
              items = []
              r = tbl.scan(**kw)
              items += r['Items']
              while 'LastEvaluatedKey' in r:
                r = tbl.scan(**kw, ExclusiveStartKey=r['LastEvaluatedKey'])
                items += r['Items']
              items.sort(key=lambda x: x.get('date',''), reverse=True)
              return {'statusCode':200,'headers':CORS,'body':json.dumps({'items':items},default=dec)}
            except Exception as e:
              return {'statusCode':500,'headers':CORS,'body':json.dumps({'error':str(e)})}

