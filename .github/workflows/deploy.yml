name: Deploy to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  STACK_NAME: streamline-website
  DOMAIN_NAME: streamline.snurray.com

jobs:
  deploy:
    name: Deploy CloudFormation + Sync S3
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # --s3-bucket: the template now exceeds the 51,200-byte body limit, so it
      # is uploaded and deployed by URL (the sync step cleans the artifact up).
      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file cloudformation/template.yml \
            --s3-bucket ${{ env.DOMAIN_NAME }}-website \
            --s3-prefix cfn-artifacts \
            --stack-name ${{ env.STACK_NAME }} \
            --parameter-overrides \
              DomainName=${{ env.DOMAIN_NAME }} \
              CertificateArn=${{ secrets.ACM_CERTIFICATE_ARN }} \
              ResendApiKey=${{ secrets.RESEND_API_KEY }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --region ${{ env.AWS_REGION }} \
            --no-fail-on-empty-changeset

      - name: Get stack outputs
        id: stack
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='BucketName'].OutputValue" \
            --output text)
          DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue" \
            --output text)
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)
          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$DIST_ID" >> "$GITHUB_OUTPUT"
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"

      - name: Generate API config
        run: |
          echo "window.STREAMLINE_API_URL = '${{ steps.stack.outputs.api_url }}';" > api-config.js

      - name: Sync website files to S3
        run: |
          aws s3 sync . s3://${{ steps.stack.outputs.bucket }} \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "cloudformation/*" \
            --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.stack.outputs.distribution_id }} \
            --paths "/*"

      # Generate today's swim sets immediately after deploy so the site never
      # shows "no set generated yet" between a deployment and the 12:01 AM
      # Pacific EventBridge Scheduler trigger. The Lambda is idempotent — it overwrites the same
      # DynamoDB key if today's set already exists.
      - name: Generate today's swim sets
        env:
          # The synchronous invoke must wait for the Lambda to finish generating
          # all four levels (four Sonnet 4.6 calls of up to 8000 tokens each can
          # take a couple of minutes). The CLI's default 60s read timeout fires
          # mid-run otherwise; raise it above the Lambda's 300s timeout. Cap
          # retries at 1 so a slow run can't fan out into duplicate executions.
          AWS_MAX_ATTEMPTS: "1"
        run: |
          aws lambda invoke \
            --function-name streamline-generate-sets \
            --cli-binary-format raw-in-base64-out \
            --cli-read-timeout 360 \
            --cli-connect-timeout 10 \
            --payload '{}' \
            /tmp/generate-sets.json > /tmp/generate-sets-meta.json
          cat /tmp/generate-sets-meta.json
          cat /tmp/generate-sets.json
          # The Lambda raises (and the CLI records a FunctionError) when no level
          # generated, so a broken model ID / Bedrock outage fails the deploy
          # instead of silently leaving the site with no sets for the day.
          if grep -q FunctionError /tmp/generate-sets-meta.json; then
            echo "::error::generate-sets Lambda failed to produce any swim sets" >&2
            exit 1
          fi

      # Welcomes accounts created in the past 24h that never got the email.
      # Runs after the S3 sync so the logo images the email links to are live.
      # Idempotent: users are marked welcomeEmailSentAt after each send.
      - name: Send welcome emails to recent signups
        run: |
          aws lambda invoke \
            --function-name streamline-welcome-email \
            --cli-binary-format raw-in-base64-out \
            --payload '{"hours": 24}' \
            /tmp/welcome-backfill.json
          cat /tmp/welcome-backfill.json
