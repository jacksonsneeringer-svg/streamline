name: Deploy to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  STACK_NAME: streamline-website
  DOMAIN_NAME: winlanefour.com
  # Dedicated, domain-independent bucket for staging the CloudFormation
  # template artifact. Kept separate from the website bucket (which the stack
  # creates and renames on a domain change) so deploys don't depend on a
  # bucket that doesn't exist yet.
  ARTIFACTS_BUCKET: streamline-website-cfn-artifacts

jobs:
  deploy:
    name: Deploy CloudFormation + Sync S3
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # The template exceeds the 51,200-byte body limit, so it is uploaded to
      # S3 and deployed by URL. Create the staging bucket if it doesn't exist
      # yet (idempotent) so the first deploy of a new domain isn't blocked.
      - name: Ensure CloudFormation artifacts bucket exists
        run: |
          if ! aws s3api head-bucket --bucket "${{ env.ARTIFACTS_BUCKET }}" 2>/dev/null; then
            aws s3 mb "s3://${{ env.ARTIFACTS_BUCKET }}" --region ${{ env.AWS_REGION }}
          fi

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file cloudformation/template.yml \
            --s3-bucket ${{ env.ARTIFACTS_BUCKET }} \
            --s3-prefix cfn-artifacts \
            --stack-name ${{ env.STACK_NAME }} \
            --parameter-overrides \
              DomainName=${{ env.DOMAIN_NAME }} \
              CertificateArn=${{ secrets.ACM_CERTIFICATE_ARN }} \
              ResendApiKey=${{ secrets.RESEND_API_KEY }} \
              EditorPassword=${{ secrets.EDITOR_PASSWORD }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --region ${{ env.AWS_REGION }} \
            --no-fail-on-empty-changeset

      - name: Get stack outputs
        id: stack
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='BucketName'].OutputValue" \
            --output text)
          DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue" \
            --output text)
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)
          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$DIST_ID" >> "$GITHUB_OUTPUT"
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"

      - name: Generate API config
        run: |
          echo "window.STREAMLINE_API_URL = '${{ steps.stack.outputs.api_url }}';" > api-config.js

      # The newsletter pipeline (lane-four-newsletter/) is build tooling, not
      # website content, so it's excluded from the site sync. Its two public
      # outputs are published separately below under /newsletter-images and
      # /issues — those bucket prefixes are excluded here so --delete doesn't
      # wipe them out.
      - name: Sync website files to S3
        run: |
          aws s3 sync . s3://${{ steps.stack.outputs.bucket }} \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "cloudformation/*" \
            --exclude "lane-four-newsletter/*" \
            --exclude "newsletter-images/*" \
            --exclude "issues/*" \
            --delete

      # Rendered newsletters reference their hero images at
      # /newsletter-images/... on winlanefour.com, so the images (and the
      # issue archive itself) go live with each deploy.
      - name: Publish newsletter images and issue archive
        run: |
          aws s3 sync lane-four-newsletter/public/newsletter-images \
            s3://${{ steps.stack.outputs.bucket }}/newsletter-images --exclude ".gitkeep"
          aws s3 sync lane-four-newsletter/issues \
            s3://${{ steps.stack.outputs.bucket }}/issues --exclude ".gitkeep"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.stack.outputs.distribution_id }} \
            --paths "/*"

      # Today's swim sets are generated solely by the daily EventBridge Scheduler
      # (streamline-generate-sets-daily, 12:01 AM Pacific). Deploys must NOT
      # trigger the generator — pushing code should never produce a new daily
      # set, so the generate-sets invocation is intentionally omitted here.

      # Welcomes accounts created in the past 24h that never got the email.
      # Runs after the S3 sync so the logo images the email links to are live.
      # Idempotent: users are marked welcomeEmailSentAt after each send.
      - name: Send welcome emails to recent signups
        run: |
          aws lambda invoke \
            --function-name streamline-welcome-email \
            --cli-binary-format raw-in-base64-out \
            --payload '{"hours": 24}' \
            /tmp/welcome-backfill.json
          cat /tmp/welcome-backfill.json
