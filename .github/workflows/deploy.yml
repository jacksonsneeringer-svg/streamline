name: Deploy to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  STACK_NAME: streamline-website
  DOMAIN_NAME: winlanefour.com
  # Dedicated, domain-independent bucket for staging the CloudFormation
  # template artifact. Kept separate from the website bucket (which the stack
  # creates and renames on a domain change) so deploys don't depend on a
  # bucket that doesn't exist yet.
  ARTIFACTS_BUCKET: streamline-website-cfn-artifacts

jobs:
  deploy:
    name: Deploy CloudFormation + Sync S3
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # reCAPTCHA is configured by a PAIR of secrets that must be set together:
      # RECAPTCHA_SITE_KEY (public, rendered into the client so the "I'm not a
      # robot" checkbox appears) and RECAPTCHA_SECRET_KEY (private, verified by
      # the contact Lambda). Only two states are valid — both set (production)
      # or both empty (verification off, e.g. dev). An asymmetric config ships a
      # broken form; the worst case is a secret with no site key: the server
      # demands a token but no checkbox ever renders, so every submission bounces
      # with "CAPTCHA not completed. Please check the 'I'm not a robot' box".
      # Fail fast here instead of deploying that dead form.
      - name: Validate reCAPTCHA key pair
        env:
          RECAPTCHA_SITE_KEY: ${{ secrets.RECAPTCHA_SITE_KEY }}
          RECAPTCHA_SECRET_KEY: ${{ secrets.RECAPTCHA_SECRET_KEY }}
        run: |
          if [ -n "$RECAPTCHA_SITE_KEY" ] && [ -z "$RECAPTCHA_SECRET_KEY" ]; then
            echo "::error::RECAPTCHA_SITE_KEY is set but RECAPTCHA_SECRET_KEY is empty. The checkbox would render but the server would never verify the token. Set both secrets or clear both."
            exit 1
          fi
          if [ -z "$RECAPTCHA_SITE_KEY" ] && [ -n "$RECAPTCHA_SECRET_KEY" ]; then
            echo "::error::RECAPTCHA_SECRET_KEY is set but RECAPTCHA_SITE_KEY is empty. The contact form would demand a CAPTCHA token while rendering no 'I'm not a robot' checkbox, so every submission fails with 'CAPTCHA not completed'. Set RECAPTCHA_SITE_KEY to the public reCAPTCHA v2 site key that pairs with the secret, or clear RECAPTCHA_SECRET_KEY."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # The template exceeds the 51,200-byte body limit, so it is uploaded to
      # S3 and deployed by URL. Create the staging bucket if it doesn't exist
      # yet (idempotent) so the first deploy of a new domain isn't blocked.
      - name: Ensure CloudFormation artifacts bucket exists
        run: |
          if ! aws s3api head-bucket --bucket "${{ env.ARTIFACTS_BUCKET }}" 2>/dev/null; then
            aws s3 mb "s3://${{ env.ARTIFACTS_BUCKET }}" --region ${{ env.AWS_REGION }}
          fi

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file cloudformation/template.yml \
            --s3-bucket ${{ env.ARTIFACTS_BUCKET }} \
            --s3-prefix cfn-artifacts \
            --stack-name ${{ env.STACK_NAME }} \
            --parameter-overrides \
              DomainName=${{ env.DOMAIN_NAME }} \
              CertificateArn=${{ secrets.ACM_CERTIFICATE_ARN }} \
              ResendApiKey=${{ secrets.RESEND_API_KEY }} \
              EditorPassword=${{ secrets.EDITOR_PASSWORD }} \
              RecaptchaSecretKey=${{ secrets.RECAPTCHA_SECRET_KEY }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --region ${{ env.AWS_REGION }} \
            --no-fail-on-empty-changeset

      - name: Get stack outputs
        id: stack
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='BucketName'].OutputValue" \
            --output text)
          DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue" \
            --output text)
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)
          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$DIST_ID" >> "$GITHUB_OUTPUT"
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"

      # The privacy policy promises server log data (which includes IPs and
      # emails printed by the Lambdas) is retained for at most 90 days.
      # Lambda auto-creates its log groups with no expiry, so retention is set
      # here on every deploy. Idempotent: create-log-group is a no-op-with-error
      # for groups that already exist, and put-retention-policy simply
      # re-applies the same policy.
      - name: Enforce 90-day CloudWatch log retention
        run: |
          for fn in streamline-contact streamline-auth streamline-welcome-email \
                    streamline-newsletter streamline-newsletter-send streamline-newsletter-compose \
                    streamline-search streamline-generate-sets streamline-get-daily-sets \
                    streamline-get-archives streamline-generate-dryland streamline-get-daily-dryland \
                    streamline-get-dryland-archives streamline-blog-edits streamline-training-plan; do
            aws logs create-log-group --log-group-name "/aws/lambda/$fn" 2>/dev/null || true
            aws logs put-retention-policy --log-group-name "/aws/lambda/$fn" --retention-in-days 90
          done

      - name: Generate API config
        run: |
          echo "window.STREAMLINE_API_URL = '${{ steps.stack.outputs.api_url }}';" > api-config.js
          # reCAPTCHA v2 SITE key (public, safe in client JS). The matching
          # SECRET key is passed to the stack as RecaptchaSecretKey above.
          echo "window.STREAMLINE_RECAPTCHA_SITE_KEY = '${{ secrets.RECAPTCHA_SITE_KEY }}';" >> api-config.js

      # Writes one <route>/index.html per page and blog post (with per-route
      # title/description/canonical/social/JSON-LD head tags) plus sitemap.xml,
      # so Google indexes every page as its own URL. New posts added to
      # BLOG_POSTS in index.html are picked up automatically on each deploy.
      - name: Generate per-page SEO documents and sitemap
        run: node scripts/prerender.mjs

      # The newsletter pipeline (lane-four-newsletter/) is build tooling, not
      # website content, so it's excluded from the site sync. Its two public
      # outputs are published separately below under /newsletter-images and
      # /issues — those bucket prefixes are excluded here so --delete doesn't
      # wipe them out.
      - name: Sync website files to S3
        run: |
          aws s3 sync . s3://${{ steps.stack.outputs.bucket }} \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "cloudformation/*" \
            --exclude "scripts/*" \
            --exclude "lane-four-newsletter/*" \
            --exclude "newsletter-images/*" \
            --exclude "issues/*" \
            --delete

      # Rendered newsletters reference their hero images at
      # /newsletter-images/... on winlanefour.com, so the images (and the
      # issue archive itself) go live with each deploy.
      - name: Publish newsletter images and issue archive
        run: |
          aws s3 sync lane-four-newsletter/public/newsletter-images \
            s3://${{ steps.stack.outputs.bucket }}/newsletter-images --exclude ".gitkeep"
          aws s3 sync lane-four-newsletter/issues \
            s3://${{ steps.stack.outputs.bucket }}/issues --exclude ".gitkeep"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.stack.outputs.distribution_id }} \
            --paths "/*"

      # Today's swim sets are generated solely by the daily EventBridge Scheduler
      # (streamline-generate-sets-daily, 12:01 AM Pacific). Deploys must NOT
      # trigger the generator — pushing code should never produce a new daily
      # set, so the generate-sets invocation is intentionally omitted here.

      # Welcomes accounts created in the past 24h that never got the email.
      # Runs after the S3 sync so the logo images the email links to are live.
      # Idempotent: users are marked welcomeEmailSentAt after each send.
      - name: Send welcome emails to recent signups
        run: |
          aws lambda invoke \
            --function-name streamline-welcome-email \
            --cli-binary-format raw-in-base64-out \
            --payload '{"hours": 24}' \
            /tmp/welcome-backfill.json
          cat /tmp/welcome-backfill.json
