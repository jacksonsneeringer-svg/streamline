name: Deploy to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  STACK_NAME: streamline-website
  DOMAIN_NAME: winlanefour.com
  CERTIFICATE_ARN: arn:aws:acm:us-east-1:667291328503:certificate/716a486a-36ba-43d4-b8c5-00bbba3130b1

jobs:
  deploy:
    name: Deploy CloudFormation + Sync S3
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # --s3-bucket: the template now exceeds the 51,200-byte body limit, so it
      # is uploaded and deployed by URL (the sync step cleans the artifact up).
      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file cloudformation/template.yml \
            --s3-bucket ${{ env.DOMAIN_NAME }}-website \
            --s3-prefix cfn-artifacts \
            --stack-name ${{ env.STACK_NAME }} \
            --parameter-overrides \
              DomainName=${{ env.DOMAIN_NAME }} \
              CertificateArn=${{ env.CERTIFICATE_ARN }} \
              ResendApiKey=${{ secrets.RESEND_API_KEY }} \
              EditorPassword=${{ secrets.EDITOR_PASSWORD }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --region ${{ env.AWS_REGION }} \
            --no-fail-on-empty-changeset

      - name: Get stack outputs
        id: stack
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='BucketName'].OutputValue" \
            --output text)
          DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue" \
            --output text)
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)
          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$DIST_ID" >> "$GITHUB_OUTPUT"
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"

      - name: Generate API config
        run: |
          echo "window.STREAMLINE_API_URL = '${{ steps.stack.outputs.api_url }}';" > api-config.js

      - name: Sync website files to S3
        run: |
          aws s3 sync . s3://${{ steps.stack.outputs.bucket }} \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "cloudformation/*" \
            --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.stack.outputs.distribution_id }} \
            --paths "/*"

      # Today's swim sets are generated solely by the daily EventBridge Scheduler
      # (streamline-generate-sets-daily, 12:01 AM Pacific). Deploys must NOT
      # trigger the generator — pushing code should never produce a new daily
      # set, so the generate-sets invocation is intentionally omitted here.

      # Welcomes accounts created in the past 24h that never got the email.
      # Runs after the S3 sync so the logo images the email links to are live.
      # Idempotent: users are marked welcomeEmailSentAt after each send.
      - name: Send welcome emails to recent signups
        run: |
          aws lambda invoke \
            --function-name streamline-welcome-email \
            --cli-binary-format raw-in-base64-out \
            --payload '{"hours": 24}' \
            /tmp/welcome-backfill.json
          cat /tmp/welcome-backfill.json
