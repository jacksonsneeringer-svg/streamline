name: Weekly LANE FOUR Newsletter

# Runs every Monday morning and builds this week's issue from whatever is in
# lane-four-newsletter/data/draft-issue.json at that point. That file is NOT
# generated by this workflow — an editor needs to have replaced it with this
# week's athlete, news, workout blurb, and events sometime before the cron
# fires (see lane-four-newsletter/README.md). Blog posts and gear ARE
# generated automatically below.
#
# Output: a new dated file under lane-four-newsletter/issues/, opened as a
# pull request rather than pushed straight to main, so someone can eyeball it
# before it goes live on winlanefour.com.

on:
  schedule:
    # 13:00 UTC every Monday = 6am PT / 9am ET. Adjust to taste.
    - cron: '0 13 * * 1'
  workflow_dispatch: {} # lets you trigger a run manually from the Actions tab

jobs:
  build-newsletter:
    runs-on: ubuntu-latest
    defaults:
      run:
        # The newsletter pipeline lives in its own folder of the website repo.
        working-directory: lane-four-newsletter
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: lane-four-newsletter/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Confirm this week's editorial draft exists
        run: |
          if [ ! -f data/draft-issue.json ]; then
            echo "::error::data/draft-issue.json is missing. An editor needs to add this week's athlete of the week, news items, workout blurb, and events before this workflow can run. See data/draft-issue.example.json for the shape."
            exit 1
          fi

      - name: Fetch this week's blog posts
        run: npm run fetch:blog

      - name: Select this week's gear
        run: npm run select:gear

      - name: Fetch live gear ratings (best effort)
        run: npm run fetch:gear-ratings
        continue-on-error: true

      - name: Enforce no-repeat rules and lock in history
        run: npm run check:no-repeats

      - name: Render the newsletter
        run: npm run build

      - name: Open a PR with this week's issue
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'Weekly newsletter: build issue for ${{ github.run_id }}'
          title: 'Weekly newsletter draft ready for review'
          body: |
            Auto-generated by the Monday newsletter workflow.

            Review the rendered HTML under `issues/`, then merge to publish.
            `data/newsletter-history.json` has already been updated so next
            week's run won't repeat anything in this issue.
          branch: weekly-newsletter/${{ github.run_id }}
          add-paths: |
            lane-four-newsletter/issues/
            lane-four-newsletter/data/newsletter-history.json
            lane-four-newsletter/data/selected-gear.json
            lane-four-newsletter/data/newsletter-blog-picks.json
            lane-four-newsletter/data/gear-ratings.json
            lane-four-newsletter/public/newsletter-images/
