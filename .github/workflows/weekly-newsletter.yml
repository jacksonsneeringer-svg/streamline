name: Weekly LANE FOUR Newsletter

# Fully automated, end to end. Every Monday morning this:
#   1. composes the issue's editorial content with zero human input
#      (streamline-newsletter-compose Lambda: real SwimSwam news, a
#      Wikipedia-verified Athlete of the Week, today's actual workout),
#   2. scrapes fresh blog posts and rotates in never-before-featured gear,
#   3. enforces the no-repeat rules and renders the HTML,
#   4. publishes the hero images + web archive copy to the site bucket,
#   5. emails the issue to every subscriber via streamline-newsletter-send,
#   6. commits the updated no-repeat history and issue straight to main.
#
# The push in step 6 uses GITHUB_TOKEN, which intentionally does NOT trigger
# the deploy workflow — the workflow already uploaded everything the site
# needs directly to S3 in step 4.
#
# Manual runs from the Actions tab can set "test_email" to send a preview to
# one address instead: a test run doesn't email the list, doesn't publish the
# issue page, and doesn't commit anything, so it can be repeated safely.

on:
  schedule:
    # Target: 6am ET every Monday. GitHub Actions cron is UTC-only and ignores
    # daylight saving, so 6am ET is a different UTC hour depending on the
    # season: 10:00 UTC while Eastern Daylight Time is in effect (mid-Mar to
    # early Nov) and 11:00 UTC while Eastern Standard Time is in effect. We
    # register BOTH; the guard step below matches the triggering cron against
    # the one that is genuinely 6am ET today and lets only that firing proceed,
    # so the issue goes out at 6am ET year-round and never twice — even when
    # GitHub runs the cron hours late. Daily sets generate at 12:01am Pacific
    # (= 3am ET), so today's workout already exists when this fires.
    - cron: '0 10 * * 1'   # 6am ET during EDT (7am ET during EST — gated out)
    - cron: '0 11 * * 1'   # 6am ET during EST (5am ET during EDT — gated out)
  workflow_dispatch:
    inputs:
      test_email:
        description: 'Preview: send ONLY to this address; skips publishing and the history commit. Leave blank for a real send.'
        required: false

permissions:
  contents: write

env:
  AWS_REGION: us-east-1
  STACK_NAME: streamline-website
  TEST_EMAIL: ${{ inputs.test_email }}

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    defaults:
      run:
        # The newsletter pipeline lives in its own folder of the website repo.
        working-directory: lane-four-newsletter
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      # Two gates decide whether this run proceeds:
      #  1. DST gate — the two schedules fire at 10:00 and 11:00 UTC; only the
      #     one that corresponds to 6am Eastern today should proceed (the other
      #     is an hour off because Actions cron ignores DST). We decide this by
      #     the cron that TRIGGERED the run (github.event.schedule), NOT by the
      #     wall-clock hour at execution time: GitHub's scheduler is best-effort
      #     and routinely fires runs hours late, so a wall-clock check skips the
      #     issue entirely whenever the run drifts out of the 6am ET hour. The
      #     triggering cron is fixed no matter how late the run lands, so this
      #     stays correct under delay. Manual runs skip the gate (preview at any
      #     hour). 6am ET is 10:00 UTC while EDT is in effect (offset -0400) and
      #     11:00 UTC while EST is in effect (offset -0500).
      #  2. Re-run protection — a successful run commits issues/<date>.html to
      #     main, so if it's already there this week's issue went out; don't
      #     build and email it twice. Test previews bypass this too.
      # The issue date is the Eastern date (same as UTC at 6am ET, but computed
      # in ET so the whole workflow stays time-zone coherent).
      - name: Decide whether to run
        id: guard
        run: |
          DATE=$(TZ=America/New_York date +%F)
          echo "date=$DATE" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "schedule" ]; then
            # Map "6am ET today" to the UTC cron that should own this run,
            # based on the live Eastern UTC offset.
            if [ "$(TZ=America/New_York date +%z)" = "-0400" ]; then
              WANT_CRON='0 10 * * 1'   # EDT: 6am ET == 10:00 UTC
            else
              WANT_CRON='0 11 * * 1'   # EST: 6am ET == 11:00 UTC
            fi
            if [ "${{ github.event.schedule }}" != "$WANT_CRON" ]; then
              echo "Triggered by cron '${{ github.event.schedule }}', but 6am ET today maps to '$WANT_CRON' — this is the off-DST cron firing. Skipping."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          if [ -f "issues/$DATE.html" ] && [ -z "$TEST_EMAIL" ]; then
            echo "Issue $DATE already exists on main — nothing to do."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        if: steps.guard.outputs.skip != 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Node
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: lane-four-newsletter/package-lock.json

      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true'
        run: npm ci

      - name: Compose this week's editorial content
        if: steps.guard.outputs.skip != 'true'
        run: node scripts/compose-draft.js "${{ steps.guard.outputs.date }}"

      - name: Fetch this week's blog posts
        if: steps.guard.outputs.skip != 'true'
        run: npm run fetch:blog

      - name: Select this week's gear
        if: steps.guard.outputs.skip != 'true'
        run: npm run select:gear

      # There is deliberately NO gear-ratings step here: scraping retailer
      # pages for star ratings violated their terms of use, and falling back
      # to the catalog's made-up placeholder numbers was a fabricated consumer
      # rating under the FTC's reviews rule. Gear cards carry no ratings.

      - name: Enforce no-repeat rules and lock in history
        if: steps.guard.outputs.skip != 'true'
        run: npm run check:no-repeats

      - name: Render the newsletter
        if: steps.guard.outputs.skip != 'true'
        run: npm run build

      - name: Resolve the website bucket
        if: steps.guard.outputs.skip != 'true'
        id: stack
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='BucketName'].OutputValue" \
            --output text)
          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"

      # Hero images must be live BEFORE the send: the email references them at
      # winlanefour.com/newsletter-images/... . Uploaded for test previews too
      # (harmless — new files only) so the preview renders correctly.
      - name: Publish newsletter images
        if: steps.guard.outputs.skip != 'true'
        run: |
          aws s3 sync public/newsletter-images \
            s3://${{ steps.stack.outputs.bucket }}/newsletter-images --exclude ".gitkeep"

      # Web archive copy: same HTML with the per-recipient unsubscribe token
      # swapped for a plain site link. Skipped for test previews so unsent
      # issues never appear at a public URL.
      - name: Publish the web archive copy
        if: steps.guard.outputs.skip != 'true' && env.TEST_EMAIL == ''
        run: |
          sed 's|{{UNSUBSCRIBE_URL}}|https://winlanefour.com/#newsletter|g' \
            "issues/${{ steps.guard.outputs.date }}.html" > /tmp/issue-web.html
          aws s3 cp /tmp/issue-web.html \
            "s3://${{ steps.stack.outputs.bucket }}/issues/${{ steps.guard.outputs.date }}.html" \
            --content-type "text/html; charset=utf-8"

      - name: Send the issue
        if: steps.guard.outputs.skip != 'true'
        env:
          NEWSLETTER_TEST_EMAIL: ${{ env.TEST_EMAIL }}
        run: node scripts/send-issue.js

      # Lock in this week's state: the history file is what guarantees next
      # week can't repeat anything, and the committed issue file doubles as
      # the re-run guard above.
      - name: Commit history and issue to main
        if: steps.guard.outputs.skip != 'true' && env.TEST_EMAIL == ''
        working-directory: .
        run: |
          git config user.name "lane-four-newsletter[bot]"
          git config user.email "newsletter@winlanefour.com"
          # -A over the whole folder: picks up the issue, the history, the
          # generated data files and downloaded images.
          git add -A lane-four-newsletter/
          git commit -m "Weekly newsletter: publish issue ${{ steps.guard.outputs.date }}"
          # main can advance while the pipeline runs (an unrelated merge), which
          # rejects a plain push as non-fast-forward. The send has already gone
          # out by this point, so a dropped push silently loses this week's
          # history entry — next week could then repeat this week's athlete,
          # gear, blog posts or news. Rebase onto the latest main and retry so
          # the state always lands; fail loudly if it truly can't.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "Pushed on attempt ${attempt}."
              exit 0
            fi
            echo "Push attempt ${attempt} rejected — main moved. Rebasing onto latest main and retrying..."
            git fetch origin main
            git rebase origin/main
          done
          echo "Failed to push newsletter state to main after 5 attempts." >&2
          exit 1
