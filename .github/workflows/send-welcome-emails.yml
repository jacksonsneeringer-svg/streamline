name: Send Welcome Emails

# Transactional only. The welcome email carries no unsubscribe link, so it may
# never be broadcast to the whole user base (that would be a commercial email
# without an opt-out — a CAN-SPAM violation). This workflow supports exactly
# two uses: a single test send, and a backfill that welcomes accounts created
# in a recent window that never got the email (e.g. after a send outage).
# Deliberate marketing sends go through the newsletter pipeline, which does
# per-recipient one-click unsubscribe correctly.

on:
  workflow_dispatch:
    inputs:
      backfill_hours:
        description: 'Backfill window: welcome accounts created in the past N hours that never got the email.'
        required: false
        default: '24'
        type: string
      test_email:
        description: 'Optional: send a single test email to this address (resends even if already welcomed). Overrides the backfill when set.'
        required: false
        default: ''
        type: string

env:
  AWS_REGION: us-east-1

jobs:
  send:
    name: Send welcome emails
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build payload
        id: payload
        env:
          TEST_EMAIL: ${{ inputs.test_email }}
          HOURS: ${{ inputs.backfill_hours }}
        run: |
          if [ -n "$TEST_EMAIL" ]; then
            echo "payload={\"email\":\"$TEST_EMAIL\",\"force\":true}" >> "$GITHUB_OUTPUT"
          else
            echo "payload={\"hours\":${HOURS:-24}}" >> "$GITHUB_OUTPUT"
          fi

      - name: Invoke welcome-email Lambda
        run: |
          aws lambda invoke \
            --function-name streamline-welcome-email \
            --cli-binary-format raw-in-base64-out \
            --payload '${{ steps.payload.outputs.payload }}' \
            /tmp/result.json
          echo "=== Lambda response ==="
          cat /tmp/result.json
